<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia ARC Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .texto-biblico { font-family: 'Lora', serif; line-height: 1.8; }
        .chat-drawer { transition: transform 0.3s cubic-bezier(0, 0, 0.2, 1); transform: translateY(100%); }
        .chat-drawer.open { transform: translateY(0); }
        .scroll-custom::-webkit-scrollbar { width: 4px; }
        .scroll-custom::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100">

    <header class="fixed top-0 left-0 right-0 z-40 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b dark:border-gray-800">
        <div class="max-w-md mx-auto px-4 py-3 flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <h1 class="font-bold text-indigo-600 text-xl tracking-tight">ARC <span class="text-gray-400 font-light text-sm">Almeida Corrigida</span></h1>
                <div class="flex items-center gap-4">
                    <button onclick="resetarChave()" title="Configurar API" class="text-lg">⚙️</button>
                    <button id="darkToggle" class="text-lg">🌓</button>
                </div>
            </div>
            <div class="flex gap-2">
                <select id="selectLivro" class="flex-[2] bg-gray-100 dark:bg-gray-800 p-2 rounded-lg text-sm outline-none"></select>
                <select id="selectCapitulo" class="flex-1 bg-gray-100 dark:bg-gray-800 p-2 rounded-lg text-sm outline-none"></select>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto pt-32 pb-32 px-6 min-h-screen">
        <div id="leituraDisplay" class="texto-biblico text-xl">
            </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-gray-50 dark:from-gray-900 via-gray-50 dark:via-gray-900 to-transparent">
        <div class="max-w-md mx-auto grid grid-cols-4 gap-3">
            <button id="btnVoltar" class="bg-white dark:bg-gray-800 border dark:border-gray-700 shadow-sm p-4 rounded-2xl active:scale-95 transition-transform">←</button>
            <button onclick="abrirChat()" class="col-span-2 bg-indigo-600 text-white shadow-lg p-4 rounded-2xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <span>✨</span> Assistente AI
            </button>
            <button id="btnAvancar" class="bg-white dark:bg-gray-800 border dark:border-gray-700 shadow-sm p-4 rounded-2xl active:scale-95 transition-transform">→</button>
        </div>
    </nav>

    <div id="chatInterface" class="fixed inset-0 z-50 flex flex-col bg-white dark:bg-gray-900 chat-drawer">
        <div class="p-4 bg-indigo-600 text-white flex justify-between items-center">
            <div>
                <h3 class="font-bold">Assistente Teológico</h3>
                <p class="text-[10px] opacity-80 uppercase tracking-widest font-semibold">Fiel à Doutrina Assembleiana</p>
            </div>
            <button onclick="fecharChat()" class="p-2 text-2xl">&times;</button>
        </div>
        
        <div id="mensagensArea" class="flex-1 overflow-y-auto p-4 space-y-4 scroll-custom texto-biblico text-base">
            <div class="bg-gray-100 dark:bg-gray-800 p-3 rounded-2xl max-w-[85%]">
                Paz do Senhor! Em que posso auxiliar no seu estudo hoje?
            </div>
        </div>

        <div class="p-4 border-t dark:border-gray-800 bg-gray-50 dark:bg-gray-900">
            <div class="flex gap-2">
                <input id="inputPergunta" type="text" placeholder="Sua pergunta..." class="flex-1 p-3 rounded-xl border dark:bg-gray-800 dark:border-gray-700 outline-none focus:ring-2 focus:ring-indigo-500">
                <button id="btnEnviar" class="bg-indigo-600 text-white px-5 rounded-xl font-bold active:scale-95 transition-all">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES GERAIS
        let dadosBiblia = null;
        let indiceLivro = 0;
        let indiceCapitulo = 0;

        // --- CARREGAMENTO DA BÍBLIA ---
        async function carregarBiblia() {
            try {
                // Tenta carregar local, se falhar (ex: rodando direto do PC), avisa o usuário
                const resp = await fetch('arc.json');
                if (!resp.ok) throw new Error();
                dadosBiblia = await resp.json();
                
                popularSeletores();
                renderizarTexto();
            } catch (err) {
                document.getElementById('leituraDisplay').innerHTML = `
                    <div class="text-center p-10">
                        <p class="text-red-500 font-bold">Arquivo arc.json não encontrado!</p>
                        <p class="text-sm mt-2 text-gray-500">Verifique se o arquivo está na mesma pasta do index.html no seu GitHub.</p>
                    </div>`;
            }
        }

        function popularSeletores() {
            const selLivro = document.getElementById('selectLivro');
            selLivro.innerHTML = dadosBiblia.map((l, i) => `<option value="${i}">${l.name}</option>`).join('');
            atualizarSeletorCapitulo();
        }

        function atualizarSeletorCapitulo() {
            const selCap = document.getElementById('selectCapitulo');
            const caps = dadosBiblia[indiceLivro].chapters;
            selCap.innerHTML = caps.map((_, i) => `<option value="${i}">Capítulo ${i+1}</option>`).join('');
            selCap.value = indiceCapitulo;
        }

        function renderizarTexto() {
            const livro = dadosBiblia[indiceLivro];
            const versiculos = livro.chapters[indiceCapitulo];
            
            let html = `<h2 class="text-3xl font-bold mb-8 text-indigo-800 dark:text-indigo-400">${livro.name} ${indiceCapitulo + 1}</h2>`;
            html += versiculos.map((v, i) => `
                <div class="flex gap-4 mb-5 items-start">
                    <span class="text-[10px] font-bold bg-indigo-100 dark:bg-indigo-900/40 text-indigo-600 px-2 py-1 rounded mt-1">${i+1}</span>
                    <p class="flex-1">${v}</p>
                </div>
            `).join('');
            
            document.getElementById('leituraDisplay').innerHTML = html;
            window.scrollTo(0, 0);
        }

        // --- NAVEGAÇÃO ---
        document.getElementById('selectLivro').onchange = (e) => {
            indiceLivro = parseInt(e.target.value);
            indiceCapitulo = 0;
            atualizarSeletorCapitulo();
            renderizarTexto();
        };

        document.getElementById('selectCapitulo').onchange = (e) => {
            indiceCapitulo = parseInt(e.target.value);
            renderizarTexto();
        };

        document.getElementById('btnAvancar').onclick = () => {
            if (indiceCapitulo < dadosBiblia[indiceLivro].chapters.length - 1) {
                indiceCapitulo++;
            } else if (indiceLivro < dadosBiblia.length - 1) {
                indiceLivro++;
                indiceCapitulo = 0;
            }
            sincronizarInterface();
        };

        document.getElementById('btnVoltar').onclick = () => {
            if (indiceCapitulo > 0) {
                indiceCapitulo--;
            } else if (indiceLivro > 0) {
                indiceLivro--;
                indiceCapitulo = dadosBiblia[indiceLivro].chapters.length - 1;
            }
            sincronizarInterface();
        };

        function sincronizarInterface() {
            document.getElementById('selectLivro').value = indiceLivro;
            atualizarSeletorCapitulo();
            renderizarTexto();
        }

        // --- LÓGICA DO ASSISTENTE GEMINI ---
        function abrirChat() { document.getElementById('chatInterface').classList.add('open'); }
        function fecharChat() { document.getElementById('chatInterface').classList.remove('open'); }

        function obterChave() {
            let chave = localStorage.getItem('gemini_key');
            if (!chave) {
                chave = prompt("Cole sua API KEY do Gemini (Google AI Studio) aqui:");
                if (chave) localStorage.setItem('gemini_key', chave);
            }
            return chave;
        }

        function resetarChave() {
            localStorage.removeItem('gemini_key');
