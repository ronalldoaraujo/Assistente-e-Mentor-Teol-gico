<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia ARC & Mentor Teológico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .bible-text { font-family: 'Lora', serif; line-height: 1.8; }
        .chat-drawer { transform: translateX(100%); transition: transform 0.3s ease-in-out; }
        .chat-drawer.open { transform: translateX(0); }
        .glass { backdrop-filter: blur(10px); background-color: rgba(255, 255, 255, 0.9); }
        .dark .glass { background-color: rgba(17, 24, 39, 0.9); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100">

    <header class="sticky top-0 z-40 border-b border-gray-200 dark:border-gray-800 glass px-4 py-3">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 dark:text-indigo-400">Bíblia ARC</h1>
            <div class="flex gap-3">
                <button id="themeToggle" class="p-2 text-xl">🌓</button>
                <button id="openChat" class="bg-indigo-600 text-white px-3 py-1 rounded-lg text-sm font-bold">MENTOR AI</button>
            </div>
        </div>
        <div class="max-w-md mx-auto mt-3 grid grid-cols-2 gap-2">
            <select id="bookSelect" class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-2 py-2 text-sm outline-none"></select>
            <select id="chapterSelect" class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-2 py-2 text-sm outline-none"></select>
        </div>
    </header>

    <main id="bibleContent" class="max-w-md mx-auto p-6 pb-24 bible-text text-xl"></main>

    <div id="chatDrawer" class="fixed inset-0 z-50 chat-drawer flex justify-end">
        <div class="w-full max-w-md bg-white dark:bg-gray-900 h-full shadow-2xl flex flex-col">
            <div class="p-4 border-b dark:border-gray-800 flex justify-between items-center bg-indigo-50 dark:bg-gray-800">
                <div>
                    <h3 class="font-bold text-indigo-900 dark:text-indigo-200">Mentor Teológico</h3>
                    <p class="text-xs text-indigo-600 dark:text-indigo-400">Ortodoxia Pentecostal Clássica</p>
                </div>
                <button id="closeChat" class="text-2xl">&times;</button>
            </div>
            
            <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4 text-sm">
                <div class="bg-gray-100 dark:bg-gray-800 p-3 rounded-lg">
                    Olá! Sou seu Mentor Teológico. Como posso auxiliar seu estudo bíblico hoje dentro da sã doutrina?
                </div>
            </div>

            <div class="p-4 border-t dark:border-gray-800 bg-gray-50 dark:bg-gray-900">
                <div class="flex gap-2">
                    <input id="userInput" type="text" placeholder="Pergunte sobre o texto..." class="flex-1 border dark:border-gray-700 rounded-lg px-3 py-2 bg-white dark:bg-gray-800 outline-none">
                    <button id="sendBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 p-4 flex justify-center gap-4 bg-gradient-to-t from-gray-50 dark:from-gray-900">
        <button id="prevBtn" class="bg-white dark:bg-gray-800 border px-6 py-2 rounded-xl shadow-sm active:scale-95">←</button>
        <button id="nextBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-xl shadow-lg active:scale-95">→</button>
    </nav>

    <script type="module">
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // CONFIGURAÇÃO - COLOQUE SUA CHAVE AQUI
        const API_KEY = "SUA_CHAVE_AQUI"; 
        const genAI = new GoogleGenerativeAI(API_KEY);

        // Perfil Completo do Mentor (Instrução de Sistema)
        const systemInstruction = `Você é o Assistente e Mentor Teológico especialista pessoal... (COLE AQUI TODO O TEXTO DO PERFIL QUE VOCÊ ME ENVIOU)`;

        const model = genAI.getGenerativeModel({ 
            model: "gemini-1.5-flash",
            systemInstruction: systemInstruction 
        });

        let chat = model.startChat({ history: [] });

        // Elementos do Chat
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Interface: Mensagem do Usuário
            appendMessage('user', text);
            userInput.value = '';

            try {
                const result = await chat.sendMessage(text);
                const response = await result.response;
                appendMessage('ai', response.text());
            } catch (error) {
                appendMessage('ai', "Erro: Verifique sua API Key ou conexão.");
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.className = role === 'user' 
                ? "bg-indigo-100 dark:bg-indigo-900/30 p-3 rounded-lg ml-8" 
                : "bg-gray-100 dark:bg-gray-800 p-3 rounded-lg mr-8 border-l-4 border-indigo-500";
            div.innerHTML = `<p class="whitespace-pre-wrap">${text}</p>`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        sendBtn.onclick = sendMessage;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        // Lógica da Bíblia (Simplificada do exemplo anterior)
        let bibleData = null;
        let bIdx = 0, cIdx = 0;

        async function loadBible() {
            const res = await fetch('arc.json');
            bibleData = await res.json();
            
            document.getElementById('bookSelect').innerHTML = bibleData.map((b, i) => `<option value="${i}">${b.name}</option>`).join('');
            updateUI();
        }

        function updateUI() {
            const book = bibleData[bIdx];
            const chapters = book.chapters;
            
            document.getElementById('chapterSelect').innerHTML = chapters.map((_, i) => `<option value="${i}">Capítulo ${i+1}</option>`).join('');
            document.getElementById('chapterSelect').value = cIdx;
            
            document.getElementById('bibleContent').innerHTML = `
                <h2 class="text-2xl font-bold mb-4 text-indigo-700">${book.name} ${cIdx + 1}</h2>
                ${chapters[cIdx].map((v, i) => `<p class="mb-2"><span class="text-xs font-bold text-indigo-400 mr-2">${i+1}</span>${v}</p>`).join('')}
            `;
            window.scrollTo(0,0);
        }

        // Eventos de Navegação e Chat
        document.getElementById('openChat').onclick = () => document.getElementById('chatDrawer').classList.add('open');
        document.getElementById('closeChat').onclick = () => document.getElementById('chatDrawer').classList.remove('open');
        document.getElementById('bookSelect').onchange = (e) => { bIdx = e.target.value; cIdx = 0; updateUI(); };
        document.getElementById('chapterSelect').onchange = (e) => { cIdx = e.target.value; updateUI(); };
        document.getElementById('themeToggle').onclick = () => document.documentElement.classList.toggle('dark');
        
        loadBible();
    </script>
</body>
</html>
