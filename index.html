<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia Sagrada ARC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .bible-text { font-family: 'Lora', serif; line-height: 1.8; }
        .sticky-header { backdrop-filter: blur(10px); background-color: rgba(255, 255, 255, 0.8); }
        .dark .sticky-header { background-color: rgba(17, 24, 39, 0.8); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100">

    <header class="sticky top-0 z-50 border-b border-gray-200 dark:border-gray-800 sticky-header px-4 py-3">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 dark:text-indigo-400">ARC</h1>
            <div class="flex gap-2">
                <button id="themeToggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800">🌓</button>
            </div>
        </div>
        
        <div class="max-w-md mx-auto mt-3 grid grid-cols-2 gap-2">
            <select id="bookSelect" class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></select>
            <select id="chapterSelect" class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 outline-none"></select>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 pb-24 min-h-screen">
        <div id="content" class="bible-text text-xl">
            <div class="flex justify-center items-center h-64 text-gray-400 animate-pulse">
                Carregando as Escrituras...
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-gray-50 dark:from-gray-900 to-transparent">
        <div class="max-w-md mx-auto flex justify-between items-center gap-4">
            <button id="prevBtn" class="flex-1 bg-white dark:bg-gray-800 shadow-lg border border-gray-200 dark:border-gray-700 py-3 rounded-2xl font-semibold active:scale-95 transition-transform disabled:opacity-50">← Anterior</button>
            <button id="nextBtn" class="flex-1 bg-indigo-600 text-white shadow-lg py-3 rounded-2xl font-semibold active:scale-95 transition-transform disabled:opacity-50">Próximo →</button>
        </div>
    </nav>

    <script>
        let bibleData = null;
        let currentBookIndex = 0;
        let currentChapterIndex = 0;

        const bookSelect = document.getElementById('bookSelect');
        const chapterSelect = document.getElementById('chapterSelect');
        const content = document.getElementById('content');
        const themeToggle = document.getElementById('themeToggle');

        // Inicialização
        async function init() {
            try {
                // Tenta carregar localmente. Se falhar, busca na CDN.
                const response = await fetch('arc.json').catch(() => 
                    fetch('https://raw.githubusercontent.com/maatheusgois/bible/main/versions/pt-br/arc.json')
                );
                bibleData = await response.json();
                
                populateBooks();
                renderChapter();
            } catch (err) {
                content.innerHTML = `<p class="text-red-500">Erro ao carregar Bíblia. Verifique o arquivo arc.json.</p>`;
            }
        }

        function populateBooks() {
            bookSelect.innerHTML = bibleData.map((book, i) => 
                `<option value="${i}">${book.name}</option>`
            ).join('');
            updateChapterSelect();
        }

        function updateChapterSelect() {
            const chapters = bibleData[currentBookIndex].chapters;
            chapterSelect.innerHTML = chapters.map((_, i) => 
                `<option value="${i}">Capítulo ${i + 1}</option>`
            ).join('');
            chapterSelect.value = currentChapterIndex;
        }

        function renderChapter() {
            const book = bibleData[currentBookIndex];
            const chapter = book.chapters[currentChapterIndex];
            
            let html = `<h2 class="text-3xl font-bold mb-6 text-indigo-900 dark:text-indigo-300">${book.name} ${currentChapterIndex + 1}</h2>`;
            
            html += chapter.map((verse, i) => `
                <div class="mb-4 flex gap-3">
                    <span class="text-xs mt-2 font-bold text-indigo-500 uppercase">${i + 1}</span>
                    <p class="flex-1">${verse}</p>
                </div>
            `).join('');
            
            content.innerHTML = html;
            window.scrollTo(0, 0);
            
            // Gerenciar estado dos botões
            document.getElementById('prevBtn').disabled = (currentBookIndex === 0 && currentChapterIndex === 0);
            document.getElementById('nextBtn').disabled = (currentBookIndex === bibleData.length - 1 && currentChapterIndex === bibleData[currentBookIndex].chapters.length - 1);
        }

        // Eventos
        bookSelect.onchange = (e) => {
            currentBookIndex = parseInt(e.target.value);
            currentChapterIndex = 0;
            updateChapterSelect();
            renderChapter();
        };

        chapterSelect.onchange = (e) => {
            currentChapterIndex = parseInt(e.target.value);
            renderChapter();
        };

        document.getElementById('nextBtn').onclick = () => {
            const book = bibleData[currentBookIndex];
            if (currentChapterIndex < book.chapters.length - 1) {
                currentChapterIndex++;
            } else if (currentBookIndex < bibleData.length - 1) {
                currentBookIndex++;
                currentChapterIndex = 0;
                bookSelect.value = currentBookIndex;
                updateChapterSelect();
            }
            renderChapter();
        };

        document.getElementById('prevBtn').onclick = () => {
            if (currentChapterIndex > 0) {
                currentChapterIndex--;
            } else if (currentBookIndex > 0) {
                currentBookIndex--;
                currentChapterIndex = bibleData[currentBookIndex].chapters.length - 1;
                bookSelect.value = currentBookIndex;
                updateChapterSelect();
            }
            renderChapter();
        };

        themeToggle.onclick = () => document.documentElement.classList.toggle('dark');

        init();
    </script>
</body>
</html>
