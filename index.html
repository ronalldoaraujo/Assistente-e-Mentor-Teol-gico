<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia ARC Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3073/3073403.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .texto-biblia { font-family: 'Lora', serif; line-height: 1.8; }
        .altura-dinamica { height: 100dvh; }
        
        .gaveta { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        .gaveta.aberta { transform: translateY(0); }
        .modal { transition: opacity 0.2s; opacity: 0; pointer-events: none; }
        .modal.aberto { opacity: 1; pointer-events: auto; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .scroll-suave::-webkit-scrollbar { width: 4px; }
        .scroll-suave::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        .dark .scroll-suave::-webkit-scrollbar-thumb { background: #475569; }
        
        /* VERSÍCULOS */
        .versiculo-marcado { background-color: rgba(250, 204, 21, 0.4); border-radius: 0.5rem; transition: background-color 0.2s; }
        .dark .versiculo-marcado { background-color: rgba(161, 98, 7, 0.4); }
        
        .versiculo-selecionado { background-color: rgba(59, 130, 246, 0.1); border-left: 4px solid #2563eb; border-radius: 0 0.5rem 0.5rem 0; }
        .dark .versiculo-selecionado { background-color: rgba(59, 130, 246, 0.2); border-left-color: #60a5fa; }

        .highlight-busca { font-weight: 700; color: #2563eb; background-color: rgba(59, 130, 246, 0.15); padding: 0 2px; border-radius: 2px; }
        .dark .highlight-busca { color: #60a5fa; background-color: rgba(59, 130, 246, 0.25); }

        /* BOTTOM SHEET DO CHAT */
        #gavetaChat {
            height: 90dvh; /* Ocupa no máximo 90% da tela para não cobrir o cabeçalho superior */
            transform: translateY(100%); /* Começa escondido */
            will-change: transform;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100 pb-safe">

    <header class="fixed top-0 left-0 right-0 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 z-30 p-4 shadow-sm">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-xl font-extrabold text-gray-900 dark:text-gray-100 tracking-tight">Bíblia ARC</h1>
                <div class="flex items-center gap-2">
                    <button onclick="abrirBusca()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform">🔍</button>
                    <button onclick="abrirModalConfig()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform">⚙️</button>
                    <button id="btnTema" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform">🌓</button>
                </div>
            </div>
            <div class="flex gap-2">
                <select id="selLivro" class="flex-[2] bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 appearance-none font-semibold"></select>
                <select id="selCapitulo" class="flex-1 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 appearance-none font-semibold text-center"></select>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-32 px-4 max-w-md mx-auto min-h-screen relative z-10">
        <div id="areaLeitura" class="texto-biblia text-xl">
            <div class="flex flex-col items-center justify-center mt-20 text-blue-600 dark:text-blue-400">
                <svg class="w-12 h-12 mb-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="font-sans font-bold text-lg animate-pulse">Preparando as Escrituras...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-3 z-20 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto flex gap-2">
            <button id="btnAnterior" class="flex-none w-14 bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">←</button>
            <button onclick="abrirChat()" class="flex-1 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 shadow-md p-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform whitespace-nowrap">
                <span class="text-xl">✨</span> Assistente da Bíblia
            </button>
            <button id="btnProximo" class="flex-none w-14 bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">→</button>
        </div>
    </nav>

    <div id="barraSelecao" class="fixed bottom-0 left-0 right-0 bg-gray-900 dark:bg-gray-800 text-white p-4 z-30 gaveta shadow-2xl pb-6 rounded-t-2xl">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="limparSelecao()" class="bg-gray-800 dark:bg-gray-700 hover:bg-gray-700 rounded-full w-8 h-8 flex items-center justify-center font-bold text-lg active:scale-95">&times;</button>
                <span id="contadorSelecao" class="font-bold text-sm tracking-wide">0 selecionados</span>
            </div>
            <div class="flex gap-4">
                <button onclick="acaoMultiplaCopiar()" class="flex flex-col items-center justify-center active:scale-95 transition-transform text-gray-300 hover:text-white">
                    <span class="text-xl">📋</span><span class="text-[10px] font-bold mt-1">Copiar</span>
                </button>
                <button onclick="acaoMultiplaMarcar()" class="flex flex-col items-center justify-center active:scale-95 transition-transform text-gray-300 hover:text-white">
                    <span class="text-xl">🖍️</span><span id="textoBtnMarcar" class="text-[10px] font-bold mt-1">Marcar</span>
                </button>
                <button onclick="acaoMultiplaExplicar()" class="flex flex-col items-center justify-center active:scale-95 transition-transform text-blue-400 font-bold">
                    <span class="text-xl">✨</span><span class="text-[10px] font-bold mt-1">Explicar</span>
                </button>
            </div>
        </div>
    </div>

    <div id="telaBusca" class="fixed inset-0 bg-white dark:bg-gray-900 z-50 flex flex-col gaveta altura-dinamica">
        <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex items-center gap-3">
            <button onclick="fecharBusca()" class="p-2 text-2xl text-gray-500 hover:text-gray-800 dark:hover:text-white">←</button>
            <input type="text" id="inputBusca" placeholder="Buscar na Bíblia..." class="flex-1 p-3 rounded-xl bg-gray-100 dark:bg-gray-800 border-none outline-none focus:ring-2 focus:ring-blue-500 text-base font-sans">
            <button onclick="executarBusca()" class="bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 p-3 rounded-xl font-bold shadow-md active:scale-95">Ir</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 scroll-suave" id="areaResultadosBusca">
            <div id="containerHistoricoBusca" class="mb-6">
                <div class="flex justify-between items-center mb-3">
                    <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wide">Buscas Recentes</h4>
                    <button onclick="limparHistoricoBusca()" class="text-xs text-blue-600 dark:text-blue-400 font-bold active:scale-95">Limpar</button>
                </div>
                <div id="listaHistoricoBusca" class="flex flex-wrap gap-2"></div>
            </div>
            <div id="listaResultadosBusca" class="space-y-4"></div>
        </div>
    </div>

    <div id="gavetaChat" class="fixed bottom-0 left-0 right-0 z-40 flex flex-col bg-white dark:bg-gray-900 shadow-[0_-10px_40px_rgba(0,0,0,0.2)] rounded-t-3xl border border-gray-200 dark:border-gray-700">
        
        <div id="headerChat" class="pt-2 pb-3 px-4 bg-white/90 dark:bg-gray-900/90 backdrop-blur-md rounded-t-3xl border-b border-gray-100 dark:border-gray-800 touch-none select-none cursor-grab active:cursor-grabbing">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto mb-3 pointer-events-none"></div>
            
            <div class="flex justify-between items-center max-w-md mx-auto w-full pointer-events-none">
                <div class="flex items-center gap-2">
                    <span class="text-2xl">✨</span>
                    <div>
                        <h3 class="font-bold text-lg text-gray-900 dark:text-gray-100 leading-tight">Assistente da Bíblia</h3>
                        <p class="text-[11px] text-gray-500 dark:text-gray-400 font-medium">Deslize para ajustar a tela</p>
                    </div>
                </div>
                <div class="flex items-center gap-1 pointer-events-auto">
                    <button onclick="toggleTamanhoChat()" id="btnExpandChat" class="p-2 text-gray-400 hover:text-gray-800 dark:hover:text-white rounded-full font-bold text-lg transition-colors" title="Expandir/Minimizar">⛶</button>
                    <button onclick="limparChat()" class="p-2 text-gray-400 hover:text-red-500 rounded-full font-bold text-lg transition-colors" title="Limpar Estudo">🗑️</button>
                    <button onclick="fecharChat()" class="p-2 text-gray-500 hover:text-gray-800 dark:hover:text-white rounded-full font-bold text-2xl">&times;</button>
                </div>
            </div>
        </div>
        
        <div id="listaMensagens" class="flex-1 overflow-y-auto p-4 space-y-6 scroll-suave bg-gray-50 dark:bg-gray-800/50 overscroll-contain">
            </div>

        <div class="p-4 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 pb-safe">
            <div class="max-w-3xl mx-auto flex gap-2 items-end bg-gray-100 dark:bg-gray-800 rounded-2xl p-2 border border-transparent focus-within:border-gray-300 dark:focus-within:border-gray-600 transition-colors">
                <textarea id="campoPergunta" rows="1" placeholder="Pergunte ao assistente..." class="flex-1 max-h-32 min-h-[44px] p-3 bg-transparent border-none outline-none text-sm font-sans resize-none text-gray-900 dark:text-gray-100 overflow-y-auto scroll-suave"></textarea>
                <button id="btnEnviarMsg" class="w-11 h-11 mb-0.5 flex-shrink-0 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 rounded-xl flex items-center justify-center font-bold active:scale-90 transition-transform shadow-sm disabled:opacity-50">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z" /></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="modalConfig" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 modal">
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 w-full max-w-md shadow-2xl transform transition-all max-h-[90vh] overflow-y-auto scroll-suave">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-xl flex items-center gap-2"><span class="text-2xl">⚙️</span> Configurações</h3>
                <button onclick="fecharModalConfig()" class="text-gray-500 font-bold text-2xl active:scale-95">&times;</button>
            </div>
            <div class="mb-5">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Chave da API (Gemini)</label>
                <input type="text" id="inputChaveApi" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm shadow-inner" placeholder="Ex: AIzaSyB...">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Instruções Adicionais (Opcional)</label>
                <p class="text-[11px] text-gray-500 dark:text-gray-400 mb-3 leading-tight">
                    A alma do Assistente da Bíblia (Ortodoxia Pentecostal) já está ativada. Adicione aqui apenas comandos extras de formatação (ex: "Responda em tópicos").
                </p>
                <textarea id="inputPerfil" rows="4" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-inner resize-none" placeholder="Suas instruções extras aparecerão aqui..."></textarea>
            </div>
            <button onclick="salvarConfig()" class="w-full p-3 rounded-xl font-bold bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 shadow-md active:scale-95 transition-transform">Salvar Dados</button>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // LÓGICA GERAL (Bíblia, Seleção, Busca)
        // ----------------------------------------------------
        let bibliaCompleta = [];
        let indexLivro = parseInt(localStorage.getItem('leitura_livro')) || 0;
        let indexCapitulo = parseInt(localStorage.getItem('leitura_capitulo')) || 0;
        let marcacoes = JSON.parse(localStorage.getItem('biblia_marcacoes')) || {};
        let versiculosSelecionados = [];

        function removerAcentos(str) { return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase(); }

        function formatarMarkdown(texto) {
            let html = texto.trim();
            html = html.replace(/^### (.*$)/gim, '<h3 class="text-lg font-bold mt-5 mb-2 text-gray-900 dark:text-gray-100">$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2 class="text-xl font-bold mt-6 mb-3 text-gray-900 dark:text-gray-100">$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1 class="text-2xl font-bold mt-6 mb-4 text-gray-900 dark:text-gray-100">$1</h1>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-gray-900 dark:text-gray-100">$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/^\* (.*$)/gim, '<li class="ml-5 list-disc mb-1">$1</li>');
            html = html.replace(/^- (.*$)/gim, '<li class="ml-5 list-disc mb-1">$1</li>');
            html = html.split('\n').join('<br>');
            html = html.replace(/<\/li><br>/g, '</li>').replace(/<\/h3><br>/g, '</h3>').replace(/<\/h2><br>/g, '</h2>').replace(/<\/h1><br>/g, '</h1>');
            return html;
        }

        async function iniciarBiblia() {
            try {
                const resposta = await fetch('https://raw.githubusercontent.com/maatheusgois/bible/main/versions/pt-br/arc.json');
                bibliaCompleta = await resposta.json();
                if(indexLivro >= bibliaCompleta.length) indexLivro = 0;
                if(indexCapitulo >= bibliaCompleta[indexLivro].chapters.length) indexCapitulo = 0;
                preencherLivros(); exibirCapitulo(); carregarHistoricoBusca(); carregarHistoricoChat();
            } catch (erro) {
                document.getElementById('areaLeitura').innerHTML = `<div class="text-center mt-20 text-red-500 font-bold">Erro ao conectar.</div>`;
            }
        }

        function salvarEstadoLeitura() { localStorage.setItem('leitura_livro', indexLivro); localStorage.setItem('leitura_capitulo', indexCapitulo); }
        function preencherLivros() { const select = document.getElementById('selLivro'); select.innerHTML = bibliaCompleta.map((l, i) => `<option value="${i}">${l.name}</option>`).join(''); select.value = indexLivro; preencherCapitulos(); }
        function preencherCapitulos() { const select = document.getElementById('selCapitulo'); const total = bibliaCompleta[indexLivro].chapters.length; let options = ''; for(let i = 0; i < total; i++) options += `<option value="${i}">Capítulo ${i + 1}</option>`; select.innerHTML = options; select.value = indexCapitulo; }

        function exibirCapitulo() {
            if(bibliaCompleta.length === 0) return;
            limparSelecao();
            const livroAtual = bibliaCompleta[indexLivro];
            const versiculos = livroAtual.chapters[indexCapitulo];
            let html = `<h2 class="text-3xl font-extrabold mb-8 text-gray-900 dark:text-gray-100 text-center fade-in">${livroAtual.name} ${indexCapitulo + 1}</h2>`;
            versiculos.forEach((texto, i) => {
                const idUnico = `${indexLivro}-${indexCapitulo}-${i}`;
                const classMarcado = marcacoes[idUnico] ? 'versiculo-marcado' : '';
                html += `<div id="v-${idUnico}" onclick="toggleSelecaoVersiculo(${indexLivro}, ${indexCapitulo}, ${i})" class="flex gap-4 mb-5 items-start cursor-pointer p-2 rounded-xl transition-all -mx-2 hover:bg-gray-100 dark:hover:bg-gray-800 ${classMarcado}"><span class="text-[11px] font-black bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-400 px-2 py-1 rounded shadow-sm mt-1.5 flex-shrink-0 pointer-events-none">${i + 1}</span><p class="flex-1 text-gray-800 dark:text-gray-200 leading-relaxed pointer-events-none">${texto}</p></div>`;
            });
            document.getElementById('areaLeitura').innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            salvarEstadoLeitura();
        }

        document.getElementById('selLivro').addEventListener('change', (e) => { indexLivro = parseInt(e.target.value); indexCapitulo = 0; preencherCapitulos(); exibirCapitulo(); });
        document.getElementById('selCapitulo').addEventListener('change', (e) => { indexCapitulo = parseInt(e.target.value); exibirCapitulo(); });
        document.getElementById('btnProximo').addEventListener('click', () => { if (indexCapitulo < bibliaCompleta[indexLivro].chapters.length - 1) { indexCapitulo++; } else if (indexLivro < bibliaCompleta.length - 1) { indexLivro++; indexCapitulo = 0; } document.getElementById('selLivro').value = indexLivro; preencherCapitulos(); exibirCapitulo(); });
        document.getElementById('btnAnterior').addEventListener('click', () => { if (indexCapitulo > 0) { indexCapitulo--; } else if (indexLivro > 0) { indexLivro--; indexCapitulo = bibliaCompleta[indexLivro].chapters.length - 1; } document.getElementById('selLivro').value = indexLivro; preencherCapitulos(); exibirCapitulo(); });

        function toggleSelecaoVersiculo(lIdx, cIdx, vIdx) {
            const idUnico = `${lIdx}-${cIdx}-${vIdx}`;
            const divElement = document.getElementById(`v-${idUnico}`);
            const indexNoArray = versiculosSelecionados.findIndex(v => v.idUnico === idUnico);
            if (indexNoArray > -1) { versiculosSelecionados.splice(indexNoArray, 1); divElement.classList.remove('versiculo-selecionado'); } 
            else { versiculosSelecionados.push({ lIdx, cIdx, vIdx, idUnico, texto: bibliaCompleta[lIdx].chapters[cIdx][vIdx], referencia: `${bibliaCompleta[lIdx].name} ${cIdx + 1}:${vIdx + 1}` }); divElement.classList.add('versiculo-selecionado'); }
            atualizarBarraSelecao();
        }

        function atualizarBarraSelecao() {
            const barra = document.getElementById('barraSelecao');
            if (versiculosSelecionados.length > 0) {
                document.getElementById('contadorSelecao').innerText = `${versiculosSelecionados.length} selecionado${versiculosSelecionados.length > 1 ? 's' : ''}`;
                document.getElementById('textoBtnMarcar').innerText = versiculosSelecionados.every(v => marcacoes[v.idUnico]) ? "Desmarcar" : "Marcar";
                barra.classList.add('aberta');
            } else { barra.classList.remove('aberta'); }
        }

        function limparSelecao() { versiculosSelecionados.forEach(v => { const el = document.getElementById(`v-${v.idUnico}`); if(el) el.classList.remove('versiculo-selecionado'); }); versiculosSelecionados = []; atualizarBarraSelecao(); }
        function acaoMultiplaCopiar() { versiculosSelecionados.sort((a, b) => a.vIdx - b.vIdx); let t = ""; versiculosSelecionados.forEach(v => { t += `"${v.texto}" (${v.referencia})\n`; }); navigator.clipboard.writeText(t.trim()).then(() => { limparSelecao(); alert("Copiado!"); }); }
        function acaoMultiplaMarcar() { const todosMarcados = versiculosSelecionados.every(v => marcacoes[v.idUnico]); versiculosSelecionados.forEach(v => { const id = v.idUnico; if (todosMarcados) delete marcacoes[id]; else marcacoes[id] = true; const d = document.getElementById(`v-${id}`); if(d) { if(marcacoes[id]) d.classList.add('versiculo-marcado'); else d.classList.remove('versiculo-marcado'); } }); localStorage.setItem('biblia_marcacoes', JSON.stringify(marcacoes)); limparSelecao(); }
        function acaoMultiplaExplicar() { versiculosSelecionados.sort((a, b) => a.vIdx - b.vIdx); let t = ""; versiculosSelecionados.forEach(v => { t += `"${v.texto}" (${v.referencia})\n`; }); const prompt = `Por favor, explique esta passagem à luz da Palavra:\n\n${t}`; limparSelecao(); abrirChat(); const ta = document.getElementById('campoPergunta'); ta.value = prompt; ta.style.height = 'auto'; ta.style.height = ta.scrollHeight + 'px'; setTimeout(() => document.getElementById('btnEnviarMsg').click(), 300); }

        let historicoBusca = JSON.parse(localStorage.getItem('biblia_historico_busca')) || [];
        function abrirBusca() { document.getElementById('telaBusca').classList.add('aberta'); document.getElementById('inputBusca').focus(); }
        function fecharBusca() { document.getElementById('telaBusca').classList.remove('aberta'); }
        function carregarHistoricoBusca() { const c = document.getElementById('listaHistoricoBusca'); if(historicoBusca.length===0){c.innerHTML='<span class="text-xs text-gray-400">Vazio.</span>';return;} c.innerHTML=historicoBusca.map(t=>`<button onclick="document.getElementById('inputBusca').value='${t}'; executarBusca();" class="px-3 py-1.5 bg-gray-200 dark:bg-gray-800 text-gray-800 dark:text-gray-200 rounded-lg text-sm font-semibold active:scale-95 transition-transform">${t}</button>`).join(''); }
        function limparHistoricoBusca() { historicoBusca = []; localStorage.setItem('biblia_historico_busca', JSON.stringify(historicoBusca)); carregarHistoricoBusca(); }
        function executarBusca() { const i=document.getElementById('inputBusca'); const t=i.value.trim(); if(t.length<2) return alert("Digite 2+ letras."); if(!historicoBusca.includes(t)){historicoBusca.unshift(t);if(historicoBusca.length>8)historicoBusca.pop();localStorage.setItem('biblia_historico_busca',JSON.stringify(historicoBusca));carregarHistoricoBusca();} const a=document.getElementById('listaResultadosBusca'); a.innerHTML=`<div class="text-center p-4 text-blue-500 font-bold animate-pulse">Buscando...</div>`; setTimeout(()=>{const tl=removerAcentos(t);let res=[];for(let l=0;l<bibliaCompleta.length;l++){for(let c=0;c<bibliaCompleta[l].chapters.length;c++){for(let v=0;v<bibliaCompleta[l].chapters[c].length;v++){const tx=bibliaCompleta[l].chapters[c][v];if(removerAcentos(tx).includes(tl))res.push({lIdx:l,cIdx:c,vIdx:v,livro:bibliaCompleta[l].name,texto:tx});}}}if(res.length===0){a.innerHTML=`<div class="text-center p-8 text-gray-500">Nada encontrado.</div>`;return;} let html=`<p class="text-sm font-bold text-gray-500 mb-4">${res.length} resultados</p>`;const rgx=new RegExp(`(${t})`,'gi');res.forEach(r=>{html+=`<div onclick="irParaResultado(${r.lIdx},${r.cIdx},${r.vIdx})" class="p-4 bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 cursor-pointer active:scale-95 transition-transform fade-in"><span class="text-xs font-black text-blue-600 dark:text-blue-400 uppercase tracking-wider block mb-1">${r.livro} ${r.cIdx+1}:${r.vIdx+1}</span><p class="texto-biblia text-gray-800 dark:text-gray-200">${r.texto.replace(rgx,'<span class="highlight-busca">$1</span>')}</p></div>`;});a.innerHTML=html;}, 50); }
        function irParaResultado(l, c, v) { fecharBusca(); indexLivro = l; indexCapitulo = c; document.getElementById('selLivro').value = l; preencherCapitulos(); exibirCapitulo(); setTimeout(() => { const el = document.getElementById(`v-${l}-${c}-${v}`); if(el) { window.scrollTo({ top: (el.getBoundingClientRect().top - document.body.getBoundingClientRect().top) - 100, behavior: 'smooth' }); el.style.transition = 'background-color 0.5s'; el.style.backgroundColor = 'rgba(59, 130, 246, 0.2)'; setTimeout(() => el.style.backgroundColor = '', 1500); } }, 300); }
        document.getElementById('inputBusca').addEventListener('keypress', function (e) { if (e.key === 'Enter') executarBusca(); });

        // ----------------------------------------------------
        // BOTTOM SHEET DRAGGABLE (O Chat Deslizante)
        // ----------------------------------------------------
        const gavetaChat = document.getElementById('gavetaChat');
        const headerChat = document.getElementById('headerChat');
        const btnExpand = document.getElementById('btnExpandChat');
        let estadoChat = 'fechado'; // fechado, metade, tela_cheia
        
        let isDragging = false;
        let startY = 0;
        let currentTranslateY = 0;

        function setEstadoChat(estado) {
            estadoChat = estado;
            gavetaChat.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            
            if(estado === 'fechado') {
                gavetaChat.style.transform = 'translateY(100%)';
            } else if (estado === 'metade') {
                gavetaChat.style.transform = 'translateY(50%)';
                btnExpand.innerHTML = '⛶';
            } else if (estado === 'tela_cheia') {
                gavetaChat.style.transform = 'translateY(0%)';
                btnExpand.innerHTML = '⎯';
            }
        }

        function abrirChat() { 
            setEstadoChat('metade'); 
            setTimeout(() => rolarChatParaBaixo(), 300); 
        }
        function fecharChat() { setEstadoChat('fechado'); }
        function toggleTamanhoChat() {
            if(estadoChat === 'metade') setEstadoChat('tela_cheia');
            else setEstadoChat('metade');
        }

        // Lógica de Arrastar (Touch para Celular)
        headerChat.addEventListener('touchstart', (e) => {
            isDragging = true;
            startY = e.touches[0].clientY;
            gavetaChat.style.transition = 'none'; // Desliga a animação para seguir o dedo solto
            
            // Calcula onde a gaveta está na tela no momento do clique
            const rect = gavetaChat.getBoundingClientRect();
            const baseTop = window.innerHeight - gavetaChat.offsetHeight;
            currentTranslateY = rect.top - baseTop;
        }, {passive: true});

        headerChat.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const currentY = e.touches[0].clientY;
            const deltaY = currentY - startY;
            let newY = currentTranslateY + deltaY;
            
            if (newY < 0) newY = 0; // Trava no limite máximo (não passa do topo)
            gavetaChat.style.transform = `translateY(${newY}px)`;
        }, {passive: true});

        headerChat.addEventListener('touchend', (e) => {
            if (!isDragging) return;
            isDragging = false;
            
            // Decide para qual estado "Pular" baseado em onde o usuário soltou o dedo
            const rect = gavetaChat.getBoundingClientRect();
            const baseTop = window.innerHeight - gavetaChat.offsetHeight;
            const finalTranslateY = rect.top - baseTop;
            const h = gavetaChat.offsetHeight;
            
            if (finalTranslateY < h * 0.25) {
                setEstadoChat('tela_cheia');
            } else if (finalTranslateY > h * 0.75) {
                setEstadoChat('fechado');
            } else {
                setEstadoChat('metade');
            }
        });

        // Lógica de Arrastar (Mouse para PC)
        headerChat.addEventListener('mousedown', (e) => {
            isDragging = true;
            startY = e.clientY;
            gavetaChat.style.transition = 'none';
            const rect = gavetaChat.getBoundingClientRect();
            const baseTop = window.innerHeight - gavetaChat.offsetHeight;
            currentTranslateY = rect.top - baseTop;
        });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaY = e.clientY - startY;
            let newY = currentTranslateY + deltaY;
            if (newY < 0) newY = 0;
            gavetaChat.style.transform = `translateY(${newY}px)`;
        });
        document.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false;
            const rect = gavetaChat.getBoundingClientRect();
            const baseTop = window.innerHeight - gavetaChat.offsetHeight;
            const finalTranslateY = rect.top - baseTop;
            const h = gavetaChat.offsetHeight;
            if (finalTranslateY < h * 0.25) setEstadoChat('tela_cheia');
            else if (finalTranslateY > h * 0.75) setEstadoChat('fechado');
            else setEstadoChat('metade');
        });


        // ----------------------------------------------------
        // LÓGICA DA IA (ALMA BLINDADA) E CONFIGS
        // ----------------------------------------------------
        const listaMsg = document.getElementById('listaMensagens');
        const inputMsg = document.getElementById('campoPergunta');
        const modalConfig = document.getElementById('modalConfig');
        const inputChaveApi = document.getElementById('inputChaveApi');
        const inputPerfil = document.getElementById('inputPerfil');

        const ALMA_INTERNA = "Atue como um exímio Teólogo. Adote a ortodoxia Neo Testamentária, a ortodoxia do Protestantismo Histórico e a Ortodoxia Pentecostal Clássica das Assembleias de Deus.";
        let historicoChat = JSON.parse(localStorage.getItem('biblia_historico_chat')) || [];

        inputMsg.addEventListener('input', function() {
            this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px';
            document.getElementById('btnEnviarMsg').style.opacity = this.value.trim() === '' ? '0.5' : '1';
        });

        function abrirModalConfig() { inputChaveApi.value = localStorage.getItem('chave_secreta_gemini') || ''; inputPerfil.value = localStorage.getItem('perfil_ia_gemini') || ''; modalConfig.classList.add('aberto'); }
        function fecharModalConfig() { modalConfig.classList.remove('aberto'); }
        function salvarConfig() { if(inputChaveApi.value.trim() === '') return alert("A chave da API é obrigatória."); localStorage.setItem('chave_secreta_gemini', inputChaveApi.value.trim()); localStorage.setItem('perfil_ia_gemini', inputPerfil.value.trim()); fecharModalConfig(); }

        function carregarHistoricoChat() {
            if(historicoChat.length === 0) {
                listaMsg.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center fade-in opacity-50 px-6 pt-10"><span class="text-5xl mb-4">✨</span><h2 class="text-xl font-bold text-gray-800 dark:text-gray-200 mb-2">Estudo Paralelo</h2><p class="text-sm text-gray-500">Leia a Bíblia e converse comigo ao mesmo tempo.</p></div>`;
                return;
            }
            listaMsg.innerHTML = '';
            historicoChat.forEach(msg => renderizarBalao(msg.role, msg.texto, false));
            rolarChatParaBaixo();
        }

        function limparChat() { if(confirm("Deseja iniciar um novo estudo e limpar as conversas da tela?")) { historicoChat = []; localStorage.removeItem('biblia_historico_chat'); carregarHistoricoChat(); } }

        function renderizarBalao(role, texto, animar = true) {
            const classeAnim = animar ? 'fade-in' : '';
            const telaVazia = listaMsg.querySelector('h2'); if (telaVazia) listaMsg.innerHTML = '';
            if(role === 'user') {
                listaMsg.innerHTML += `<div class="flex justify-end mb-2 ${classeAnim}"><div class="bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-gray-100 px-4 py-3 rounded-3xl rounded-tr-sm max-w-[85%] font-sans text-[15px] shadow-sm whitespace-pre-wrap">${texto}</div></div>`;
            } else {
                listaMsg.innerHTML += `<div class="flex gap-3 mb-6 mt-4 ${classeAnim}"><div class="w-8 h-8 rounded-full bg-gray-900 dark:bg-gray-100 flex items-center justify-center text-white dark:text-gray-900 flex-shrink-0 mt-0.5 shadow-md"><span class="text-sm">✨</span></div><div class="text-gray-800 dark:text-gray-200 font-sans text-[15px] leading-relaxed w-full">${formatarMarkdown(texto)}</div></div>`;
            }
        }

        function adicionarMensagem(role, texto) { historicoChat.push({ role, texto }); localStorage.setItem('biblia_historico_chat', JSON.stringify(historicoChat)); renderizarBalao(role, texto, true); rolarChatParaBaixo(); }
        function rolarChatParaBaixo() { setTimeout(() => { listaMsg.scrollTop = listaMsg.scrollHeight; }, 100); }

        document.getElementById('btnEnviarMsg').addEventListener('click', async () => {
            const pergunta = inputMsg.value.trim();
            if (!pergunta) return;

            const chaveApi = localStorage.getItem('chave_secreta_gemini');
            if (!chaveApi) { abrirModalConfig(); return; }

            const instrucaoExtra = localStorage.getItem('perfil_ia_gemini') || '';
            const instrucaoFinalCombinada = instrucaoExtra ? `${ALMA_INTERNA}\n\nInstruções extras do usuário: ${instrucaoExtra}` : ALMA_INTERNA;

            adicionarMensagem('user', pergunta);
            inputMsg.value = ''; inputMsg.style.height = 'auto'; document.getElementById('btnEnviarMsg').style.opacity = '0.5';

            const idLoader = 'load-' + Date.now();
            listaMsg.innerHTML += `<div id="${idLoader}" class="flex gap-3 mb-6 mt-4 fade-in"><div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center text-gray-500 flex-shrink-0 animate-pulse">✨</div><div class="text-gray-500 dark:text-gray-400 font-sans text-[15px] italic mt-1 animate-pulse">Meditando nas Escrituras...</div></div>`;
            rolarChatParaBaixo();

            let histFormatado = "";
            historicoChat.slice(-5, -1).forEach(m => { histFormatado += `${m.role === 'user' ? 'Usuário' : 'IA'}: ${m.texto}\n`; });

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${chaveApi}`;
            
            try {
                const resposta = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Instrução: ${instrucaoFinalCombinada}\n\nHistórico:\n${histFormatado}\n\nPergunta: ${pergunta}` }] }],
                        generationConfig: { temperature: 0.3, maxOutputTokens: 8192, topP: 0.95, topK: 40 }
                    })
                });
                
                const dados = await resposta.json();
                document.getElementById(idLoader).remove();

                if (dados.error) {
                    let msgErro = dados.error.message;
                    if (msgErro.includes("Quota") || msgErro.includes("exceeded")) msgErro = "Irmão, estamos consultando a base de dados muito rápido. Aguarde uns segundos.";
                    else if (msgErro.includes("API key not valid")) msgErro = "Sua chave da API é inválida. Verifique as configurações.";
                    else msgErro = `⚠️ Contratempo de conexão. Tente novamente em breve.`;
                    renderizarBalao('ia', msgErro, true);
                    return;
                }

                adicionarMensagem('ia', dados.candidates?.[0]?.content?.parts?.[0]?.text || "Erro ao formular resposta.");
            } catch (erro) {
                document.getElementById(idLoader).remove();
                renderizarBalao('ia', "⚠️ Erro de rede. Verifique sua conexão.", true);
            }
        });

        document.getElementById('campoPergunta').addEventListener('keydown', function (e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('btnEnviarMsg').click(); } });
        document.getElementById('btnTema').addEventListener('click', () => { document.documentElement.classList.toggle('dark'); });
        window.onload = iniciarBiblia;

        // ----------------------------------------------------
        // REGISTRO PWA
        // ----------------------------------------------------
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(()=>{}); }); }
    </script>
</body>
</html>
