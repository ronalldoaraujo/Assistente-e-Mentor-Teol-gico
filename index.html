<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia ARC Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3073/3073403.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; transition: padding-bottom 0.3s ease; }
        .texto-biblia { font-family: 'Lora', serif; line-height: 1.8; }
        .altura-dinamica { height: 100dvh; }
        
        .modal { transition: opacity 0.2s; opacity: 0; pointer-events: none; }
        .modal.aberto { opacity: 1; pointer-events: auto; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .scroll-suave::-webkit-scrollbar { width: 4px; }
        .scroll-suave::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        .dark .scroll-suave::-webkit-scrollbar-thumb { background: #475569; }
        
        .versiculo-marcado { background-color: rgba(250, 204, 21, 0.4); border-radius: 0.5rem; transition: background-color 0.2s; }
        .dark .versiculo-marcado { background-color: rgba(161, 98, 7, 0.4); }
        .versiculo-selecionado { background-color: rgba(59, 130, 246, 0.1); border-left: 4px solid #2563eb; border-radius: 0 0.5rem 0.5rem 0; }
        .dark .versiculo-selecionado { background-color: rgba(59, 130, 246, 0.2); border-left-color: #60a5fa; }
        .highlight-busca { font-weight: 700; color: #2563eb; background-color: rgba(59, 130, 246, 0.15); padding: 0 2px; border-radius: 2px; }
        .dark .highlight-busca { color: #60a5fa; background-color: rgba(59, 130, 246, 0.25); }

        .bottom-sheet {
            position: fixed; left: 0; right: 0; bottom: 76px; z-index: 50;
            background: white; display: flex; flex-direction: column;
            border-radius: 1.5rem 1.5rem 0 0;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s cubic-bezier(0.3, 0.9, 0.3, 1), height 0.3s cubic-bezier(0.3, 0.9, 0.3, 1);
        }
        .dark .bottom-sheet { background: #0f172a; box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5); border-top: 1px solid #1e293b; }
        
        .sheet-hidden { transform: translateY(120%); opacity: 0; pointer-events: none; }
        .sheet-half { transform: translateY(0); height: 50dvh; opacity: 1; pointer-events: auto; }
        .sheet-full { transform: translateY(0); height: calc(100dvh - 76px); opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100 pb-safe">

    <header class="fixed top-0 left-0 right-0 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 z-30 p-4 shadow-sm">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-xl font-extrabold text-gray-900 dark:text-gray-100 tracking-tight">Bíblia ARC</h1>
                <div class="flex items-center gap-2">
                    <button onclick="abrirBusca()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform" title="Buscar">🔍</button>
                    <button onclick="abrirModalConfig()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform" title="Configurações">⚙️</button>
                    <button id="btnTema" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform" title="Modo Escuro">🌓</button>
                </div>
            </div>
            <div class="flex gap-2">
                <select id="selLivro" class="flex-[2] bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 appearance-none font-semibold"></select>
                <select id="selCapitulo" class="flex-1 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 appearance-none font-semibold text-center"></select>
            </div>
        </div>
    </header>

    <main id="mainBiblia" class="pt-32 pb-24 px-4 max-w-md mx-auto min-h-screen">
        <div id="areaLeitura" class="texto-biblia text-xl">
            <div class="flex flex-col items-center justify-center mt-20 text-blue-600 dark:text-blue-400">
                <svg class="w-12 h-12 mb-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="font-sans font-bold text-lg animate-pulse">Carregando...</p>
            </div>
        </div>
    </main>

    <nav id="navInferior" class="fixed bottom-0 left-0 right-0 h-[76px] bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-3 z-40 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto flex gap-2">
            <button id="btnAnterior" class="flex-none w-14 bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">←</button>
            <button onclick="toggleChat()" class="flex-1 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 shadow-md p-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform whitespace-nowrap">
                <span class="text-xl">✨</span> Assistente da Bíblia
            </button>
            <button id="btnProximo" class="flex-none w-14 bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">→</button>
        </div>
    </nav>

    <div id="gavetaChat" class="bottom-sheet sheet-hidden">
        <div id="dragHandle" class="w-full pt-3 pb-1 flex justify-center cursor-pointer touch-none">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full"></div>
        </div>
        <div class="px-4 pb-3 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">✨</span>
                <div>
                    <h3 class="font-bold text-lg text-gray-900 dark:text-gray-100 leading-tight">Assistente da Bíblia</h3>
                    <p class="text-[11px] text-gray-500 dark:text-gray-400 font-medium">Ortodoxia & Teologia</p>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button onclick="limparChat()" class="p-2 text-gray-400 hover:text-red-500 rounded-full font-bold text-lg transition-colors" title="Novo Estudo">🗑️</button>
                <button onclick="toggleTamanhoChat()" id="btnTamanhoChat" class="p-2 text-gray-400 hover:text-blue-500 rounded-full font-bold text-lg transition-colors" title="Ajustar Tela">⛶</button>
                <button onclick="mudarEstadoChat('hidden')" class="p-2 text-gray-500 hover:text-gray-800 dark:hover:text-white rounded-full font-bold text-2xl">&times;</button>
            </div>
        </div>
        <div id="listaMensagens" class="flex-1 overflow-y-auto p-4 space-y-6 scroll-suave bg-gray-50 dark:bg-gray-800/50"></div>
        <div class="p-4 bg-white dark:bg-[#0f172a] border-t border-gray-200 dark:border-gray-800 pb-safe">
            <div class="max-w-3xl mx-auto flex gap-2 items-end bg-gray-100 dark:bg-gray-800 rounded-2xl p-2 border border-transparent focus-within:border-gray-300 dark:focus-within:border-gray-600 transition-colors">
                <textarea id="campoPergunta" rows="1" placeholder="Pergunte ou comente um versículo..." class="flex-1 max-h-32 min-h-[44px] p-3 bg-transparent border-none outline-none text-sm font-sans resize-none text-gray-900 dark:text-gray-100 overflow-y-auto scroll-suave"></textarea>
                <button id="btnEnviarMsg" class="w-11 h-11 mb-0.5 flex-shrink-0 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 rounded-xl flex items-center justify-center font-bold active:scale-90 transition-transform shadow-sm opacity-50 disabled:opacity-50">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z" /></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="barraSelecao" class="fixed bottom-0 left-0 right-0 bg-blue-600 dark:bg-blue-800 text-white p-4 z-[60] transition-transform duration-300 translate-y-full shadow-[0_-15px_40px_rgba(0,0,0,0.3)] pb-6 rounded-t-2xl min-h-[90px]">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="limparSelecao()" class="bg-blue-700 hover:bg-blue-900 rounded-full w-8 h-8 flex items-center justify-center font-bold text-lg active:scale-95">&times;</button>
                <span id="contadorSelecao" class="font-bold text-sm tracking-wide">0 selecionados</span>
            </div>
            <div class="flex gap-5">
                <button onclick="acaoMultiplaCopiar()" class="flex flex-col items-center justify-center active:scale-95 transition-transform text-blue-100 hover:text-white">
                    <span class="text-xl">📋</span><span class="text-[10px] font-bold mt-1">Copiar</span>
                </button>
                <button onclick="acaoMultiplaMarcar()" class="flex flex-col items-center justify-center active:scale-95 transition-transform text-blue-100 hover:text-white">
                    <span class="text-xl">🖍️</span><span id="textoBtnMarcar" class="text-[10px] font-bold mt-1">Marcar</span>
                </button>
                <button onclick="acaoMultiplaExplicar()" class="flex flex-col items-center justify-center active:scale-95 transition-transform font-bold bg-white text-blue-700 px-3 py-1.5 rounded-xl shadow-sm">
                    <span class="text-lg">✨</span><span class="text-[10px] mt-0.5 uppercase tracking-wider">Explicar</span>
                </button>
            </div>
        </div>
    </div>

    <div id="telaBusca" class="fixed inset-0 bg-white dark:bg-gray-900 z-[70] flex flex-col transition-transform duration-300 translate-y-full altura-dinamica">
        <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex items-center gap-3">
            <button onclick="fecharBusca()" class="p-2 text-2xl text-gray-500 hover:text-gray-800 dark:hover:text-white">←</button>
            <input type="text" id="inputBusca" placeholder="Buscar..." class="flex-1 p-3 rounded-xl bg-gray-100 dark:bg-gray-800 border-none outline-none focus:ring-2 focus:ring-blue-500 text-base font-sans">
            <button onclick="executarBusca()" class="bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 p-3 rounded-xl font-bold shadow-md active:scale-95">Ir</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 scroll-suave" id="areaResultadosBusca">
            <div id="containerHistoricoBusca" class="mb-6">
                <div class="flex justify-between items-center mb-3">
                    <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wide">Recentes</h4>
                    <button onclick="limparHistoricoBusca()" class="text-xs text-blue-600 dark:text-blue-400 font-bold active:scale-95">Limpar</button>
                </div>
                <div id="listaHistoricoBusca" class="flex flex-wrap gap-2"></div>
            </div>
            <div id="listaResultadosBusca" class="space-y-4"></div>
        </div>
    </div>

    <div id="modalConfig" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[80] flex items-center justify-center p-4 modal">
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 w-full max-w-md shadow-2xl transform transition-all max-h-[90vh] overflow-y-auto scroll-suave">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-xl flex items-center gap-2"><span class="text-2xl">⚙️</span> Configurações</h3>
                <button onclick="fecharModalConfig()" class="text-gray-500 font-bold text-2xl active:scale-95">&times;</button>
            </div>
            <div class="mb-5">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Chave da API (Gemini)</label>
                <input type="text" id="inputChaveApi" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm shadow-inner">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Instruções Extras (Opcional)</label>
                <p class="text-[11px] text-gray-500 dark:text-gray-400 mb-3 leading-tight">A identidade teológica já está blindada internamente. Use este espaço apenas para formatação visual (ex: "Responda de forma concisa").</p>
                <textarea id="inputPerfil" rows="4" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-inner resize-none"></textarea>
            </div>
            <button onclick="salvarConfig()" class="w-full p-3 rounded-xl font-bold bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 shadow-md active:scale-95 transition-transform">Salvar Dados</button>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // UTILITÁRIOS E DADOS GLOBAIS
        // ----------------------------------------------------
        let biblia = [], versiculosSelecionados = [], historicoChat = JSON.parse(localStorage.getItem('biblia_historico_chat')) || [], historicoBusca = JSON.parse(localStorage.getItem('biblia_historico_busca')) || [];
        let iLivro = parseInt(localStorage.getItem('leitura_livro')) || 0, iCap = parseInt(localStorage.getItem('leitura_capitulo')) || 0;
        let marcacoes = JSON.parse(localStorage.getItem('biblia_marcacoes')) || {};
        
        const ALMA_INTERNA = "Atue como um exímio teólogo de mente neotestamentária, raiz protestante histórica e identidade pentecostal clássica das Assembleias de Deus, respondendo a partir dessa única consciência doutrinária indivisível.";

        const removerAcentos = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
        
        function formatarMarkdown(txt) {
            let html = txt.trim().replace(/^### (.*$)/gim, '<h3 class="text-lg font-bold mt-5 mb-2 text-gray-900 dark:text-gray-100">$1</h3>')
                       .replace(/^## (.*$)/gim, '<h2 class="text-xl font-bold mt-6 mb-3 text-gray-900 dark:text-gray-100">$1</h2>')
                       .replace(/^# (.*$)/gim, '<h1 class="text-2xl font-bold mt-6 mb-4 text-gray-900 dark:text-gray-100">$1</h1>')
                       .replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-gray-900 dark:text-gray-100">$1</strong>')
                       .replace(/\*(.*?)\*/g, '<em>$1</em>')
                       .replace(/^\* (.*$)/gim, '<li class="ml-5 list-disc mb-1">$1</li>')
                       .replace(/^- (.*$)/gim, '<li class="ml-5 list-disc mb-1">$1</li>');
            return html.split('\n').join('<br>').replace(/<\/li><br>/g, '</li>').replace(/<\/h3><br>/g, '</h3>').replace(/<\/h2><br>/g, '</h2>').replace(/<\/h1><br>/g, '</h1>');
        }

        // ----------------------------------------------------
        // LÓGICA DA BÍBLIA
        // ----------------------------------------------------
        async function iniciarBiblia() {
            try {
                const res = await fetch('https://raw.githubusercontent.com/maatheusgois/bible/main/versions/pt-br/arc.json');
                if (!res.ok) throw new Error();
                biblia = await res.json();
                if(iLivro >= biblia.length) iLivro = 0; if(iCap >= biblia[iLivro].chapters.length) iCap = 0;
                preencherLivros(); carregarHistoricoBusca(); carregarHistoricoChat(); mudarEstadoChat('hidden');
            } catch (e) { document.getElementById('areaLeitura').innerHTML = `<div class="text-center mt-20 text-red-500 font-bold">Erro de conexão.</div>`; }
        }

        function preencherLivros() {
            const sel = document.getElementById('selLivro');
            sel.innerHTML = biblia.map((l, i) => `<option value="${i}">${l.name}</option>`).join('');
            sel.value = iLivro; preencherCapitulos();
        }

        function preencherCapitulos() {
            const sel = document.getElementById('selCapitulo');
            let opts = ''; for(let i=0; i<biblia[iLivro].chapters.length; i++) opts += `<option value="${i}">Capítulo ${i+1}</option>`;
            sel.innerHTML = opts; sel.value = iCap; exibirCapitulo();
        }

        function exibirCapitulo() {
            if(biblia.length === 0) return;
            limparSelecao();
            const livro = biblia[iLivro], versos = livro.chapters[iCap];
            let html = `<h2 class="text-3xl font-extrabold mb-8 text-gray-900 dark:text-gray-100 text-center fade-in">${livro.name} ${iCap + 1}</h2>`;
            
            versos.forEach((txt, i) => {
                const id = `${iLivro}-${iCap}-${i}`, m = marcacoes[id] ? 'versiculo-marcado' : '';
                html += `<div id="v-${id}" onclick="toggleSelecao(${iLivro}, ${iCap}, ${i})" class="flex gap-4 mb-5 items-start cursor-pointer p-2 rounded-xl transition-all -mx-2 hover:bg-gray-100 dark:hover:bg-gray-800 ${m}">
                    <span class="text-[11px] font-black bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-400 px-2 py-1 rounded shadow-sm mt-1.5 flex-shrink-0 pointer-events-none">${i+1}</span>
                    <p class="flex-1 text-gray-800 dark:text-gray-200 leading-relaxed pointer-events-none">${txt}</p></div>`;
            });
            document.getElementById('areaLeitura').innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            localStorage.setItem('leitura_livro', iLivro); localStorage.setItem('leitura_capitulo', iCap);
        }

        document.getElementById('selLivro').addEventListener('change', e => { iLivro = parseInt(e.target.value); iCap = 0; preencherCapitulos(); });
        document.getElementById('selCapitulo').addEventListener('change', e => { iCap = parseInt(e.target.value); exibirCapitulo(); });
        document.getElementById('btnProximo').addEventListener('click', () => { if (iCap < biblia[iLivro].chapters.length - 1) iCap++; else if (iLivro < biblia.length - 1) { iLivro++; iCap=0; } document.getElementById('selLivro').value = iLivro; preencherCapitulos(); });
        document.getElementById('btnAnterior').addEventListener('click', () => { if (iCap > 0) iCap--; else if (iLivro > 0) { iLivro--; iCap = biblia[iLivro].chapters.length - 1; } document.getElementById('selLivro').value = iLivro; preencherCapitulos(); });

        // ----------------------------------------------------
        // LÓGICA DE SELEÇÃO MÚLTIPLA
        // ----------------------------------------------------
        function toggleSelecao(l, c, v) {
            const id = `${l}-${c}-${v}`, el = document.getElementById(`v-${id}`), idx = versiculosSelecionados.findIndex(x => x.id === id);
            if (idx > -1) { versiculosSelecionados.splice(idx, 1); el.classList.remove('versiculo-selecionado'); } 
            else { versiculosSelecionados.push({ l, c, v, id, texto: biblia[l].chapters[c][v], ref: `${biblia[l].name} ${c+1}:${v+1}` }); el.classList.add('versiculo-selecionado'); }
            atualizarBarraSel();
        }

        function atualizarBarraSel() {
            const b = document.getElementById('barraSelecao');
            if (versiculosSelecionados.length > 0) {
                document.getElementById('contadorSelecao').innerText = `${versiculosSelecionados.length} selecionado(s)`;
                document.getElementById('textoBtnMarcar').innerText = versiculosSelecionados.every(x => marcacoes[x.id]) ? "Desmarcar" : "Marcar";
                b.classList.remove('translate-y-full');
            } else { b.classList.add('translate-y-full'); }
        }

        function limparSelecao() { versiculosSelecionados.forEach(x => { const el = document.getElementById(`v-${x.id}`); if(el) el.classList.remove('versiculo-selecionado'); }); versiculosSelecionados = []; atualizarBarraSel(); }
        function acaoMultiplaCopiar() { versiculosSelecionados.sort((a, b) => a.v - b.v); let t = ""; versiculosSelecionados.forEach(x => { t += `"${x.texto}" (${x.ref})\n`; }); navigator.clipboard.writeText(t.trim()).then(() => { limparSelecao(); alert("Copiado!"); }); }
        function acaoMultiplaMarcar() {
            const todos = versiculosSelecionados.every(x => marcacoes[x.id]);
            versiculosSelecionados.forEach(x => {
                if (todos) delete marcacoes[x.id]; else marcacoes[x.id] = true;
                const el = document.getElementById(`v-${x.id}`);
                if(el) { if(marcacoes[x.id]) el.classList.add('versiculo-marcado'); else el.classList.remove('versiculo-marcado'); }
            });
            localStorage.setItem('biblia_marcacoes', JSON.stringify(marcacoes)); limparSelecao();
        }
        function acaoMultiplaExplicar() {
            versiculosSelecionados.sort((a, b) => a.v - b.v);
            let t = ""; versiculosSelecionados.forEach(x => { t += `"${x.texto}" (${x.ref})\n`; });
            limparSelecao(); if(estadoChat === 'hidden') mudarEstadoChat('half');
            const inp = document.getElementById('campoPergunta'); inp.value = `Explique esta passagem:\n\n${t}`; inp.style.height = 'auto'; inp.style.height = inp.scrollHeight + 'px';
            document.getElementById('btnEnviarMsg').style.opacity = '1'; setTimeout(() => document.getElementById('btnEnviarMsg').click(), 300);
        }

        // ----------------------------------------------------
        // LÓGICA DE BUSCA
        // ----------------------------------------------------
        function abrirBusca() { document.getElementById('telaBusca').classList.remove('translate-y-full'); document.getElementById('inputBusca').focus(); }
        function fecharBusca() { document.getElementById('telaBusca').classList.add('translate-y-full'); }
        function limparHistoricoBusca() { historicoBusca = []; localStorage.setItem('biblia_historico_busca', JSON.stringify([])); carregarHistoricoBusca(); }
        function carregarHistoricoBusca() {
            const c = document.getElementById('listaHistoricoBusca');
            if(historicoBusca.length===0) return c.innerHTML = '<span class="text-xs text-gray-400">Nenhuma busca recente.</span>';
            c.innerHTML = historicoBusca.map(t => `<button onclick="document.getElementById('inputBusca').value='${t}'; executarBusca();" class="px-3 py-1.5 bg-gray-200 dark:bg-gray-800 text-sm font-semibold rounded-lg">${t}</button>`).join('');
        }
        function executarBusca() {
            const t = document.getElementById('inputBusca').value.trim(); if(t.length < 2) return;
            if(!historicoBusca.includes(t)) { historicoBusca.unshift(t); if(historicoBusca.length>8) historicoBusca.pop(); localStorage.setItem('biblia_historico_busca', JSON.stringify(historicoBusca)); carregarHistoricoBusca(); }
            const area = document.getElementById('listaResultadosBusca'); area.innerHTML = `<div class="text-center p-4 text-blue-500 animate-pulse">Buscando...</div>`;
            setTimeout(() => {
                const tl = removerAcentos(t); let res = [];
                for(let l=0; l<biblia.length; l++) for(let c=0; c<biblia[l].chapters.length; c++) for(let v=0; v<biblia[l].chapters[c].length; v++) {
                    if(removerAcentos(biblia[l].chapters[c][v]).includes(tl)) res.push({l,c,v, txt:biblia[l].chapters[c][v], ref:`${biblia[l].name} ${c+1}:${v+1}`});
                }
                if(res.length===0) return area.innerHTML = `<div class="p-8 text-center text-gray-500">Nada encontrado.</div>`;
                const rgx = new RegExp(`(${t})`, 'gi');
                area.innerHTML = `<p class="text-sm text-gray-500 mb-4">${res.length} resultados</p>` + res.map(x => `<div onclick="irPara(${x.l},${x.c},${x.v})" class="p-4 bg-white dark:bg-gray-800 rounded-2xl shadow-sm mb-3 cursor-pointer"><span class="text-xs font-black text-blue-500 block mb-1 uppercase">${x.ref}</span><p class="texto-biblia">${x.txt.replace(rgx, '<span class="highlight-busca">$1</span>')}</p></div>`).join('');
            }, 50);
        }
        function irPara(l, c, v) {
            fecharBusca(); iLivro=l; iCap=c; document.getElementById('selLivro').value=l; preencherCapitulos();
            setTimeout(() => { const el = document.getElementById(`v-${l}-${c}-${v}`); if(el){ window.scrollTo({top: el.getBoundingClientRect().top + window.scrollY - 100, behavior:'smooth'}); el.style.backgroundColor = 'rgba(59, 130, 246, 0.2)'; setTimeout(()=>el.style.backgroundColor='',1500); } }, 300);
        }
        document.getElementById('inputBusca').addEventListener('keypress', e => { if(e.key==='Enter') executarBusca(); });

        // ----------------------------------------------------
        // LÓGICA DO ASSISTENTE E ESTRUTURAÇÃO DE API
        // ----------------------------------------------------
        let estadoChat = 'hidden'; 
        const gavetaChat = document.getElementById('gavetaChat'), mainB = document.getElementById('mainBiblia'), drag = document.getElementById('dragHandle');
        
        function mudarEstadoChat(st) {
            estadoChat = st; gavetaChat.className = `bottom-sheet sheet-${st}`;
            mainB.style.paddingBottom = st === 'hidden' ? '90px' : st === 'half' ? 'calc(50dvh + 90px)' : 'calc(100dvh + 90px)';
            document.getElementById('btnTamanhoChat').innerText = st === 'half' ? '⛶' : '🗗';
            if(st !== 'hidden') setTimeout(()=>listaMsg.scrollTop = listaMsg.scrollHeight, 300);
        }
        function toggleChat() { mudarEstadoChat(estadoChat === 'hidden' ? 'half' : 'hidden'); }
        function toggleTamanhoChat() { mudarEstadoChat(estadoChat === 'half' ? 'full' : 'half'); }
        
        let tY = 0; drag.addEventListener('touchstart', e => tY = e.changedTouches[0].screenY, {passive:true});
        drag.addEventListener('touchend', e => { const d = e.changedTouches[0].screenY - tY; if(d < -40 && estadoChat==='half') mudarEstadoChat('full'); else if(d > 40) mudarEstadoChat(estadoChat==='full'?'half':'hidden'); });
        drag.addEventListener('click', toggleTamanhoChat);

        const inputMsg = document.getElementById('campoPergunta');
        inputMsg.addEventListener('input', function() { this.style.height='auto'; this.style.height=(this.scrollHeight)+'px'; document.getElementById('btnEnviarMsg').style.opacity = this.value.trim() ? '1':'0.5'; });
        document.getElementById('campoPergunta').addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('btnEnviarMsg').click(); }});

        function abrirModalConfig() { document.getElementById('inputChaveApi').value = localStorage.getItem('chave_secreta_gemini')||''; document.getElementById('inputPerfil').value = localStorage.getItem('perfil_ia_gemini')||''; document.getElementById('modalConfig').classList.add('aberto'); }
        function fecharModalConfig() { document.getElementById('modalConfig').classList.remove('aberto'); }
        function salvarConfig() { const c = document.getElementById('inputChaveApi').value.trim(); if(!c) return alert("Chave é obrigatória."); localStorage.setItem('chave_secreta_gemini', c); localStorage.setItem('perfil_ia_gemini', document.getElementById('inputPerfil').value.trim()); fecharModalConfig(); }

        function carregarHistoricoChat() {
            if(historicoChat.length===0) return listaMsg.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center opacity-50 px-6 py-10"><span class="text-5xl mb-4">✨</span><h2 class="text-xl font-bold mb-2">Paz do Senhor!</h2><p class="text-sm">Faça sua pergunta teológica.</p></div>`;
            listaMsg.innerHTML = ''; historicoChat.forEach(m => renderBalao(m.role, m.texto, false)); listaMsg.scrollTop = listaMsg.scrollHeight;
        }
        function limparChat() { if(confirm("Limpar conversa?")) { historicoChat=[]; localStorage.setItem('biblia_historico_chat', '[]'); carregarHistoricoChat(); } }

        function renderBalao(role, txt, anim) {
            if(listaMsg.querySelector('h2')) listaMsg.innerHTML='';
            const a = anim ? 'fade-in' : '';
            if(role==='user') listaMsg.innerHTML += `<div class="flex justify-end mb-2 ${a}"><div class="bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-gray-100 px-4 py-3 rounded-3xl rounded-tr-sm max-w-[85%] text-[15px] whitespace-pre-wrap">${txt}</div></div>`;
            else listaMsg.innerHTML += `<div class="flex gap-3 mb-6 mt-4 ${a}"><div class="w-8 h-8 rounded-full bg-gray-900 dark:bg-gray-100 flex items-center justify-center text-white dark:text-gray-900 flex-shrink-0 shadow-md mt-0.5">✨</div><div class="text-gray-800 dark:text-gray-200 text-[15px] w-full leading-relaxed">${formatarMarkdown(txt)}</div></div>`;
        }

        document.getElementById('btnEnviarMsg').addEventListener('click', async () => {
            const p = inputMsg.value.trim(); if(!p) return;
            const k = localStorage.getItem('chave_secreta_gemini'); if(!k) return abrirModalConfig();
            const ex = localStorage.getItem('perfil_ia_gemini')||'';
            const sInst = ex ? `${ALMA_INTERNA}\n\nExtras do usuário: ${ex}` : ALMA_INTERNA;

            historicoChat.push({role:'user', texto:p}); localStorage.setItem('biblia_historico_chat', JSON.stringify(historicoChat)); renderBalao('user', p, true);
            inputMsg.value=''; inputMsg.style.height='auto'; document.getElementById('btnEnviarMsg').style.opacity='0.5'; listaMsg.scrollTop=listaMsg.scrollHeight;

            const idL = 'l-'+Date.now();
            listaMsg.innerHTML += `<div id="${idL}" class="flex gap-3 mb-6 mt-4 fade-in"><div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-gray-500 animate-pulse">✨</div><div class="text-gray-500 italic mt-1 animate-pulse">Meditando...</div></div>`;
            listaMsg.scrollTop=listaMsg.scrollHeight;

            // ESTRUTURAÇÃO OFICIAL DA API (Melhor Prática para evitar limites)
            let conteudosApi = historicoChat.slice(-5, -1).map(m => ({ role: m.role==='ia'?'model':'user', parts: [{text: m.texto}] }));
            conteudosApi.push({ role: 'user', parts: [{text: p}] });

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${k}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        system_instruction: { parts: [{text: sInst}] },
                        contents: conteudosApi,
                        generationConfig: { temperature: 0.3, maxOutputTokens: 8192 }
                    })
                });
                const data = await res.json(); document.getElementById(idL).remove();
                if(data.error) {
                    let err = data.error.message;
                    if(err.includes("Quota")||err.includes("429")) err = "Irmão, estamos consultando muito rápido. Aguarde alguns segundos.";
                    else if(err.includes("API key not valid")) err = "Chave API inválida.";
                    return renderBalao('ia', err, true);
                }
                const r = data.candidates?.[0]?.content?.parts?.[0]?.text || "Erro ao formular.";
                historicoChat.push({role:'ia', texto:r}); localStorage.setItem('biblia_historico_chat', JSON.stringify(historicoChat)); renderBalao('ia', r, true);
                listaMsg.scrollTop=listaMsg.scrollHeight;
            } catch(e) { document.getElementById(idL).remove(); renderBalao('ia', "Erro de conexão.", true); }
        });

        document.getElementById('btnTema').addEventListener('click', () => document.documentElement.classList.toggle('dark'));
        window.onload = iniciarBiblia;
        if('serviceWorker' in navigator) window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
    </script>
</body>
</html>
