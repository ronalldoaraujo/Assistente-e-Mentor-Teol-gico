<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia Sagrada ARC + IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .bible-text { font-family: 'Lora', serif; line-height: 1.8; }
        .sticky-header { backdrop-filter: blur(10px); background-color: rgba(255, 255, 255, 0.8); }
        .dark .sticky-header { background-color: rgba(17, 24, 39, 0.8); }

        /* Estilos do Chat da IA */
        #chat-container {
            position: fixed; bottom: 0; left: 0; right: 0; top: 0;
            background: white; z-index: 200; display: none;
            flex-direction: column;
        }
        .dark #chat-container { background: #111827; }
        #ai-toggle { position: fixed; bottom: 85px; right: 20px; z-index: 100; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100">

    <header class="sticky top-0 z-50 border-b border-gray-200 dark:border-gray-800 sticky-header px-4 py-3">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 dark:text-indigo-400">Bíblia ARC</h1>
            <button id="themeToggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800">🌓</button>
        </div>
        <div class="max-w-md mx-auto mt-3 grid grid-cols-2 gap-2">
            <select id="bookSelect" class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 text-sm outline-none"></select>
            <select id="chapterSelect" class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 text-sm outline-none"></select>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 pb-32 min-h-screen">
        <div id="content" class="bible-text text-xl">Carregando...</div>
    </main>

    <button id="ai-toggle" class="bg-indigo-600 text-white p-4 rounded-full shadow-2xl active:scale-95 transition-transform">
        ✨ IA Teológica
    </button>

    <div id="chat-container">
        <div class="p-4 border-b flex justify-between items-center bg-indigo-600 text-white">
            <span class="font-bold">Assistente de Estudo</span>
            <button id="close-chat" class="p-2 text-2xl">✕</button>
        </div>
        <div id="chat-messages" class="flex-1 overflow-y-auto p-4 space-y-4 text-base">
            <div class="bg-gray-100 dark:bg-gray-800 p-3 rounded-lg">Paz do Senhor! Em que posso ajudar no seu estudo hoje?</div>
        </div>
        <div class="p-4 border-t flex gap-2 bg-white dark:bg-gray-900">
            <input id="chat-input" type="text" placeholder="Pergunte sobre este capítulo..." class="flex-1 p-3 rounded-xl border dark:bg-gray-800 outline-none">
            <button id="send-btn" class="bg-indigo-600 text-white px-4 rounded-xl font-bold">Enviar</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-gray-50 dark:from-gray-900 to-transparent">
        <div class="max-w-md mx-auto flex justify-between gap-4">
            <button id="prevBtn" class="flex-1 bg-white dark:bg-gray-800 shadow-lg border py-3 rounded-2xl font-semibold">← Anterior</button>
            <button id="nextBtn" class="flex-1 bg-indigo-600 text-white shadow-lg py-3 rounded-2xl font-semibold">Próximo →</button>
        </div>
    </nav>

    <script>
        // CONFIGURAÇÃO: COLOQUE SUA CHAVE ABAIXO
        const GEMINI_API_KEY = "AIzaSyCG2kw3f-qCCe4qQnw6INI4Yc98fDUZx4E"; 

        let bibleData = null;
        let currentBookIndex = 0;
        let currentChapterIndex = 0;

        // Elementos da Interface
        const bookSelect = document.getElementById('bookSelect');
        const chapterSelect = document.getElementById('chapterSelect');
        const content = document.getElementById('content');
        const chatContainer = document.getElementById('chat-container');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');

        // Inicializar Bíblia
        async function init() {
            try {
                const response = await fetch('arc.json');
                bibleData = await response.json();
                populateBooks();
                renderChapter();
            } catch (err) {
                content.innerHTML = "Erro ao carregar arquivo arc.json.";
            }
        }

        function populateBooks() {
            bookSelect.innerHTML = bibleData.map((book, i) => `<option value="${i}">${book.name}</option>`).join('');
            updateChapterSelect();
        }

        function updateChapterSelect() {
            const chapters = bibleData[currentBookIndex].chapters;
            chapterSelect.innerHTML = chapters.map((_, i) => `<option value="${i}">Capítulo ${i + 1}</option>`).join('');
            chapterSelect.value = currentChapterIndex;
        }

        function renderChapter() {
            const book = bibleData[currentBookIndex];
            const chapter = book.chapters[currentChapterIndex];
            let html = `<h2 class="text-3xl font-bold mb-6 text-indigo-900 dark:text-indigo-300">${book.name} ${currentChapterIndex + 1}</h2>`;
            html += chapter.map((verse, i) => `<div class="mb-4 flex gap-3"><span class="text-xs mt-2 font-bold text-indigo-500">${i + 1}</span><p>${verse}</p></div>`).join('');
            content.innerHTML = html;
            window.scrollTo(0, 0);
        }

        // Lógica da IA (Gemini)
        async function askGemini(question) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
            const context = `O usuário está lendo ${bibleData[currentBookIndex].name}, capítulo ${currentChapterIndex + 1}. Responda conforme a ortodoxia Assembleiana e Pentecostal Clássica.`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${context}\nPergunta: ${question}` }] }]
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) { return "Erro na conexão."; }
        }

        // Eventos de Clique
        document.getElementById('ai-toggle').onclick = () => chatContainer.style.display = 'flex';
        document.getElementById('close-chat').onclick = () => chatContainer.style.display = 'none';
        document.getElementById('themeToggle').onclick = () => document.documentElement.classList.toggle('dark');

        document.getElementById('send-btn').onclick = async () => {
            const text = chatInput.value.trim();
            if (!text) return;
            chatMessages.innerHTML += `<div class="bg-indigo-100 dark:bg-indigo-900/40 p-3 rounded-lg ml-8 text-right font-semibold">Você: ${text}</div>`;
            chatInput.value = "";
            const response = await askGemini(text);
            chatMessages.innerHTML += `<div class="bg-gray-100 dark:bg-gray-800 p-3 rounded-lg mr-8"><strong>Assistente:</strong> ${response}</div>`;
            chatMessages.scrollTop = chatMessages.scrollHeight;
        };

        // Navegação de capítulos
        bookSelect.onchange = (e) => { currentBookIndex = e.target.value; currentChapterIndex = 0; updateChapterSelect(); renderChapter(); };
        chapterSelect.onchange = (e) => { currentChapterIndex = e.target.value; renderChapter(); };

        init();
    </script>
</body>
</html>
