<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia Sagrada ARC - Edição de Estudo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .bible-text { font-family: 'Lora', serif; line-height: 1.9; }
        .sticky-header { backdrop-filter: blur(12px); background-color: rgba(255, 255, 255, 0.85); }
        .dark .sticky-header { background-color: rgba(17, 24, 39, 0.85); }
        .chat-drawer { transition: transform 0.3s ease-in-out; transform: translateY(100%); }
        .chat-drawer.open { transform: translateY(0); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors">

    <header class="sticky top-0 z-40 border-b border-gray-200 dark:border-gray-800 sticky-header px-4 py-3">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600 dark:text-indigo-400">ARC</h1>
            <div class="flex gap-3">
                <button onclick="configApiKey()" class="p-2 opacity-70">⚙️</button>
                <button id="themeToggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-800">🌓</button>
            </div>
        </div>
        
        <div class="max-w-md mx-auto mt-3 grid grid-cols-2 gap-2">
            <select id="bookSelect" class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl px-3 py-2 text-sm outline-none"></select>
            <select id="chapterSelect" class="bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-xl px-3 py-2 text-sm outline-none"></select>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 pb-32 min-h-screen">
        <div id="content" class="bible-text text-xl">
            <div class="flex justify-center items-center h-64 text-gray-400 animate-pulse">Carregando as Escrituras...</div>
        </div>
    </main>

    <div id="chatDrawer" class="fixed inset-0 z-50 flex flex-col bg-white dark:bg-gray-900 chat-drawer">
        <div class="p-4 border-b dark:border-gray-800 flex justify-between items-center bg-indigo-600 text-white">
            <div>
                <p class="font-bold">Assistente Teológico</p>
                <p class="text-xs opacity-80">Ortodoxia Pentecostal Clássica</p>
            </div>
            <button onclick="toggleChat()" class="p-2 text-xl">✕</button>
        </div>
        <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4 text-base">
            <p class="bg-gray-100 dark:bg-gray-800 p-3 rounded-2xl">Paz do Senhor! Como posso auxiliar no seu estudo hoje?</p>
        </div>
        <div class="p-4 border-t dark:border-gray-800 flex gap-2 mb-2">
            <input id="chatInput" type="text" placeholder="Pergunte sobre o texto..." class="flex-1 p-4 rounded-2xl border dark:border-gray-700 dark:bg-gray-800 outline-none">
            <button id="sendBtn" class="bg-indigo-600 text-white px-6 rounded-2xl font-bold">↑</button>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-gray-50 dark:from-gray-900 via-gray-50 dark:via-gray-900 to-transparent z-40">
        <div class="max-w-md mx-auto grid grid-cols-4 gap-2">
            <button id="prevBtn" class="bg-white dark:bg-gray-800 shadow-md py-3 rounded-2xl font-bold">←</button>
            <button onclick="toggleChat()" class="col-span-2 bg-indigo-600 text-white shadow-lg py-3 rounded-2xl font-bold flex items-center justify-center gap-2">
                ✨ Assistente
            </button>
            <button id="nextBtn" class="bg-white dark:bg-gray-800 shadow-md py-3 rounded-2xl font-bold">→</button>
        </div>
    </nav>

    <script>
        let bibleData = null;
        let currentBookIndex = 0;
        let currentChapterIndex = 0;

        // --- Lógica da Bíblia ---
        async function init() {
            try {
                const response = await fetch('arc.json');
                bibleData = await response.json();
                populateBooks();
                renderChapter();
            } catch (err) {
                document.getElementById('content').innerHTML = "Erro ao carregar o arquivo arc.json.";
            }
        }

        function populateBooks() {
            const select = document.getElementById('bookSelect');
            select.innerHTML = bibleData.map((b, i) => `<option value="${i}">${b.name}</option>`).join('');
            updateChapterSelect();
        }

        function updateChapterSelect() {
            const select = document.getElementById('chapterSelect');
            const chapters = bibleData[currentBookIndex].chapters;
            select.innerHTML = chapters.map((_, i) => `<option value="${i}">Capítulo ${i+1}</option>`).join('');
            select.value = currentChapterIndex;
        }

        function renderChapter() {
            const book = bibleData[currentBookIndex];
            const chapter = book.chapters[currentChapterIndex];
            let html = `<h2 class="text-3xl font-bold mb-8 text-indigo-900 dark:text-indigo-300">${book.name} ${currentChapterIndex + 1}</h2>`;
            html += chapter.map((v, i) => `
                <div class="mb-5 flex gap-4">
                    <span class="text-xs mt-2 font-black text-indigo-500 w-4">${i+1}</span>
                    <p class="flex-1 leading-relaxed">${v}</p>
                </div>
            `).join('');
            document.getElementById('content').innerHTML = html;
            window.scrollTo(0, 0);
        }

        // --- Lógica de Segurança e API Gemini ---
        function getApiKey() {
            let key = localStorage.getItem('gemini_api_key');
            if (!key) {
                key = prompt("Insira a sua API KEY do Google AI Studio para ativar o assistente:");
                if (key) localStorage.setItem('gemini_api_key', key);
            }
            return key;
        }

        function configApiKey() {
            const novaChave = prompt("Configurar nova API KEY (deixe vazio para cancelar):");
            if (novaChave) {
                localStorage.setItem('gemini_api_key', novaChave);
                alert("Chave atualizada!");
            }
        }

        async function askGemini(question) {
            const key = getApiKey();
            if (!key) return "Chave de API necessária.";

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
            const context = `Diretriz: Atue como um teólogo de linha Protestante Histórica e Pentecostal Clássica (Assembleias de Deus). Use o texto da ARC. Contexto: Lendo ${bibleData[currentBookIndex].name}, cap ${currentChapterIndex+1}.`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `${context}\nPergunta: ${question}` }] }]
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) {
                return "Erro na ligação com a IA. Verifique a sua chave.";
            }
        }

        // --- UI Events ---
        function toggleChat() { document.getElementById('chatDrawer').classList.toggle('open'); }

        document.getElementById('sendBtn').onclick = async () => {
            const input = document.getElementById('chatInput');
            const messages = document.getElementById('chatMessages');
            if (!input.value.trim()) return;

            const userMsg = input.value;
            messages.innerHTML += `<div class="bg-indigo-50 dark:bg-indigo-900/20 p-3 rounded-2xl ml-8 text-right"><b>Você:</b> ${userMsg}</div>`;
            input.value = "";
            messages.scrollTop = messages.scrollHeight;

            const loading = document.createElement('div');
            loading.innerText = "Consultando as Escrituras...";
            messages.appendChild(loading);

            const response = await askGemini(userMsg);
            loading.remove();
            messages.innerHTML += `<div class="bg-gray-100 dark:bg-gray-800 p-3 rounded-2xl mr-8"><b>Assistente:</b> ${response}</div>`;
            messages.scrollTop = messages.scrollHeight;
        };

        // Eventos de Navegação
        document.getElementById('bookSelect').onchange = (e) => { currentBookIndex = parseInt(e.target.value); currentChapterIndex = 0; updateChapterSelect(); renderChapter(); };
        document.getElementById('chapterSelect').onchange = (e) => { currentChapterIndex = parseInt(e.target.value); renderChapter(); };
        document.getElementById('themeToggle').onclick = () => document.documentElement.classList.toggle('dark');
        document.getElementById('nextBtn').onclick = () => { /* Lógica de próximo capítulo similar à anterior */ };
        document.getElementById('prevBtn').onclick = () => { /* Lógica de capítulo anterior similar à anterior */ };

        init();
    </script>
</body>
</html>
