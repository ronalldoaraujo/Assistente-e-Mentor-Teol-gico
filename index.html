<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia ARC Premium & IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .texto-biblia { font-family: 'Lora', serif; line-height: 1.8; }
        .altura-dinamica { height: 100dvh; }
        .scroll-suave::-webkit-scrollbar { width: 4px; }
        .scroll-suave::-webkit-scrollbar-thumb { background: #818cf8; border-radius: 4px; }
        
        /* Animações UI Premium */
        .gaveta { transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1); transform: translateY(100%); }
        .gaveta.aberta { transform: translateY(0); }
        .modal-fade { transition: opacity 0.2s ease-out, transform 0.2s ease-out; opacity: 0; pointer-events: none; transform: scale(0.98); }
        .modal-fade.aberto { opacity: 1; pointer-events: auto; transform: scale(1); }
        
        /* Versículos e Marcações */
        .versiculo-box { transition: background-color 0.2s; border-radius: 0.75rem; padding: 0.5rem; margin: -0.5rem; margin-bottom: 0.75rem; cursor: pointer; }
        .versiculo-box:active { background-color: rgba(99, 102, 241, 0.1); }
        .marcado { background-color: #fef08a !important; }
        .dark .marcado { background-color: rgba(133, 77, 14, 0.5) !important; color: #fde047; }
        .highlight-temp { animation: piscar 2s ease-out; }
        @keyframes piscar { 0%, 100% { background-color: transparent; } 50% { background-color: rgba(99, 102, 241, 0.2); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100">

    <header class="fixed top-0 left-0 right-0 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 z-30 p-4 shadow-sm">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-xl font-extrabold text-indigo-700 dark:text-indigo-400 tracking-tight flex items-center gap-2">ARC <span class="text-xs font-normal text-gray-400">Edição de Estudo</span></h1>
                <div class="flex items-center gap-2">
                    <button onclick="abrirBusca()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full shadow-sm active:scale-95 transition-transform text-lg" title="Buscar">🔍</button>
                    <button onclick="abrirModalConfig()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-sm font-medium shadow-sm active:scale-95 transition-transform" title="Configurar">⚙️</button>
                    <button id="btnTema" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full shadow-sm active:scale-95 transition-transform">🌓</button>
                </div>
            </div>
            <div class="flex gap-2">
                <select id="selLivro" class="flex-[2] bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 appearance-none font-semibold"></select>
                <select id="selCapitulo" class="flex-1 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 appearance-none font-semibold text-center"></select>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-24 px-5 max-w-md mx-auto min-h-screen">
        <div id="areaLeitura" class="texto-biblia text-xl">
            <div class="flex flex-col items-center justify-center mt-20 text-indigo-600">
                <svg class="w-10 h-10 mb-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="font-sans font-bold text-base animate-pulse">Sincronizando as Escrituras...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-3 z-20 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto grid grid-cols-4 gap-2">
            <button id="btnAnterior" class="bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">←</button>
            <button onclick="abrirChat()" class="col-span-2 bg-indigo-600 text-white shadow-lg p-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <span class="text-xl">✨</span> Mestre IA
            </button>
            <button id="btnProximo" class="bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">→</button>
        </div>
    </nav>

    <div id="modalBusca" class="fixed inset-0 z-50 bg-white dark:bg-gray-900 modal-fade flex flex-col altura-dinamica">
        <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex gap-3 items-center bg-gray-50 dark:bg-gray-900 pt-5">
            <button onclick="fecharBusca()" class="text-gray-500 text-2xl font-bold px-2 active:scale-90">&times;</button>
            <input type="text" id="inputBusca" placeholder="Pesquisar versículo ou palavra..." class="flex-1 p-3 rounded-xl bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 outline-none focus:ring-2 focus:ring-indigo-500 font-sans text-sm">
        </div>
        <div class="flex-1 overflow-y-auto p-4 scroll-suave" id="areaResultadosBusca">
            </div>
    </div>

    <div id="sheetAcoes" class="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm transition-opacity opacity-0 pointer-events-none flex flex-col justify-end">
        <div id="sheetConteudo" class="bg-white dark:bg-gray-800 rounded-t-3xl p-6 w-full max-w-md mx-auto transform translate-y-full transition-transform duration-300 shadow-2xl">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto mb-5"></div>
            <p id="textoVersiculoSelecionado" class="texto-biblia text-lg mb-5 text-gray-800 dark:text-gray-200 border-l-4 border-indigo-500 pl-3 line-clamp-3"></p>
            <div class="grid grid-cols-1 gap-3 font-sans">
                <button onclick="acaoCopiar()" class="p-4 rounded-xl bg-gray-100 dark:bg-gray-700 flex items-center gap-3 font-bold active:scale-95 transition-transform text-gray-800 dark:text-gray-100">
                    <span class="text-xl">📋</span> Copiar Texto
                </button>
                <button onclick="acaoMarcar()" class="p-4 rounded-xl bg-yellow-100 dark:bg-yellow-900/40 flex items-center gap-3 font-bold active:scale-95 transition-transform text-yellow-800 dark:text-yellow-500">
                    <span class="text-xl">🖍️</span> <span id="lblMarcar">Destacar Versículo</span>
                </button>
                <button onclick="acaoExplicarIA()" class="p-4 rounded-xl bg-indigo-600 flex items-center gap-3 font-bold active:scale-95 transition-transform text-white shadow-md">
                    <span class="text-xl">✨</span> Explicar com a Inteligência
                </button>
                <button onclick="fecharSheet()" class="mt-2 p-3 text-gray-500 font-bold active:scale-95">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="gavetaChat" class="fixed top-0 left-0 right-0 bottom-0 z-40 flex flex-col bg-gray-50 dark:bg-gray-900 gaveta altura-dinamica">
        <div class="p-4 bg-indigo-700 text-white flex justify-between items-center shadow-md pt-5">
            <div>
                <h3 class="font-bold text-lg leading-tight">Mestre Teológico</h3>
                <p class="text-[11px] opacity-90 font-medium tracking-wider">Histórico salvo automaticamente</p>
            </div>
            <div class="flex gap-2">
                <button onclick="limparChat()" class="bg-indigo-800/50 hover:bg-indigo-800 p-2 rounded-full w-10 h-10 flex items-center justify-center font-bold text-sm" title="Limpar Conversa">🗑️</button>
                <button onclick="fecharChat()" class="bg-indigo-800/50 hover:bg-indigo-800 p-2 rounded-full w-10 h-10 flex items-center justify-center font-bold text-xl">&times;</button>
            </div>
        </div>
        
        <div id="listaMensagens" class="flex-1 overflow-y-auto p-4 space-y-4 texto-biblia text-base scroll-suave">
            </div>

        <div class="p-3 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex gap-2 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-5">
            <input id="campoPergunta" type="text" placeholder="Pergunte algo ao mestre..." class="flex-1 p-3 rounded-xl bg-gray-100 dark:bg-gray-700 border border-transparent focus:border-indigo-500 outline-none text-sm font-sans">
            <button id="btnEnviarMsg" class="bg-indigo-600 text-white px-5 rounded-xl font-bold active:scale-95 transition-transform shadow-md">Enviar</button>
        </div>
    </div>

    <div id="modalConfig" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 modal-fade">
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 w-full max-w-md shadow-2xl max-h-[90vh] overflow-y-auto scroll-suave">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-xl flex items-center gap-2"><span class="text-2xl">⚙️</span> Ajustes</h3>
                <button onclick="fecharModalConfig()" class="text-gray-500 font-bold text-2xl active:scale-90">&times;</button>
            </div>
            <div class="mb-5">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Chave da API (Gemini)</label>
                <input type="text" id="inputChaveApi" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm shadow-inner">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Perfil de Instrução Doutrinária</label>
                <textarea id="inputPerfil" rows="6" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:ring-2 focus:ring-indigo-500 text-sm shadow-inner resize-none"></textarea>
            </div>
            <button onclick="salvarConfig()" class="w-full p-4 rounded-xl font-bold bg-indigo-600 text-white shadow-md active:scale-95 transition-transform">Salvar Configurações</button>
        </div>
    </div>

    <script>
        // ESTADO GLOBAL DA APLICAÇÃO
        let bibliaCompleta = [];
        let indexLivro = parseInt(localStorage.getItem('memoria_livro')) || 0;
        let indexCapitulo = parseInt(localStorage.getItem('memoria_capitulo')) || 0;
        let versiculosMarcados = JSON.parse(localStorage.getItem('memoria_marcacoes') || '{}');
        
        let versiculoAtivoParaAcao = null; // Guarda qual versículo foi clicado {livro, cap, vers, texto}

        const perfilPadrao = "Atue como um exímio teólogo. Sempre que o assunto for Bíblia Sagrada, regra de fé ou prática cristã, adote a ortodoxia Neo Testamentária, a ortodoxia do Protestantismo Histórico e a Ortodoxia Pentecostal Clássica das Assembleias de Deus. Seja claro, profundo e pastoral em suas respostas.";

        // 1. INICIALIZAÇÃO E LEITURA (COM MEMÓRIA)
        async function iniciarApp() {
            carregarChatHistorico(); // Carrega a memória do chat no fundo
            aplicarTemaSalvo();
            
            const urlArc = 'https://raw.githubusercontent.com/maatheusgois/bible/main/versions/pt-br/arc.json';
            try {
                const resposta = await fetch(urlArc);
                if (!resposta.ok) throw new Error("Falha no download");
                bibliaCompleta = await resposta.json();
                
                // Valida se a memória não estourou os limites do json atual
                if(indexLivro >= bibliaCompleta.length) indexLivro = 0;
                if(indexCapitulo >= bibliaCompleta[indexLivro].chapters.length) indexCapitulo = 0;

                preencherLivros();
                exibirCapitulo();
                renderizarHistoricoBusca();
            } catch (erro) {
                document.getElementById('areaLeitura').innerHTML = `
                    <div class="text-center mt-20 p-6 bg-red-50 dark:bg-red-900/20 rounded-2xl">
                        <span class="text-4xl mb-2 block">⚠️</span>
                        <h2 class="text-red-600 font-bold text-lg mb-2">Erro de Conexão</h2>
                        <p class="text-sm">Não foi possível carregar a Bíblia da internet.</p>
                    </div>`;
            }
        }

        function salvarPosicaoLeitura() {
            localStorage.setItem('memoria_livro', indexLivro);
            localStorage.setItem('memoria_capitulo', indexCapitulo);
        }

        function preencherLivros() {
            const selectLivro = document.getElementById('selLivro');
            selectLivro.innerHTML = bibliaCompleta.map((livro, i) => `<option value="${i}">${livro.name}</option>`).join('');
            selectLivro.value = indexLivro;
            preencherCapitulos();
        }

        function preencherCapitulos() {
            const selectCapitulo = document.getElementById('selCapitulo');
            const totalCapitulos = bibliaCompleta[indexLivro].chapters.length;
            let htmlOpcoes = '';
            for(let i = 0; i < totalCapitulos; i++) { htmlOpcoes += `<option value="${i}">Capítulo ${i + 1}</option>`; }
            selectCapitulo.innerHTML = htmlOpcoes;
            selectCapitulo.value = indexCapitulo;
        }

        function exibirCapitulo(marcarVersiculoIndex = -1) {
            if(bibliaCompleta.length === 0) return;
            const livroAtual = bibliaCompleta[indexLivro];
            const versiculos = livroAtual.chapters[indexCapitulo];
            
            let htmlLeitura = `<h2 class="text-3xl font-extrabold mb-8 text-indigo-900 dark:text-indigo-300 text-center">${livroAtual.name} ${indexCapitulo + 1}</h2>`;
            
            versiculos.forEach((texto, i) => {
                const chaveMarcacao = `${indexLivro}-${indexCapitulo}-${i}`;
                const classMarcado = versiculosMarcados[chaveMarcacao] ? 'marcado' : '';
                const classAnimacao = (i === marcarVersiculoIndex) ? 'highlight-temp' : '';
                
                // Escape de aspas para injetar no onclick com segurança
                const textoSafe = texto.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                
                htmlLeitura += `
                <div id="v-${i}" class="versiculo-box flex gap-4 items-start ${classMarcado} ${classAnimacao}" onclick="abrirAcoesVersiculo(${indexLivro}, ${indexCapitulo}, ${i}, '${textoSafe}')">
                    <span class="text-[11px] font-black bg-indigo-100 dark:bg-indigo-900/60 text-indigo-700 dark:text-indigo-300 px-2 py-1 rounded shadow-sm mt-1.5 min-w-[1.8rem] text-center">${i + 1}</span>
                    <p class="flex-1 text-gray-800 dark:text-gray-200 leading-relaxed">${texto}</p>
                </div>`;
            });
            document.getElementById('areaLeitura').innerHTML = htmlLeitura;
            
            if(marcarVersiculoIndex !== -1) {
                setTimeout(() => { document.getElementById(`v-${marcarVersiculoIndex}`).scrollIntoView({behavior: 'smooth', block: 'center'}); }, 100);
            } else {
                window.scrollTo({ top: 0, behavior: 'auto' });
            }
            salvarPosicaoLeitura();
        }

        // Navegação
        document.getElementById('selLivro').addEventListener('change', (e) => { indexLivro = parseInt(e.target.value); indexCapitulo = 0; preencherCapitulos(); exibirCapitulo(); });
        document.getElementById('selCapitulo').addEventListener('change', (e) => { indexCapitulo = parseInt(e.target.value); exibirCapitulo(); });
        document.getElementById('btnProximo').addEventListener('click', () => {
            if (indexCapitulo < bibliaCompleta[indexLivro].chapters.length - 1) { indexCapitulo++; } 
            else if (indexLivro < bibliaCompleta.length - 1) { indexLivro++; indexCapitulo = 0; }
            document.getElementById('selLivro').value = indexLivro; preencherCapitulos(); exibirCapitulo();
        });
        document.getElementById('btnAnterior').addEventListener('click', () => {
            if (indexCapitulo > 0) { indexCapitulo--; } 
            else if (indexLivro > 0) { indexLivro--; indexCapitulo = bibliaCompleta[indexLivro].chapters.length - 1; }
            document.getElementById('selLivro').value = indexLivro; preencherCapitulos(); exibirCapitulo();
        });

        // 2. INTERAÇÃO DO VERSÍCULO (TAP-TO-ACTION)
        const sheetAcoes = document.getElementById('sheetAcoes');
        const sheetConteudo = document.getElementById('sheetConteudo');

        function abrirAcoesVersiculo(l, c, v, texto) {
            versiculoAtivoParaAcao = { livro: l, cap: c, vers: v, texto: texto };
            const chave = `${l}-${c}-${v}`;
            
            document.getElementById('textoVersiculoSelecionado').innerText = `${bibliaCompleta[l].name} ${c+1}:${v+1} - "${texto}"`;
            document.getElementById('lblMarcar').innerText = versiculosMarcados[chave] ? "Remover Destaque" : "Destacar Versículo";
            
            sheetAcoes.classList.remove('opacity-0', 'pointer-events-none');
            setTimeout(() => { sheetConteudo.classList.remove('translate-y-full'); }, 10);
        }

        function fecharSheet() {
            sheetConteudo.classList.add('translate-y-full');
            setTimeout(() => { sheetAcoes.classList.add('opacity-0', 'pointer-events-none'); }, 300);
        }

        function acaoCopiar() {
            const v = versiculoAtivoParaAcao;
            const textoFinal = `"${v.texto}" - ${bibliaCompleta[v.livro].name} ${v.cap+1}:${v.vers+1} (ARC)`;
            navigator.clipboard.writeText(textoFinal);
            fecharSheet();
            alert("Versículo copiado para a área de transferência!");
        }

        function acaoMarcar() {
            const v = versiculoAtivoParaAcao;
            const chave = `${v.livro}-${v.cap}-${v.vers}`;
            if(versiculosMarcados[chave]) { delete versiculosMarcados[chave]; } 
            else { versiculosMarcados[chave] = true; }
            
            localStorage.setItem('memoria_marcacoes', JSON.stringify(versiculosMarcados));
            exibirCapitulo(); // re-renderiza para mostrar a cor
            fecharSheet();
        }

        function acaoExplicarIA() {
            const v = versiculoAtivoParaAcao;
            const textoPrompt = `Por favor, me explique detalhadamente este versículo: "${v.texto}" (${bibliaCompleta[v.livro].name} ${v.cap+1}:${v.vers+1})`;
            fecharSheet();
            abrirChat();
            
            // Coloca o texto na caixa e simula o clique de enviar
            document.getElementById('campoPergunta').value = textoPrompt;
            setTimeout(() => { document.getElementById('btnEnviarMsg').click(); }, 300);
        }

        // 3. MOTOR DE BUSCA COM HISTÓRICO
        const modalBusca = document.getElementById('modalBusca');
        const inputBusca = document.getElementById('inputBusca');
        const areaResultadosBusca = document.getElementById('areaResultadosBusca');
        let historicoDeBusca = JSON.parse(localStorage.getItem('memoria_buscas') || '[]');

        function abrirBusca() {
            modalBusca.classList.add('aberto');
            inputBusca.value = '';
            renderizarHistoricoBusca();
            inputBusca.focus();
        }

        function fecharBusca() { modalBusca.classList.remove('aberto'); }

        function salvarHistoricoBusca(termo) {
            if(!termo) return;
            historicoDeBusca = historicoDeBusca.filter(t => t.toLowerCase() !== termo.toLowerCase()); // Remove duplicado
            historicoDeBusca.unshift(termo); // Adiciona no topo
            if(historicoDeBusca.length > 10) historicoDeBusca.pop(); // Limita a 10
            localStorage.setItem('memoria_buscas', JSON.stringify(historicoDeBusca));
        }

        function renderizarHistoricoBusca() {
            if(historicoDeBusca.length === 0) {
                areaResultadosBusca.innerHTML = `<p class="text-center text-gray-500 mt-10 text-sm">Nenhuma busca recente.</p>`;
                return;
            }
            let html = `<h4 class="font-bold text-gray-500 text-xs uppercase tracking-wider mb-4">Buscas Recentes</h4><div class="flex flex-wrap gap-2">`;
            historicoDeBusca.forEach(termo => {
                html += `<button onclick="executarBuscaRapida('${termo}')" class="bg-gray-100 dark:bg-gray-800 text-indigo-700 dark:text-indigo-300 px-4 py-2 rounded-full text-sm font-semibold active:scale-95 border border-gray-200 dark:border-gray-700 shadow-sm">🔍 ${termo}</button>`;
            });
            html += `</div>`;
            areaResultadosBusca.innerHTML = html;
        }

        function executarBuscaRapida(termo) {
            inputBusca.value = termo;
            acionarBusca(termo);
        }

        function acionarBusca(termoBusca) {
            if(termoBusca.length < 3) return;
            salvarHistoricoBusca(termoBusca);
            
            areaResultadosBusca.innerHTML = `<div class="text-center mt-10"><div class="animate-spin text-2xl">⏳</div></div>`;
            
            // Pequeno delay para a UI respirar antes de processar 31k versículos
            setTimeout(() => {
                const termoLower = termoBusca.toLowerCase();
                const resultados = [];
                
                // Varredura de alta performance
                for(let l = 0; l < bibliaCompleta.length; l++) {
                    const livro = bibliaCompleta[l];
                    for(let c = 0; c < livro.chapters.length; c++) {
                        const capitulo = livro.chapters[c];
                        for(let v = 0; v < capitulo.length; v++) {
                            if(capitulo[v].toLowerCase().includes(termoLower)) {
                                resultados.push({ livroIdx: l, capIdx: c, versIdx: v, texto: capitulo[v], nomeLivro: livro.name });
                                if(resultados.length >= 100) break; // Limita para não travar o celular
                            }
                        }
                        if(resultados.length >= 100) break;
                    }
                    if(resultados.length >= 100) break;
                }

                if(resultados.length === 0) {
                    areaResultadosBusca.innerHTML = `<p class="text-center text-gray-500 mt-10">Nenhum resultado encontrado para "${termoBusca}".</p>`;
                    return;
                }

                let html = `<h4 class="font-bold text-gray-500 text-xs uppercase tracking-wider mb-4">${resultados.length}${resultados.length >= 100 ? '+' : ''} Resultados</h4><div class="space-y-3">`;
                resultados.forEach(res => {
                    // Destaca o termo no texto
                    const regex = new RegExp(`(${termoBusca})`, 'gi');
                    const textoDestacado = res.texto.replace(regex, '<span class="bg-yellow-200 dark:bg-yellow-900 text-black dark:text-white">$1</span>');
                    
                    html += `
                    <div onclick="irParaVersiculo(${res.livroIdx}, ${res.capIdx}, ${res.versIdx})" class="p-4 bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 active:scale-[0.98] transition-transform cursor-pointer">
                        <span class="text-xs font-bold text-indigo-600 dark:text-indigo-400 block mb-1">${res.nomeLivro} ${res.capIdx+1}:${res.versIdx+1}</span>
                        <p class="text-gray-800 dark:text-gray-200 text-sm texto-biblia">${textoDestacado}</p>
                    </div>`;
                });
                html += `</div>`;
                areaResultadosBusca.innerHTML = html;
            }, 50);
        }

        // Listener para dar Enter na busca
        inputBusca.addEventListener('keypress', function(e) {
            if(e.key === 'Enter') acionarBusca(inputBusca.value.trim());
        });

        function irParaVersiculo(l, c, v) {
            fecharBusca();
            indexLivro = l;
            indexCapitulo = c;
            document.getElementById('selLivro').value = l;
            preencherCapitulos();
            exibirCapitulo(v); // Chama com o index do versículo para fazer a animação de scroll
        }

        // 4. CHAT COM MEMÓRIA & CONFIGURAÇÕES
        let memoriaChat = [];
        const gavetaChat = document.getElementById('gavetaChat');
        const listaMsg = document.getElementById('listaMensagens');
        const inputMsg = document.getElementById('campoPergunta');
        
        function abrirChat() { gavetaChat.classList.add('aberta'); rolarChatParaBaixo(); }
        function fecharChat() { gavetaChat.classList.remove('aberta'); }

        function carregarChatHistorico() {
            const salvo = localStorage.getItem('memoria_conversa_ia');
            if(salvo) {
                memoriaChat = JSON.parse(salvo);
                listaMsg.innerHTML = '';
                memoriaChat.forEach(msg => {
                    if(msg.role === 'ia') renderizarBalaoIA(msg.texto, false);
                    else renderizarBalaoUsuario(msg.texto, false);
                });
            } else {
                listaMsg.innerHTML = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 dark:border-gray-700 max-w-[90%]">A Paz do Senhor! Sou o seu assistente. O histórico das nossas conversas ficará salvo aqui.</div>`;
            }
        }

        function salvarChatNoStorage() {
            localStorage.setItem('memoria_conversa_ia', JSON.stringify(memoriaChat));
        }

        function limparChat() {
            if(confirm("Tem certeza que deseja apagar todo o histórico da conversa?")) {
                localStorage.removeItem('memoria_conversa_ia');
                memoriaChat = [];
                carregarChatHistorico();
            }
        }

        function renderizarBalaoUsuario(texto, salvar = true) {
            if(salvar) { memoriaChat.push({role: 'user', texto: texto}); salvarChatNoStorage(); }
            listaMsg.innerHTML += `<div class="flex justify-end mb-4"><div class="bg-indigo-100 dark:bg-indigo-900 text-indigo-900 dark:text-indigo-50 p-3 rounded-2xl rounded-tr-none max-w-[90%] shadow-sm font-sans text-sm">${texto}</div></div>`;
            rolarChatParaBaixo();
        }

        function renderizarBalaoIA(texto, salvar = true) {
            if(salvar) { memoriaChat.push({role: 'ia', texto: texto}); salvarChatNoStorage(); }
            const textoFormatado = texto.replace(/\n/g, '<br>');
            listaMsg.innerHTML += `<div class="flex justify-start mb-4"><div class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 p-4 rounded-2xl rounded-tl-none max-w-[95%] shadow-sm border border-gray-100 dark:border-gray-700 leading-relaxed">${textoFormatado}</div></div>`;
            rolarChatParaBaixo();
        }

        function rolarChatParaBaixo() { setTimeout(() => { listaMsg.scrollTop = listaMsg.scrollHeight; }, 50); }

        document.getElementById('btnEnviarMsg').addEventListener('click', async () => {
            const pergunta = inputMsg.value.trim();
            if (!pergunta) return;

            const chaveApi = localStorage.getItem('chave_secreta_gemini');
            if (!chaveApi) { abrirModalConfig(); return; }

            const perfil = localStorage.getItem('perfil_ia_gemini') || perfilPadrao;

            renderizarBalaoUsuario(pergunta);
            inputMsg.value = '';

            const idLoader = 'load-' + Date.now();
            listaMsg.innerHTML += `<div id="${idLoader}" class="flex justify-start mb-4"><div class="bg-gray-100 dark:bg-gray-800 text-gray-500 italic p-3 rounded-2xl rounded-tl-none text-sm animate-pulse">Meditando nas Escrituras...</div></div>`;
            rolarChatParaBaixo();

            // Histórico de contexto para a IA (envia as últimas interações para ela ter memória)
            let historicoParaEnvio = "";
            const ultimasMsgs = memoriaChat.slice(-6); // Pega as ultimas 6 msgs para não estourar limite
            ultimasMsgs.forEach(m => { historicoParaEnvio += `${m.role === 'ia' ? 'Assistente' : 'Usuário'}: ${m.texto}\n`; });

            const urlEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${chaveApi}`;
            
            try {
                const resposta = await fetch(urlEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `INSTRUÇÃO DE COMPORTAMENTO: ${perfil}\n\nHISTÓRICO DA CONVERSA:\n${historicoParaEnvio}\n\nResponda agora ao Usuário com base no histórico acima.` }] }]
                    })
                });
                
                const dadosJson = await resposta.json();
                document.getElementById(idLoader).remove();

                if (dadosJson.error) {
                    renderizarBalaoIA(`⚠️ Erro na IA: ${dadosJson.error.message}`, false);
                    return;
                }
                renderizarBalaoIA(dadosJson.candidates[0].content.parts[0].text);
            } catch (erro) {
                document.getElementById(idLoader).remove();
                renderizarBalaoIA("⚠️ Erro de rede. Verifique sua conexão.", false);
            }
        });

        document.getElementById('campoPergunta').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') document.getElementById('btnEnviarMsg').click();
        });

        // 5. CONFIGURAÇÕES E TEMA
        function aplicarTemaSalvo() {
            if(localStorage.getItem('tema_escuro') === 'sim') document.documentElement.classList.add('dark');
        }
        
        document.getElementById('btnTema').addEventListener('click', () => { 
            const html = document.documentElement;
            html.classList.toggle('dark'); 
            localStorage.setItem('tema_escuro', html.classList.contains('dark') ? 'sim' : 'nao');
        });

        function abrirModalConfig() { 
            document.getElementById('inputChaveApi').value = localStorage.getItem('chave_secreta_gemini') || '';
            document.getElementById('inputPerfil').value = localStorage.getItem('perfil_ia_gemini') || perfilPadrao;
            document.getElementById('modalConfig').classList.add('aberto'); 
        }
        function fecharModalConfig() { document.getElementById('modalConfig').classList.remove('aberto'); }

        function salvarConfig() {
            const chave = document.getElementById('inputChaveApi').value.trim();
            const perfil = document.getElementById('inputPerfil').value.trim();
            if(chave === '') return alert("A chave da API é obrigatória.");
            localStorage.setItem('chave_secreta_gemini', chave);
            localStorage.setItem('perfil_ia_gemini', perfil || perfilPadrao);
            fecharModalConfig();
        }

        // FECHAR MODALS CLICANDO FORA
        window.onclick = function(event) {
            if (event.target === document.getElementById('sheetAcoes')) fecharSheet();
            if (event.target === document.getElementById('modalConfig')) fecharModalConfig();
        }

        // Boot
        window.onload = iniciarApp;
    </script>
</body>
</html>
