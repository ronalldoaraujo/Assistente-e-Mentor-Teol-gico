<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia ARC Premium & IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .texto-biblia { font-family: 'Lora', serif; line-height: 1.85; }
        .gaveta { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        .gaveta.aberta { transform: translateY(0); }
        .modal { transition: opacity 0.2s; opacity: 0; pointer-events: none; }
        .modal.aberto { opacity: 1; pointer-events: auto; }
        .scroll-suave::-webkit-scrollbar { width: 4px; }
        .scroll-suave::-webkit-scrollbar-thumb { background: #818cf8; border-radius: 4px; }
        .altura-dinamica { height: 100dvh; }
        
        /* Efeito de Clique no Versículo */
        .versiculo-box { transition: background-color 0.2s, transform 0.1s; cursor: pointer; border-radius: 0.5rem; padding: 0.25rem 0.5rem; margin-left: -0.5rem; }
        .versiculo-box:active { transform: scale(0.98); background-color: rgba(99, 102, 241, 0.1); }
        .versiculo-marcado { background-color: #fef08a !important; color: #854d0e !important; }
        .dark .versiculo-marcado { background-color: rgba(161, 98, 7, 0.4) !important; color: #fde047 !important; }

        /* Animação do Bottom Sheet (Menu do Versículo) */
        .bottom-sheet { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        .modal.aberto .bottom-sheet { transform: translateY(0); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100">

    <header class="fixed top-0 left-0 right-0 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 z-30 p-4 shadow-sm">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-xl font-extrabold text-indigo-700 dark:text-indigo-400 tracking-tight">Bíblia ARC</h1>
                <div class="flex items-center gap-2">
                    <button onclick="abrirModalBusca()" class="p-2 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-300 rounded-full text-lg shadow-sm active:scale-95 transition-transform" title="Buscar">🔍</button>
                    <button onclick="abrirModalConfig()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform" title="Configurações">⚙️</button>
                    <button id="btnTema" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform">🌓</button>
                </div>
            </div>
            <div class="flex gap-2">
                <select id="selLivro" class="flex-[2] bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 appearance-none font-semibold"></select>
                <select id="selCapitulo" class="flex-1 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 appearance-none font-semibold text-center"></select>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-24 px-4 max-w-md mx-auto min-h-screen">
        <div id="areaLeitura" class="texto-biblia text-xl pb-10">
            <div class="flex flex-col items-center justify-center mt-20 text-indigo-600">
                <svg class="w-12 h-12 mb-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="font-sans font-bold text-lg animate-pulse">Baixando Escrituras...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-3 z-20 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto grid grid-cols-4 gap-2">
            <button id="btnAnterior" class="bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform text-lg">←</button>
            <button onclick="abrirChat()" class="col-span-2 bg-indigo-600 text-white shadow-lg p-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <span class="text-xl">✨</span> Assistente IA
            </button>
            <button id="btnProximo" class="bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform text-lg">→</button>
        </div>
    </nav>

    <div id="modalAcaoVersiculo" class="fixed inset-0 bg-black/50 z-50 flex flex-col justify-end modal" onclick="fecharAcaoVersiculo(event)">
        <div class="bg-white dark:bg-gray-800 rounded-t-3xl p-6 pb-10 bottom-sheet max-w-md mx-auto w-full" onclick="event.stopPropagation()">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto mb-5"></div>
            <p id="textoVersiculoAcao" class="texto-biblia text-lg text-gray-800 dark:text-gray-200 mb-6 line-clamp-3 italic"></p>
            <div class="grid grid-cols-1 gap-3 font-sans">
                <button onclick="explicarVersiculoIA()" class="flex items-center justify-center gap-3 p-4 bg-indigo-600 text-white rounded-2xl font-bold active:scale-95 transition-transform shadow-md">
                    <span class="text-xl">✨</span> Explicar com a IA
                </button>
                <button onclick="marcarVersiculo()" id="btnMarcar" class="flex items-center justify-center gap-3 p-4 bg-yellow-100 dark:bg-yellow-900/40 text-yellow-800 dark:text-yellow-400 rounded-2xl font-bold active:scale-95 transition-transform">
                    🖍️ Marcar/Desmarcar
                </button>
                <button onclick="copiarVersiculo()" class="flex items-center justify-center gap-3 p-4 bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-2xl font-bold active:scale-95 transition-transform">
                    📋 Copiar Texto
                </button>
            </div>
        </div>
    </div>

    <div id="modalBusca" class="fixed inset-0 bg-white dark:bg-gray-900 z-50 flex flex-col modal transform transition-transform">
        <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex items-center gap-3 bg-gray-50 dark:bg-gray-900 pt-6">
            <button onclick="fecharModalBusca()" class="p-2 text-xl font-bold text-gray-500">←</button>
            <input type="text" id="inputBusca" placeholder="Ex: Pentecostes, Graça, Sangue..." class="flex-1 p-3 rounded-xl bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 outline-none focus:ring-2 focus:ring-indigo-500 font-sans shadow-inner">
            <button onclick="executarBusca()" class="bg-indigo-600 text-white p-3 rounded-xl font-bold shadow-md">Buscar</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 scroll-suave bg-gray-50 dark:bg-gray-900">
            <p id="statusBusca" class="text-center text-sm text-gray-500 mt-10 font-sans">Digite uma palavra e clique em buscar.</p>
            <div id="listaResultados" class="space-y-4"></div>
        </div>
    </div>

    <div id="gavetaChat" class="fixed top-0 left-0 right-0 bottom-0 z-40 flex flex-col bg-gray-50 dark:bg-gray-900 gaveta altura-dinamica">
        <div class="p-4 bg-indigo-700 text-white flex justify-between items-center shadow-md pt-5">
            <div>
                <h3 class="font-bold text-lg leading-tight">Mestre Teológico</h3>
                <p class="text-[11px] opacity-90 font-medium tracking-wider">Com memória de conversa</p>
            </div>
            <div class="flex gap-2">
                <button onclick="limparHistoricoChat()" class="bg-indigo-800/50 hover:bg-indigo-800 p-2 rounded-full w-10 h-10 flex items-center justify-center font-bold text-sm" title="Limpar Memória">🗑️</button>
                <button onclick="fecharChat()" class="bg-indigo-800/50 hover:bg-indigo-800 p-2 rounded-full w-10 h-10 flex items-center justify-center font-bold text-xl">&times;</button>
            </div>
        </div>
        
        <div id="listaMensagens" class="flex-1 overflow-y-auto p-4 space-y-4 texto-biblia text-base scroll-suave">
            </div>

        <div class="p-3 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex gap-2 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-5">
            <input id="campoPergunta" type="text" placeholder="Pergunte ao assistente..." class="flex-1 p-3 rounded-xl bg-gray-100 dark:bg-gray-700 border border-transparent focus:border-indigo-500 outline-none text-sm font-sans">
            <button id="btnEnviarMsg" class="bg-indigo-600 text-white px-5 rounded-xl font-bold active:scale-95 transition-transform shadow-md">Enviar</button>
        </div>
    </div>

    <div id="modalConfig" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 modal">
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 w-full max-w-md shadow-2xl transform transition-all max-h-[90vh] overflow-y-auto scroll-suave">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">⚙️</span>
                    <h3 class="font-bold text-xl">Configurações</h3>
                </div>
                <button onclick="fecharModalConfig()" class="text-gray-500 font-bold text-2xl">&times;</button>
            </div>
            
            <div class="mb-5">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Chave da API (Gemini)</label>
                <input type="password" id="inputChaveApi" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm shadow-inner" placeholder="Cole a API Key...">
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Perfil Doutrinário da IA</label>
                <p class="text-[11px] text-gray-500 dark:text-gray-400 mb-2 leading-tight">Defina a regra de fé para todas as respostas.</p>
                <textarea id="inputPerfil" rows="5" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:ring-2 focus:ring-indigo-500 text-sm shadow-inner resize-none"></textarea>
            </div>

            <button onclick="salvarConfig()" class="w-full p-4 rounded-xl font-bold bg-indigo-600 text-white shadow-md active:scale-95 transition-transform">Salvar Dados</button>
        </div>
    </div>

    <script>
        // --- ESTADO GLOBAL E MEMÓRIA LOCAL ---
        let bibliaCompleta = [];
        
        // Memória de Leitura (Carrega de onde parou)
        let indexLivro = parseInt(localStorage.getItem('memoria_livro')) || 0;
        let indexCapitulo = parseInt(localStorage.getItem('memoria_capitulo')) || 0;
        
        // Memória de Marcações e Histórico
        let marcacoes = JSON.parse(localStorage.getItem('marcacoes_arc')) || {};
        let historicoChat = JSON.parse(localStorage.getItem('historico_chat_arc')) || [];
        
        // Variáveis temporárias para a ação do versículo
        let versaoAcaoAtual = { l: 0, c: 0, v: 0, texto: '', ref: '' };

        const perfilPadrao = "Atue como um exímio teólogo. Sempre que o assunto for Bíblia Sagrada, regra de fé ou prática cristã, adote a ortodoxia Neo Testamentária, a ortodoxia do Protestantismo Histórico e a Ortodoxia Pentecostal Clássica das Assembleias de Deus. Responda de forma profunda e pastoral.";

        // --- INICIALIZAÇÃO DA BÍBLIA ---
        async function iniciarBiblia() {
            const urlArc = 'https://raw.githubusercontent.com/maatheusgois/bible/main/versions/pt-br/arc.json';
            try {
                const resposta = await fetch(urlArc);
                if (!resposta.ok) throw new Error("Falha");
                bibliaCompleta = await resposta.json();
                
                // Correção caso a memória aponte para um livro/capítulo que não existe
                if(indexLivro >= bibliaCompleta.length) indexLivro = 0;
                if(indexCapitulo >= bibliaCompleta[indexLivro].chapters.length) indexCapitulo = 0;

                preencherLivros();
                exibirCapitulo();
                renderizarHistoricoChat();
            } catch (erro) {
                document.getElementById('areaLeitura').innerHTML = `<p class="text-center text-red-500 font-bold mt-20">Erro de conexão. Verifique sua internet.</p>`;
            }
        }

        // --- FUNÇÕES DE INTERFACE BÍBLIA ---
        function preencherLivros() {
            const selectLivro = document.getElementById('selLivro');
            selectLivro.innerHTML = bibliaCompleta.map((livro, i) => `<option value="${i}">${livro.name}</option>`).join('');
            selectLivro.value = indexLivro;
            preencherCapitulos();
        }

        function preencherCapitulos() {
            const selectCapitulo = document.getElementById('selCapitulo');
            const totalCapitulos = bibliaCompleta[indexLivro].chapters.length;
            let htmlOpcoes = '';
            for(let i = 0; i < totalCapitulos; i++) htmlOpcoes += `<option value="${i}">Capítulo ${i + 1}</option>`;
            selectCapitulo.innerHTML = htmlOpcoes;
            selectCapitulo.value = indexCapitulo;
        }

        function salvarMemoriaLeitura() {
            localStorage.setItem('memoria_livro', indexLivro);
            localStorage.setItem('memoria_capitulo', indexCapitulo);
        }

        function exibirCapitulo() {
            if(bibliaCompleta.length === 0) return;
            salvarMemoriaLeitura();

            const livroAtual = bibliaCompleta[indexLivro];
            const versiculos = livroAtual.chapters[indexCapitulo];
            
            let htmlLeitura = `<h2 class="text-3xl font-extrabold mb-8 text-indigo-900 dark:text-indigo-300 text-center mt-4">${livroAtual.name} ${indexCapitulo + 1}</h2>`;
            
            versiculos.forEach((texto, i) => {
                const chaveVersiculo = `${indexLivro}-${indexCapitulo}-${i}`;
                const classMarcado = marcacoes[chaveVersiculo] ? 'versiculo-marcado' : '';
                
                // O Versículo agora é clicável (Tap-to-Action)
                htmlLeitura += `
                <div id="v-${chaveVersiculo}" class="flex gap-4 mb-2 items-start versiculo-box ${classMarcado}" onclick="abrirAcaoVersiculo(${indexLivro}, ${indexCapitulo}, ${i}, \`${texto.replace(/"/g, '&quot;')}\`, '${livroAtual.name}')">
                    <span class="text-[11px] font-black text-indigo-500 dark:text-indigo-400 mt-1.5 w-4 shrink-0">${i + 1}</span>
                    <p class="flex-1 text-gray-800 dark:text-gray-200 leading-relaxed pointer-events-none">${texto}</p>
                </div>`;
            });
            
            document.getElementById('areaLeitura').innerHTML = htmlLeitura;
            window.scrollTo({ top: 0, behavior: 'instant' });
        }

        // Navegação
        document.getElementById('selLivro').addEventListener('change', (e) => {
            indexLivro = parseInt(e.target.value); indexCapitulo = 0; preencherCapitulos(); exibirCapitulo();
        });
        document.getElementById('selCapitulo').addEventListener('change', (e) => {
            indexCapitulo = parseInt(e.target.value); exibirCapitulo();
        });
        document.getElementById('btnProximo').addEventListener('click', () => {
            if (indexCapitulo < bibliaCompleta[indexLivro].chapters.length - 1) { indexCapitulo++; } 
            else if (indexLivro < bibliaCompleta.length - 1) { indexLivro++; indexCapitulo = 0; }
            document.getElementById('selLivro').value = indexLivro; preencherCapitulos(); exibirCapitulo();
        });
        document.getElementById('btnAnterior').addEventListener('click', () => {
            if (indexCapitulo > 0) { indexCapitulo--; } 
            else if (indexLivro > 0) { indexLivro--; indexCapitulo = bibliaCompleta[indexLivro].chapters.length - 1; }
            document.getElementById('selLivro').value = indexLivro; preencherCapitulos(); exibirCapitulo();
        });

        // --- SISTEMA DE BUSCA (LUPA) ---
        const modalBusca = document.getElementById('modalBusca');
        function abrirModalBusca() { modalBusca.classList.add('aberto'); setTimeout(() => document.getElementById('inputBusca').focus(), 100); }
        function fecharModalBusca() { modalBusca.classList.remove('aberto'); }

        // Remove acentos para a busca não falhar em "graca" vs "graça"
        const normalizar = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

        function executarBusca() {
            const input = document.getElementById('inputBusca').value;
            const status = document.getElementById('statusBusca');
            const lista = document.getElementById('listaResultados');
            
            if(input.trim().length < 3) {
                status.innerText = "Digite pelo menos 3 letras para buscar.";
                lista.innerHTML = ""; return;
            }

            status.innerText = "Buscando em toda a Bíblia...";
            lista.innerHTML = "";
            const termo = normalizar(input);
            
            // Pausa milisegundos pra interface atualizar o "Buscando..."
            setTimeout(() => {
                let resultados = [];
                bibliaCompleta.forEach((livro, l) => {
                    livro.chapters.forEach((capitulo, c) => {
                        capitulo.forEach((versiculo, v) => {
                            if(normalizar(versiculo).includes(termo)) {
                                resultados.push({ l, c, v, texto: versiculo, ref: `${livro.name} ${c+1}:${v+1}` });
                            }
                        });
                    });
                });

                if(resultados.length === 0) {
                    status.innerText = `Nenhum resultado encontrado para "${input}".`;
                } else {
                    status.innerText = `${resultados.length} versículos encontrados.`;
                    lista.innerHTML = resultados.map(r => `
                        <div onclick="irParaResultado(${r.l}, ${r.c}, ${r.v})" class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 active:scale-95 transition-transform cursor-pointer">
                            <h4 class="font-bold text-indigo-600 dark:text-indigo-400 text-sm mb-1">${r.ref}</h4>
                            <p class="texto-biblia text-gray-800 dark:text-gray-200 text-sm line-clamp-2">${r.texto.replace(new RegExp(input, 'gi'), match => `<span class="bg-yellow-200 dark:bg-yellow-800 text-black dark:text-white px-1 rounded">${match}</span>`)}</p>
                        </div>
                    `).join('');
                }
            }, 50);
        }

        function irParaResultado(l, c, v) {
            indexLivro = l; indexCapitulo = c;
            document.getElementById('selLivro').value = l; preencherCapitulos();
            exibirCapitulo(); fecharModalBusca();
            
            // Scroll suave até o versículo
            setTimeout(() => {
                const elemento = document.getElementById(`v-${l}-${c}-${v}`);
                if(elemento) {
                    elemento.scrollIntoView({behavior: "smooth", block: "center"});
                    // Efeito piscar
                    elemento.style.transition = "background-color 0.5s";
                    elemento.style.backgroundColor = "rgba(99, 102, 241, 0.3)";
                    setTimeout(() => { elemento.style.backgroundColor = ""; }, 1500);
                }
            }, 300);
        }

        // Enter para buscar
        document.getElementById('inputBusca').addEventListener('keypress', e => { if(e.key === 'Enter') executarBusca(); });

        // --- MENU DO VERSÍCULO (TAP-TO-ACTION) ---
        const modalAcao = document.getElementById('modalAcaoVersiculo');
        
        function abrirAcaoVersiculo(l, c, v, texto, nomeLivro) {
            versaoAcaoAtual = { l, c, v, texto, ref: `${nomeLivro} ${c+1}:${v+1}` };
            document.getElementById('textoVersiculoAcao').innerHTML = `<strong class="text-indigo-600 dark:text-indigo-400">${versaoAcaoAtual.ref}</strong> - "${texto}"`;
            
            const btnMarcar = document.getElementById('btnMarcar');
            if(marcacoes[`${l}-${c}-${v}`]) {
                btnMarcar.innerHTML = "🗑️ Remover Marcação";
            } else {
                btnMarcar.innerHTML = "🖍️ Destacar Versículo";
            }
            
            modalAcao.classList.add('aberto');
        }

        function fecharAcaoVersiculo(e) { if(e) e.preventDefault(); modalAcao.classList.remove('aberto'); }

        function copiarVersiculo() {
            const textoPronto = `"${versaoAcaoAtual.texto}" (${versaoAcaoAtual.ref} ARC)`;
            navigator.clipboard.writeText(textoPronto).then(() => {
                alert("Versículo copiado!");
                fecharAcaoVersiculo();
            });
        }

        function marcarVersiculo() {
            const chave = `${versaoAcaoAtual.l}-${versaoAcaoAtual.c}-${versaoAcaoAtual.v}`;
            const elemento = document.getElementById(`v-${chave}`);
            
            if(marcacoes[chave]) {
                delete marcacoes[chave];
                if(elemento) elemento.classList.remove('versiculo-marcado');
            } else {
                marcacoes[chave] = true;
                if(elemento) elemento.classList.add('versiculo-marcado');
            }
            
            localStorage.setItem('marcacoes_arc', JSON.stringify(marcacoes));
            fecharAcaoVersiculo();
        }

        function explicarVersiculoIA() {
            fecharAcaoVersiculo();
            abrirChat();
            const pergunta = `Por favor, explique à luz da doutrina: ${versaoAcaoAtual.ref} - "${versaoAcaoAtual.texto}"`;
            document.getElementById('campoPergunta').value = pergunta;
            // Opcional: já enviar direto
            // setTimeout(() => document.getElementById('btnEnviarMsg').click(), 300);
        }

        // --- ASSISTENTE COM MEMÓRIA (CHAT) ---
        const gaveta = document.getElementById('gavetaChat');
        const listaMsg = document.getElementById('listaMensagens');
        const inputMsg = document.getElementById('campoPergunta');

        function abrirChat() { gaveta.classList.add('aberta'); }
        function fecharChat() { gaveta.classList.remove('aberta'); }

        function formatarTextoIA(texto) { return texto.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); }

        function renderizarHistoricoChat() {
            listaMsg.innerHTML = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 dark:border-gray-700 max-w-[90%] mb-4">A Paz do Senhor! O nosso histórico está salvo. O que vamos estudar agora?</div>`;
            
            historicoChat.forEach(msg => {
                if(msg.role === 'user') {
                    listaMsg.innerHTML += `<div class="flex justify-end mb-4"><div class="bg-indigo-100 dark:bg-indigo-900 text-indigo-900 dark:text-indigo-50 p-3 rounded-2xl rounded-tr-none max-w-[90%] shadow-sm font-sans text-sm">${msg.text}</div></div>`;
                } else {
                    listaMsg.innerHTML += `<div class="flex justify-start mb-4"><div class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 p-4 rounded-2xl rounded-tl-none max-w-[95%] shadow-sm border border-gray-100 dark:border-gray-700 font-sans text-sm">${formatarTextoIA(msg.text)}</div></div>`;
                }
            });
            setTimeout(() => { listaMsg.scrollTop = listaMsg.scrollHeight; }, 50);
        }

        function limparHistoricoChat() {
            if(confirm("Deseja apagar a memória da conversa? (A IA esquecerá o contexto anterior)")) {
                historicoChat = [];
                localStorage.setItem('historico_chat_arc', JSON.stringify([]));
                renderizarHistoricoChat();
            }
        }

        document.getElementById('btnEnviarMsg').addEventListener('click', async () => {
            const pergunta = inputMsg.value.trim();
            if (!pergunta) return;

            const chaveApi = localStorage.getItem('chave_secreta_gemini');
            if (!chaveApi) { abrirModalConfig(); return; }

            const instrucaoDeSistema = localStorage.getItem('perfil_ia_gemini') || perfilPadrao;

            // Salva na memória e renderiza
            historicoChat.push({role: 'user', text: pergunta});
            localStorage.setItem('historico_chat_arc', JSON.stringify(historicoChat));
            renderizarHistoricoChat();
            
            inputMsg.value = '';
            const idLoader = 'load-' + Date.now();
            listaMsg.innerHTML += `<div id="${idLoader}" class="flex justify-start mb-4"><div class="bg-gray-100 dark:bg-gray-800 text-gray-500 italic p-3 rounded-2xl rounded-tl-none text-sm animate-pulse">Meditando...</div></div>`;
            listaMsg.scrollTop = listaMsg.scrollHeight;

            // PREPARAÇÃO DA MEMÓRIA PARA ENVIAR À IA
            // O modelo generateContent aceita um array de conversas.
            let contentsApi = [];
            
            // Injeta o "System Prompt" como a primeira mensagem de contexto "forçada"
            contentsApi.push({ role: "user", parts: [{ text: `INSTRUÇÃO DE COMPORTAMENTO: ${instrucaoDeSistema}\n\nResponda apenas 'Entendido'.` }] });
            contentsApi.push({ role: "model", parts: [{ text: "Entendido." }] });
            
            // Injeta as últimas 6 mensagens para manter o custo baixo e o foco alto
            const ultimasMensagens = historicoChat.slice(-6);
            ultimasMensagens.forEach(msg => {
                contentsApi.push({ role: msg.role, parts: [{ text: msg.text }] });
            });

            const urlEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${chaveApi}`;
            
            try {
                const resposta = await fetch(urlEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: contentsApi })
                });
                
                const dadosJson = await resposta.json();
                document.getElementById(idLoader).remove();

                if (dadosJson.error) {
                    historicoChat.push({role: 'model', text: `⚠️ Erro da IA: ${dadosJson.error.message}`});
                } else {
                    const textoResposta = dadosJson.candidates[0].content.parts[0].text;
                    historicoChat.push({role: 'model', text: textoResposta});
                }
                
                localStorage.setItem('historico_chat_arc', JSON.stringify(historicoChat));
                renderizarHistoricoChat();

            } catch (erro) {
                document.getElementById(idLoader).remove();
                alert("Erro de conexão ao acessar a Inteligência Artificial.");
                historicoChat.pop(); // Remove a pergunta do histórico se falhou
            }
        });

        document.getElementById('campoPergunta').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('btnEnviarMsg').click(); });

        // --- CONFIGURAÇÕES GERAIS ---
        const modalConfig = document.getElementById('modalConfig');
        function abrirModalConfig() { 
            document.getElementById('inputChaveApi').value = localStorage.getItem('chave_secreta_gemini') || '';
            document.getElementById('inputPerfil').value = localStorage.getItem('perfil_ia_gemini') || perfilPadrao;
            modalConfig.classList.add('aberto'); 
        }
        function fecharModalConfig() { modalConfig.classList.remove('aberto'); }

        function salvarConfig() {
            const k = document.getElementById('inputChaveApi').value.trim();
            const p = document.getElementById('inputPerfil').value.trim();
            if(k === '') return alert("Chave API obrigatória.");
            localStorage.setItem('chave_secreta_gemini', k);
            localStorage.setItem('perfil_ia_gemini', p || perfilPadrao);
            fecharModalConfig();
        }

        // TEMA MODO ESCURO
        document.getElementById('btnTema').addEventListener('click', () => { 
            document.documentElement.classList.toggle('dark'); 
        });

        // BOOT
        window.onload = iniciarBiblia;
    </script>
</body>
</html>
