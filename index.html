<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia ARC & Assistente Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3073/3073403.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .texto-biblia { font-family: 'Lora', serif; line-height: 1.8; }
        .altura-dinamica { height: 100dvh; }
        
        /* Animações e Transições */
        .gaveta { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        .gaveta.aberta { transform: translateY(0); }
        .modal { transition: opacity 0.2s; opacity: 0; pointer-events: none; }
        .modal.aberto { opacity: 1; pointer-events: auto; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Scrollbar */
        .scroll-suave::-webkit-scrollbar { width: 4px; }
        .scroll-suave::-webkit-scrollbar-thumb { background: #818cf8; border-radius: 4px; }
        
        /* Estilos de Marcação e Busca */
        .versiculo-marcado { background-color: rgba(253, 224, 71, 0.4); border-radius: 0.5rem; padding: 0.25rem; transition: background-color 0.2s; }
        .dark .versiculo-marcado { background-color: rgba(161, 98, 7, 0.4); }
        .highlight-busca { font-weight: 700; color: #4f46e5; background-color: rgba(99, 102, 241, 0.2); padding: 0 2px; border-radius: 2px; }
        .dark .highlight-busca { color: #818cf8; background-color: rgba(129, 140, 248, 0.2); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100">

    <header class="fixed top-0 left-0 right-0 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 z-30 p-4 shadow-sm">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-xl font-extrabold text-indigo-700 dark:text-indigo-400 tracking-tight">Bíblia ARC</h1>
                <div class="flex items-center gap-2">
                    <button onclick="abrirBusca()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform">🔍</button>
                    <button onclick="abrirModalConfig()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform">⚙️</button>
                    <button id="btnTema" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform">🌓</button>
                </div>
            </div>
            <div class="flex gap-2">
                <select id="selLivro" class="flex-[2] bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 appearance-none font-semibold"></select>
                <select id="selCapitulo" class="flex-1 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 appearance-none font-semibold text-center"></select>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-24 px-4 max-w-md mx-auto min-h-screen">
        <div id="areaLeitura" class="texto-biblia text-xl">
            <div class="flex flex-col items-center justify-center mt-20 text-indigo-600">
                <svg class="w-12 h-12 mb-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="font-sans font-bold text-lg animate-pulse">Preparando as Escrituras...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-3 z-30 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto grid grid-cols-4 gap-2">
            <button id="btnAnterior" class="bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">←</button>
            <button onclick="abrirChat()" class="col-span-2 bg-indigo-600 text-white shadow-lg p-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <span class="text-xl">✨</span> Mentor
            </button>
            <button id="btnProximo" class="bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">→</button>
        </div>
    </nav>

    <div id="modalVersiculo" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex flex-col justify-end modal">
        <div class="bg-white dark:bg-gray-800 rounded-t-3xl p-5 w-full max-w-md mx-auto shadow-2xl transform transition-transform translate-y-full" id="sheetVersiculo">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto mb-4"></div>
            <p id="refVersiculoSelecionado" class="text-sm font-bold text-indigo-600 dark:text-indigo-400 mb-2 uppercase tracking-wide"></p>
            <p id="textoVersiculoSelecionado" class="texto-biblia text-lg text-gray-800 dark:text-gray-200 mb-6 line-clamp-3"></p>
            
            <div class="grid grid-cols-3 gap-3 mb-4">
                <button onclick="acaoCopiarVersiculo()" class="flex flex-col items-center justify-center p-3 bg-gray-100 dark:bg-gray-700 rounded-2xl active:scale-95 transition-transform">
                    <span class="text-2xl mb-1">📋</span><span class="text-xs font-bold">Copiar</span>
                </button>
                <button onclick="acaoMarcarVersiculo()" class="flex flex-col items-center justify-center p-3 bg-gray-100 dark:bg-gray-700 rounded-2xl active:scale-95 transition-transform">
                    <span class="text-2xl mb-1">🖍️</span><span class="text-xs font-bold" id="btnMarcarTexto">Marcar</span>
                </button>
                <button onclick="acaoExplicarVersiculo()" class="flex flex-col items-center justify-center p-3 bg-indigo-100 dark:bg-indigo-900/50 rounded-2xl active:scale-95 transition-transform text-indigo-700 dark:text-indigo-300">
                    <span class="text-2xl mb-1">✨</span><span class="text-xs font-bold">Explicar</span>
                </button>
            </div>
            <button onclick="fecharModalVersiculo()" class="w-full p-3 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-xl font-bold mt-2">Fechar</button>
        </div>
    </div>

    <div id="telaBusca" class="fixed inset-0 bg-white dark:bg-gray-900 z-50 flex flex-col gaveta altura-dinamica">
        <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex items-center gap-3">
            <button onclick="fecharBusca()" class="p-2 text-2xl text-gray-500 hover:text-gray-800 dark:hover:text-white">←</button>
            <input type="text" id="inputBusca" placeholder="Buscar na Bíblia..." class="flex-1 p-3 rounded-xl bg-gray-100 dark:bg-gray-800 border-none outline-none focus:ring-2 focus:ring-indigo-500 text-base font-sans">
            <button onclick="executarBusca()" class="bg-indigo-600 text-white p-3 rounded-xl font-bold shadow-md">Ir</button>
        </div>
        
        <div class="flex-1 overflow-y-auto p-4 scroll-suave" id="areaResultadosBusca">
            <div id="containerHistoricoBusca" class="mb-6">
                <div class="flex justify-between items-center mb-3">
                    <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wide">Buscas Recentes</h4>
                    <button onclick="limparHistoricoBusca()" class="text-xs text-indigo-500 font-bold">Limpar</button>
                </div>
                <div id="listaHistoricoBusca" class="flex flex-wrap gap-2"></div>
            </div>
            <div id="listaResultadosBusca" class="space-y-4"></div>
        </div>
    </div>

    <div id="gavetaChat" class="fixed top-0 left-0 right-0 bottom-0 z-40 flex flex-col bg-gray-50 dark:bg-gray-900 gaveta altura-dinamica">
        <div class="p-4 bg-indigo-700 text-white flex justify-between items-center shadow-md pt-5">
            <div>
                <h3 class="font-bold text-lg leading-tight">Assistente e Mentor Teológico</h3>
                <p class="text-[11px] opacity-90 font-medium tracking-wider">Histórico Salvo</p>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="limparChat()" class="p-2 bg-indigo-800/50 hover:bg-red-500 rounded-full w-10 h-10 flex items-center justify-center font-bold text-sm transition-colors" title="Limpar Conversa">🗑️</button>
                <button onclick="fecharChat()" class="bg-indigo-800/50 hover:bg-indigo-800 p-2 rounded-full w-10 h-10 flex items-center justify-center font-bold text-xl">&times;</button>
            </div>
        </div>
        
        <div id="listaMensagens" class="flex-1 overflow-y-auto p-4 space-y-4 texto-biblia text-base scroll-suave">
            </div>

        <div class="p-3 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex gap-2 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-5">
            <input id="campoPergunta" type="text" placeholder="Digite sua pergunta..." class="flex-1 p-3 rounded-xl bg-gray-100 dark:bg-gray-700 border border-transparent focus:border-indigo-500 outline-none text-sm font-sans">
            <button id="btnEnviarMsg" class="bg-indigo-600 text-white px-5 rounded-xl font-bold active:scale-95 transition-transform shadow-md">Enviar</button>
        </div>
    </div>

    <div id="modalConfig" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 modal">
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 w-full max-w-md shadow-2xl transform transition-all">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-xl flex items-center gap-2"><span class="text-2xl">⚙️</span> Configurações</h3>
                <button onclick="fecharModalConfig()" class="text-gray-500 font-bold text-2xl">&times;</button>
            </div>
            <div class="mb-5">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Chave da API (Gemini)</label>
                <input type="text" id="inputChaveApi" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm shadow-inner" placeholder="Ex: AIzaSyB...">
            </div>
            <button onclick="salvarConfig()" class="w-full p-3 rounded-xl font-bold bg-indigo-600 text-white shadow-md active:scale-95 transition-transform">Salvar Chave</button>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // 1. ESTADO GLOBAL E UTILITÁRIOS
        // ----------------------------------------------------
        let bibliaCompleta = [];
        let indexLivro = parseInt(localStorage.getItem('leitura_livro')) || 0;
        let indexCapitulo = parseInt(localStorage.getItem('leitura_capitulo')) || 0;
        let marcacoes = JSON.parse(localStorage.getItem('biblia_marcacoes')) || {};
        
        function removerAcentos(str) {
            return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
        }

        // ----------------------------------------------------
        // 2. INICIALIZAÇÃO DA BÍBLIA
        // ----------------------------------------------------
        async function iniciarBiblia() {
            const urlArc = 'https://raw.githubusercontent.com/maatheusgois/bible/main/versions/pt-br/arc.json';
            try {
                const resposta = await fetch(urlArc);
                if (!resposta.ok) throw new Error("Falha");
                bibliaCompleta = await resposta.json();
                
                if(indexLivro >= bibliaCompleta.length) indexLivro = 0;
                if(indexCapitulo >= bibliaCompleta[indexLivro].chapters.length) indexCapitulo = 0;

                preencherLivros();
                exibirCapitulo();
                carregarHistoricoBusca();
                carregarHistoricoChat();
            } catch (erro) {
                document.getElementById('areaLeitura').innerHTML = `<div class="text-center mt-20 text-red-500 font-bold">Erro ao conectar. Verifique a internet.</div>`;
            }
        }

        function salvarEstadoLeitura() {
            localStorage.setItem('leitura_livro', indexLivro);
            localStorage.setItem('leitura_capitulo', indexCapitulo);
        }

        function preencherLivros() {
            const select = document.getElementById('selLivro');
            select.innerHTML = bibliaCompleta.map((l, i) => `<option value="${i}">${l.name}</option>`).join('');
            select.value = indexLivro;
            preencherCapitulos();
        }

        function preencherCapitulos() {
            const select = document.getElementById('selCapitulo');
            const total = bibliaCompleta[indexLivro].chapters.length;
            let options = '';
            for(let i = 0; i < total; i++) options += `<option value="${i}">Capítulo ${i + 1}</option>`;
            select.innerHTML = options;
            select.value = indexCapitulo;
        }

        function exibirCapitulo() {
            if(bibliaCompleta.length === 0) return;
            const livroAtual = bibliaCompleta[indexLivro];
            const versiculos = livroAtual.chapters[indexCapitulo];
            
            let html = `<h2 class="text-3xl font-extrabold mb-8 text-indigo-900 dark:text-indigo-300 text-center fade-in">${livroAtual.name} ${indexCapitulo + 1}</h2>`;
            
            versiculos.forEach((texto, i) => {
                const idUnico = `${indexLivro}-${indexCapitulo}-${i}`;
                const isMarcado = marcacoes[idUnico] ? 'versiculo-marcado' : '';
                
                html += `
                <div id="v-${idUnico}" onclick="abrirMenuVersiculo(${indexLivro}, ${indexCapitulo}, ${i})" class="flex gap-4 mb-5 items-start cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-800 p-2 rounded-xl transition-colors -mx-2 ${isMarcado}">
                    <span class="text-[11px] font-black bg-indigo-100 dark:bg-indigo-900/60 text-indigo-700 dark:text-indigo-300 px-2 py-1 rounded shadow-sm mt-1.5 flex-shrink-0">${i + 1}</span>
                    <p class="flex-1 text-gray-800 dark:text-gray-200 leading-relaxed">${texto}</p>
                </div>`;
            });
            
            document.getElementById('areaLeitura').innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            salvarEstadoLeitura();
        }

        document.getElementById('selLivro').addEventListener('change', (e) => { indexLivro = parseInt(e.target.value); indexCapitulo = 0; preencherCapitulos(); exibirCapitulo(); });
        document.getElementById('selCapitulo').addEventListener('change', (e) => { indexCapitulo = parseInt(e.target.value); exibirCapitulo(); });
        document.getElementById('btnProximo').addEventListener('click', () => {
            if (indexCapitulo < bibliaCompleta[indexLivro].chapters.length - 1) { indexCapitulo++; } 
            else if (indexLivro < bibliaCompleta.length - 1) { indexLivro++; indexCapitulo = 0; }
            document.getElementById('selLivro').value = indexLivro; preencherCapitulos(); exibirCapitulo();
        });
        document.getElementById('btnAnterior').addEventListener('click', () => {
            if (indexCapitulo > 0) { indexCapitulo--; } 
            else if (indexLivro > 0) { indexLivro--; indexCapitulo = bibliaCompleta[indexLivro].chapters.length - 1; }
            document.getElementById('selLivro').value = indexLivro; preencherCapitulos(); exibirCapitulo();
        });

        // ----------------------------------------------------
        // 3. INTERAÇÃO COM VERSÍCULO
        // ----------------------------------------------------
        let versiculoAtivo = null;

        function abrirMenuVersiculo(lIdx, cIdx, vIdx) {
            const livroNome = bibliaCompleta[lIdx].name;
            const texto = bibliaCompleta[lIdx].chapters[cIdx][vIdx];
            const idUnico = `${lIdx}-${cIdx}-${vIdx}`;
            
            versiculoAtivo = { lIdx, cIdx, vIdx, livroNome, texto, idUnico };
            
            document.getElementById('refVersiculoSelecionado').innerText = `${livroNome} ${cIdx + 1}:${vIdx + 1}`;
            document.getElementById('textoVersiculoSelecionado').innerText = `"${texto}"`;
            document.getElementById('btnMarcarTexto').innerText = marcacoes[idUnico] ? "Desmarcar" : "Marcar";

            const modal = document.getElementById('modalVersiculo');
            const sheet = document.getElementById('sheetVersiculo');
            modal.classList.add('aberto');
            setTimeout(() => sheet.classList.remove('translate-y-full'), 10);
        }

        function fecharModalVersiculo() {
            const modal = document.getElementById('modalVersiculo');
            const sheet = document.getElementById('sheetVersiculo');
            sheet.classList.add('translate-y-full');
            setTimeout(() => modal.classList.remove('aberto'), 300);
        }

        function acaoCopiarVersiculo() {
            const textoFormatado = `"${versiculoAtivo.texto}" - ${versiculoAtivo.livroNome} ${versiculoAtivo.cIdx + 1}:${versiculoAtivo.vIdx + 1} (ARC)`;
            navigator.clipboard.writeText(textoFormatado).then(() => {
                alert("Versículo copiado!");
                fecharModalVersiculo();
            });
        }

        function acaoMarcarVersiculo() {
            const id = versiculoAtivo.idUnico;
            if (marcacoes[id]) { delete marcacoes[id]; } 
            else { marcacoes[id] = true; }
            
            localStorage.setItem('biblia_marcacoes', JSON.stringify(marcacoes));
            
            const divVersiculo = document.getElementById(`v-${id}`);
            if(divVersiculo) {
                if(marcacoes[id]) divVersiculo.classList.add('versiculo-marcado');
                else divVersiculo.classList.remove('versiculo-marcado');
            }
            fecharModalVersiculo();
        }

        function acaoExplicarVersiculo() {
            fecharModalVersiculo();
            abrirChat();
            const promptContextual = `Por favor, aplique o seu protocolo hermenêutico e me explique este versículo em detalhes: "${versiculoAtivo.texto}" (${versiculoAtivo.livroNome} ${versiculoAtivo.cIdx + 1}:${versiculoAtivo.vIdx + 1})`;
            document.getElementById('campoPergunta').value = promptContextual;
            setTimeout(() => document.getElementById('btnEnviarMsg').click(), 300);
        }

        // ----------------------------------------------------
        // 4. MOTOR DE BUSCA
        // ----------------------------------------------------
        let historicoBusca = JSON.parse(localStorage.getItem('biblia_historico_busca')) || [];

        function abrirBusca() { document.getElementById('telaBusca').classList.add('aberta'); document.getElementById('inputBusca').focus(); }
        function fecharBusca() { document.getElementById('telaBusca').classList.remove('aberta'); }

        function carregarHistoricoBusca() {
            const container = document.getElementById('listaHistoricoBusca');
            if(historicoBusca.length === 0) {
                container.innerHTML = '<span class="text-xs text-gray-400">Nenhuma busca recente.</span>';
                return;
            }
            container.innerHTML = historicoBusca.map(termo => 
                `<button onclick="document.getElementById('inputBusca').value='${termo}'; executarBusca();" class="px-3 py-1.5 bg-indigo-100 dark:bg-indigo-900/40 text-indigo-700 dark:text-indigo-300 rounded-lg text-sm font-semibold active:scale-95 transition-transform">${termo}</button>`
            ).join('');
        }

        function limparHistoricoBusca() {
            historicoBusca = [];
            localStorage.setItem('biblia_historico_busca', JSON.stringify(historicoBusca));
            carregarHistoricoBusca();
        }

        function executarBusca() {
            const input = document.getElementById('inputBusca');
            const termoOriginal = input.value.trim();
            if(!termoOriginal || termoOriginal.length < 2) return alert("Digite pelo menos 2 letras para buscar.");

            if(!historicoBusca.includes(termoOriginal)) {
                historicoBusca.unshift(termoOriginal);
                if(historicoBusca.length > 8) historicoBusca.pop();
                localStorage.setItem('biblia_historico_busca', JSON.stringify(historicoBusca));
                carregarHistoricoBusca();
            }

            const areaResultados = document.getElementById('listaResultadosBusca');
            areaResultados.innerHTML = `<div class="text-center p-4 text-indigo-500 font-bold animate-pulse">Buscando em toda a Bíblia...</div>`;
            
            setTimeout(() => {
                const termoLimpo = removerAcentos(termoOriginal);
                let resultados = [];

                for (let l = 0; l < bibliaCompleta.length; l++) {
                    for (let c = 0; c < bibliaCompleta[l].chapters.length; c++) {
                        for (let v = 0; v < bibliaCompleta[l].chapters[c].length; v++) {
                            const texto = bibliaCompleta[l].chapters[c][v];
                            if (removerAcentos(texto).includes(termoLimpo)) {
                                resultados.push({ lIdx: l, cIdx: c, vIdx: v, livro: bibliaCompleta[l].name, texto: texto });
                            }
                        }
                    }
                }

                if (resultados.length === 0) {
                    areaResultados.innerHTML = `<div class="text-center p-8 text-gray-500">Nenhum resultado encontrado para "<strong>${termoOriginal}</strong>".</div>`;
                    return;
                }

                let htmlRes = `<p class="text-sm font-bold text-gray-500 mb-4">${resultados.length} resultados encontrados</p>`;
                const regexDestacar = new RegExp(`(${termoOriginal})`, 'gi');

                resultados.forEach(res => {
                    const textoDestacado = res.texto.replace(regexDestacar, '<span class="highlight-busca">$1</span>');
                    htmlRes += `
                    <div onclick="irParaResultado(${res.lIdx}, ${res.cIdx}, ${res.vIdx})" class="p-4 bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 cursor-pointer active:scale-95 transition-transform fade-in">
                        <span class="text-xs font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-wider block mb-1">${res.livro} ${res.cIdx + 1}:${res.vIdx + 1}</span>
                        <p class="texto-biblia text-gray-800 dark:text-gray-200">${textoDestacado}</p>
                    </div>`;
                });

                areaResultados.innerHTML = htmlRes;
            }, 50);
        }

        function irParaResultado(l, c, v) {
            fecharBusca();
            indexLivro = l; indexCapitulo = c;
            document.getElementById('selLivro').value = l;
            preencherCapitulos();
            exibirCapitulo();
            
            setTimeout(() => {
                const elemento = document.getElementById(`v-${l}-${c}-${v}`);
                if(elemento) {
                    const offset = 100;
                    const bodyRect = document.body.getBoundingClientRect().top;
                    const elementRect = elemento.getBoundingClientRect().top;
                    const elementPosition = elementRect - bodyRect;
                    const offsetPosition = elementPosition - offset;
                    
                    window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
                    elemento.style.transition = 'background-color 0.5s';
                    elemento.style.backgroundColor = 'rgba(99, 102, 241, 0.3)';
                    setTimeout(() => elemento.style.backgroundColor = '', 1500);
                }
            }, 300);
        }

        document.getElementById('inputBusca').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') executarBusca();
        });


        // ----------------------------------------------------
        // 5. CHAT, MENTOR E CONFIGURAÇÕES DA IA
        // ----------------------------------------------------
        const gaveta = document.getElementById('gavetaChat');
        const listaMsg = document.getElementById('listaMensagens');
        const inputMsg = document.getElementById('campoPergunta');
        const modalConfig = document.getElementById('modalConfig');
        const inputChaveApi = document.getElementById('inputChaveApi');

        // =========================================================================
        // A ALMA DO MENTOR: INSTRUÇÃO DE SISTEMA HARDCODED
        // =========================================================================
        const instrucaoSistemaTeologico = `Nome: Assistente e Mentor Teológico
Descrição: Você é o Assistente e Mentor Teológico especialista pessoal para o estudo aprofundado da Bíblia Sagrada, reconhecendo-a como a única regra infalível de fé e prática para a vida e o caráter cristão. Sua abordagem de ensino é fundamentada exclusivamente nas Escrituras, transformando a leitura bíblica em sabedoria aplicável.
Personalidade: Sua personalidade de ensino é fundamentada na homilética, a arte de pregar e ensinar a Palavra de Deus de forma clara, profunda e edificante. Você organiza metodicamente o conhecimento (lógica), conecta-se autenticamente com as necessidades do usuário (empatia) e gera uma transformação (influência/persuasão).
Perfil: Seu propósito é auxiliar no entendimento, na interpretação e na aplicação das Escrituras Sagradas. Para isso, você analisa o texto e o contexto, realizando análises textuais detalhadas; elabora a síntese, elaborando a síntese de conhecimentos complexos; extrai o fundamento bíblico, identificando a premissa absoluta, autoevidente e inegável revelada diretamente no texto bíblico; extrai o princípio (a verdade eterna), identificando a regra espiritual imutável e transcultural que sustenta o texto; gera a iluminação, oferecendo uma perspectiva de profundidade bíblica, que revele conexões ricas dentro da ortodoxia, trazendo frescor ao texto antigo sem violar a doutrina estabelecida; e sugere a aplicação prática, traduzindo o princípio para o século XXI.
Protocolo: Aplicar o Protocolo de Hermenêutica e Ensino Bíblico: Adote a ortodoxia Neo Testamentária, a ortodoxia do Protestantismo Histórico e a Ortodoxia Pentecostal Clássica das Assembleias de Deus.`;
        // =========================================================================
        
        let historicoChat = JSON.parse(localStorage.getItem('biblia_historico_chat')) || [];

        function abrirChat() { gaveta.classList.add('aberta'); }
        function fecharChat() { gaveta.classList.remove('aberta'); }
        function abrirModalConfig() { 
            inputChaveApi.value = localStorage.getItem('chave_secreta_gemini') || '';
            modalConfig.classList.add('aberto'); 
        }
        function fecharModalConfig() { modalConfig.classList.remove('aberto'); }

        function salvarConfig() {
            if(inputChaveApi.value.trim() === '') return alert("A chave da API é obrigatória.");
            localStorage.setItem('chave_secreta_gemini', inputChaveApi.value.trim());
            fecharModalConfig();
        }

        function carregarHistoricoChat() {
            if(historicoChat.length === 0) {
                listaMsg.innerHTML = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 dark:border-gray-700 max-w-[90%] fade-in">A Paz do Senhor! Sou o seu Assistente e Mentor Teológico. A nossa conversa e seus estudos serão salvos aqui. Como posso te auxiliar na Palavra hoje?</div>`;
                return;
            }
            listaMsg.innerHTML = '';
            historicoChat.forEach(msg => renderizarBalao(msg.role, msg.texto, false));
            rolarChatParaBaixo();
        }

        function limparChat() {
            if(confirm("Deseja apagar todo o histórico de conversa com o Mentor?")) {
                historicoChat = [];
                localStorage.removeItem('biblia_historico_chat');
                carregarHistoricoChat();
            }
        }

        function renderizarBalao(role, texto, animar = true) {
            const formatado = texto.replace(/\n/g, '<br>');
            const classeAnim = animar ? 'fade-in' : '';
            if(role === 'user') {
                listaMsg.innerHTML += `<div class="flex justify-end mb-4 ${classeAnim}"><div class="bg-indigo-100 dark:bg-indigo-900 text-indigo-900 dark:text-indigo-50 p-3 rounded-2xl rounded-tr-none max-w-[90%] shadow-sm font-sans text-sm">${formatado}</div></div>`;
            } else {
                listaMsg.innerHTML += `<div class="flex justify-start mb-4 ${classeAnim}"><div class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 p-4 rounded-2xl rounded-tl-none max-w-[95%] shadow-sm border border-gray-100 dark:border-gray-700">${formatado}</div></div>`;
            }
        }

        function adicionarMensagem(role, texto) {
            historicoChat.push({ role, texto });
            localStorage.setItem('biblia_historico_chat', JSON.stringify(historicoChat));
            renderizarBalao(role, texto, true);
            rolarChatParaBaixo();
        }

        function rolarChatParaBaixo() { setTimeout(() => { listaMsg.scrollTop = listaMsg.scrollHeight; }, 50); }

        document.getElementById('btnEnviarMsg').addEventListener('click', async () => {
            const pergunta = inputMsg.value.trim();
            if (!pergunta) return;

            const chaveApi = localStorage.getItem('chave_secreta_gemini');
            if (!chaveApi) { abrirModalConfig(); return; }

            adicionarMensagem('user', pergunta);
            inputMsg.value = '';

            const idLoader = 'load-' + Date.now();
            listaMsg.innerHTML += `<div id="${idLoader}" class="flex justify-start mb-4 fade-in"><div class="bg-gray-100 dark:bg-gray-800 text-gray-500 italic p-3 rounded-2xl rounded-tl-none text-sm animate-pulse">Consultando a Palavra...</div></div>`;
            rolarChatParaBaixo();

            let historicoRecenteFormatado = "";
            const ultimas = historicoChat.slice(-5, -1);
            ultimas.forEach(m => { historicoRecenteFormatado += `${m.role === 'user' ? 'Estudante' : 'Mentor'}: ${m.texto}\n`; });

            const urlEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${chaveApi}`;
            
            try {
                const resposta = await fetch(urlEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Instruções de Sistema:\n${instrucaoSistemaTeologico}\n\nHistórico recente da conversa:\n${historicoRecenteFormatado}\n\nNova Pergunta do Estudante: ${pergunta}` }] }]
                    })
                });
                
                const dadosJson = await resposta.json();
                document.getElementById(idLoader).remove();

                if (dadosJson.error) {
                    renderizarBalao('ia', `⚠️ Erro: ${dadosJson.error.message}`, true);
                    return;
                }

                adicionarMensagem('ia', dadosJson.candidates[0].content.parts[0].text);

            } catch (erro) {
                document.getElementById(idLoader).remove();
                renderizarBalao('ia', "⚠️ Erro de rede. Verifique sua conexão.", true);
            }
        });

        document.getElementById('campoPergunta').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') document.getElementById('btnEnviarMsg').click();
        });

        document.getElementById('btnTema').addEventListener('click', () => { document.documentElement.classList.toggle('dark'); });
        window.onload = iniciarBiblia;

        // ----------------------------------------------------
        // 6. REGISTRO DO SERVICE WORKER (PWA)
        // ----------------------------------------------------
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA: Service Worker registrado com sucesso!'))
                    .catch(err => console.log('PWA: Erro ao registrar Service Worker', err));
            });
        }
    </script>
</body>
</html>
