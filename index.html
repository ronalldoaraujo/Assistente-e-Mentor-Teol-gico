<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia ARC Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .texto-biblia { font-family: 'Lora', serif; line-height: 1.8; }
        .gaveta { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        .gaveta.aberta { transform: translateY(0); }
        .modal { transition: opacity 0.2s; opacity: 0; pointer-events: none; }
        .modal.aberto { opacity: 1; pointer-events: auto; }
        .scroll-suave::-webkit-scrollbar { width: 4px; }
        .scroll-suave::-webkit-scrollbar-thumb { background: #818cf8; border-radius: 4px; }
        .altura-dinamica { height: 100dvh; }
        
        /* Estilos do Tap-to-Action */
        .versiculo { cursor: pointer; transition: background-color 0.2s; border-radius: 0.5rem; padding: 0.25rem 0.5rem; margin-left: -0.5rem; margin-right: -0.5rem; }
        .versiculo:active { background-color: rgba(99, 102, 241, 0.1); }
        .versiculo.selecionado { background-color: rgba(99, 102, 241, 0.15); border-left: 3px solid #4f46e5; }
        .dark .versiculo.selecionado { background-color: rgba(99, 102, 241, 0.25); border-left: 3px solid #818cf8; }
        
        /* Marca Texto */
        .marcado { background-color: #fef08a !important; color: #1f2937 !important; }
        .dark .marcado { background-color: #713f12 !important; color: #f3f4f6 !important; }

        /* Toast de Notificação */
        #toast { transition: opacity 0.3s, transform 0.3s; opacity: 0; transform: translateY(20px); pointer-events: none; }
        #toast.mostrar { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100">

    <header class="fixed top-0 left-0 right-0 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 z-30 p-4 shadow-sm">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-xl font-extrabold text-indigo-700 dark:text-indigo-400 tracking-tight">Bíblia ARC</h1>
                <div class="flex items-center gap-3">
                    <button onclick="abrirModalBusca()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full shadow-sm active:scale-95 transition-transform">🔍</button>
                    <button onclick="abrirModalConfig()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full shadow-sm active:scale-95 transition-transform">⚙️</button>
                    <button id="btnTema" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full shadow-sm active:scale-95 transition-transform">🌓</button>
                </div>
            </div>
            <div class="flex gap-2">
                <select id="selLivro" class="flex-[2] bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 font-semibold"></select>
                <select id="selCapitulo" class="flex-1 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 font-semibold text-center"></select>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-32 px-5 max-w-md mx-auto min-h-screen">
        <div id="areaLeitura" class="texto-biblia text-xl">
            <div class="flex flex-col items-center justify-center mt-20 text-indigo-600">
                <svg class="w-10 h-10 mb-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="font-sans font-bold text-lg animate-pulse">Sincronizando...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-3 z-20 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto grid grid-cols-4 gap-2">
            <button id="btnAnterior" class="bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">←</button>
            <button onclick="abrirChat()" class="col-span-2 bg-indigo-600 text-white shadow-lg p-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <span class="text-xl">✨</span> Assistente IA
            </button>
            <button id="btnProximo" class="bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">→</button>
        </div>
    </nav>

    <div id="barraAcaoVersiculo" class="fixed bottom-[70px] left-4 right-4 max-w-md mx-auto bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 p-3 rounded-2xl shadow-2xl z-30 gaveta flex justify-between items-center gap-2 font-sans">
        <button onclick="fecharAcaoVersiculo()" class="p-2 bg-gray-800 dark:bg-gray-200 rounded-full font-bold active:scale-95">&times;</button>
        <div class="flex gap-2 flex-1 justify-end">
            <button onclick="acaoCopiar()" class="flex-1 bg-gray-800 dark:bg-gray-200 py-2 px-3 rounded-xl font-semibold text-sm flex flex-col items-center justify-center active:scale-95"><span>📋</span> Copiar</button>
            <button onclick="acaoMarcar()" class="flex-1 bg-gray-800 dark:bg-gray-200 py-2 px-3 rounded-xl font-semibold text-sm flex flex-col items-center justify-center active:scale-95"><span>🖍️</span> Marcar</button>
            <button onclick="acaoExplicar()" class="flex-1 bg-indigo-500 text-white py-2 px-3 rounded-xl font-semibold text-sm flex flex-col items-center justify-center active:scale-95 shadow-md"><span>✨</span> Explicar</button>
        </div>
    </div>

    <div id="toast" class="fixed top-24 left-0 right-0 z-50 flex justify-center">
        <div class="bg-gray-800 text-white px-5 py-3 rounded-full shadow-lg font-semibold text-sm inline-block">
            <span id="toastMsg">Operação realizada</span>
        </div>
    </div>

    <div id="modalBusca" class="fixed inset-0 bg-white dark:bg-gray-900 z-50 gaveta altura-dinamica flex flex-col">
        <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex gap-3 items-center pt-5 shadow-sm">
            <button onclick="fecharModalBusca()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full active:scale-95">←</button>
            <input id="inputBusca" type="text" placeholder="Buscar palavra ou texto..." class="flex-1 p-3 rounded-xl bg-gray-100 dark:bg-gray-800 outline-none focus:ring-2 focus:ring-indigo-500 font-sans">
            <button id="btnBuscar" class="bg-indigo-600 text-white p-3 rounded-xl font-bold active:scale-95">🔍</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 scroll-suave" id="areaResultadosBusca">
            </div>
    </div>

    <div id="gavetaChat" class="fixed inset-0 z-40 flex flex-col bg-gray-50 dark:bg-gray-900 gaveta altura-dinamica">
        <div class="p-4 bg-indigo-700 text-white flex justify-between items-center shadow-md pt-5">
            <div>
                <h3 class="font-bold text-lg leading-tight">Assistente Teológico</h3>
                <p class="text-[11px] opacity-90 font-medium tracking-wider">Histórico salvo</p>
            </div>
            <button onclick="fecharChat()" class="bg-indigo-800/50 hover:bg-indigo-800 p-2 rounded-full w-10 h-10 flex items-center justify-center font-bold text-xl">&times;</button>
        </div>
        
        <div id="listaMensagens" class="flex-1 overflow-y-auto p-4 space-y-4 texto-biblia text-base scroll-suave">
            </div>

        <div class="p-3 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex gap-2 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-5">
            <input id="campoPergunta" type="text" placeholder="Pergunte ao assistente..." class="flex-1 p-3 rounded-xl bg-gray-100 dark:bg-gray-700 border border-transparent focus:border-indigo-500 outline-none text-sm font-sans">
            <button id="btnEnviarMsg" class="bg-indigo-600 text-white px-5 rounded-xl font-bold active:scale-95 transition-transform shadow-md">Enviar</button>
        </div>
    </div>

    <div id="modalConfig" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 modal">
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 w-full max-w-md shadow-2xl transform transition-all max-h-[90vh] overflow-y-auto scroll-suave">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">⚙️</span><h3 class="font-bold text-xl">Configurações</h3>
                </div>
                <button onclick="fecharModalConfig()" class="text-gray-500 font-bold text-2xl">&times;</button>
            </div>
            
            <div class="mb-5">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Chave da API</label>
                <input type="text" id="inputChaveApi" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm shadow-inner" placeholder="Ex: AIzaSyB...">
            </div>

            <div class="mb-5">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Perfil de Instrução (Regra de Fé)</label>
                <textarea id="inputPerfil" rows="4" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:ring-2 focus:ring-indigo-500 text-sm shadow-inner resize-none"></textarea>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="limparHistoricoChat()" class="w-full p-3 rounded-xl font-bold bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 active:scale-95 transition-transform">🗑️ Apagar Histórico do Chat</button>
                <button onclick="salvarConfig()" class="w-full p-3 rounded-xl font-bold bg-indigo-600 text-white shadow-md active:scale-95 transition-transform">Salvar Configurações</button>
            </div>
        </div>
    </div>

    <script>
        // ESTADO GLOBAL & MEMÓRIA
        let bibliaCompleta = [];
        let indexLivro = parseInt(localStorage.getItem('arc_livro')) || 0;
        let indexCapitulo = parseInt(localStorage.getItem('arc_capitulo')) || 0;
        
        let chatMemoria = JSON.parse(localStorage.getItem('arc_chat')) || [];
        let buscaHistorico = JSON.parse(localStorage.getItem('arc_busca')) || [];
        let marcacoes = JSON.parse(localStorage.getItem('arc_marcacoes')) || {};
        
        let versiculoAtivo = null; // Guarda o versiculo selecionado {l, c, v, texto}
        const perfilPadrao = "Atue como um exímio teólogo. Adote a ortodoxia Neo Testamentária, a ortodoxia do Protestantismo Histórico e a Ortodoxia Pentecostal Clássica das Assembleias de Deus.";

        // --- SISTEMA DE NOTIFICAÇÃO (TOAST) ---
        function mostrarToast(mensagem) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = mensagem;
            toast.classList.add('mostrar');
            setTimeout(() => toast.classList.remove('mostrar'), 2500);
        }

        // --- 1. LÓGICA DA BÍBLIA & LEITURA ---
        async function iniciarBiblia() {
            const urlArc = 'https://raw.githubusercontent.com/maatheusgois/bible/main/versions/pt-br/arc.json';
            try {
                const resposta = await fetch(urlArc);
                if (!resposta.ok) throw new Error("Falha");
                bibliaCompleta = await resposta.json();
                preencherLivros();
                exibirCapitulo();
                renderizarChat(); // Restaura o chat assim que inicia
            } catch (erro) {
                document.getElementById('areaLeitura').innerHTML = `<div class="text-center mt-20 text-red-500 font-bold">Erro de Conexão.</div>`;
            }
        }

        function preencherLivros() {
            const selectLivro = document.getElementById('selLivro');
            selectLivro.innerHTML = bibliaCompleta.map((livro, i) => `<option value="${i}">${livro.name}</option>`).join('');
            preencherCapitulos();
        }

        function preencherCapitulos() {
            const selectCapitulo = document.getElementById('selCapitulo');
            const total = bibliaCompleta[indexLivro].chapters.length;
            let html = '';
            for(let i = 0; i < total; i++) html += `<option value="${i}">Capítulo ${i + 1}</option>`;
            selectCapitulo.innerHTML = html;
            selectCapitulo.value = indexCapitulo;
        }

        function salvarPosicao() {
            localStorage.setItem('arc_livro', indexLivro);
            localStorage.setItem('arc_capitulo', indexCapitulo);
        }

        function exibirCapitulo() {
            if(bibliaCompleta.length === 0) return;
            salvarPosicao(); // Salva memória de leitura
            fecharAcaoVersiculo(); // Limpa seleções

            const livro = bibliaCompleta[indexLivro];
            const versiculos = livro.chapters[indexCapitulo];
            
            let html = `<h2 class="text-3xl font-extrabold mb-8 text-indigo-900 dark:text-indigo-300 text-center">${livro.name} ${indexCapitulo + 1}</h2>`;
            
            versiculos.forEach((texto, i) => {
                const chaveMarcar = `${indexLivro}-${indexCapitulo}-${i}`;
                const classMarcado = marcacoes[chaveMarcar] ? 'marcado' : '';
                
                html += `
                <div class="flex gap-4 mb-3 items-start versiculo ${classMarcado}" onclick="selecionarVersiculo(${indexLivro}, ${indexCapitulo}, ${i}, this)">
                    <span class="text-[11px] font-black bg-indigo-100 dark:bg-indigo-900/60 text-indigo-700 dark:text-indigo-300 px-2 py-1 rounded shadow-sm mt-1.5 pointer-events-none">${i + 1}</span>
                    <p class="flex-1 text-gray-800 dark:text-gray-200 leading-relaxed pointer-events-none">${texto}</p>
                </div>`;
            });
            
            document.getElementById('areaLeitura').innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('selLivro').value = indexLivro;
            document.getElementById('selCapitulo').value = indexCapitulo;
        }

        // Navegação
        document.getElementById('selLivro').addEventListener('change', (e) => { indexLivro = parseInt(e.target.value); indexCapitulo = 0; preencherCapitulos(); exibirCapitulo(); });
        document.getElementById('selCapitulo').addEventListener('change', (e) => { indexCapitulo = parseInt(e.target.value); exibirCapitulo(); });
        document.getElementById('btnProximo').addEventListener('click', () => {
            if (indexCapitulo < bibliaCompleta[indexLivro].chapters.length - 1) { indexCapitulo++; } else if (indexLivro < bibliaCompleta.length - 1) { indexLivro++; indexCapitulo = 0; }
            preencherCapitulos(); exibirCapitulo();
        });
        document.getElementById('btnAnterior').addEventListener('click', () => {
            if (indexCapitulo > 0) { indexCapitulo--; } else if (indexLivro > 0) { indexLivro--; indexCapitulo = bibliaCompleta[indexLivro].chapters.length - 1; }
            preencherCapitulos(); exibirCapitulo();
        });

        // --- 2. TAP-TO-ACTION (VERSÍCULOS) ---
        function selecionarVersiculo(l, c, v, elementoHTML) {
            // Remove seleção anterior
            document.querySelectorAll('.versiculo.selecionado').forEach(el => el.classList.remove('selecionado'));
            
            // Adiciona nova seleção
            elementoHTML.classList.add('selecionado');
            versiculoAtivo = { l, c, v, texto: bibliaCompleta[l].chapters[c][v], ref: `${bibliaCompleta[l].name} ${c+1}:${v+1}` };
            
            document.getElementById('barraAcaoVersiculo').classList.add('aberta');
        }

        function fecharAcaoVersiculo() {
            document.getElementById('barraAcaoVersiculo').classList.remove('aberta');
            document.querySelectorAll('.versiculo.selecionado').forEach(el => el.classList.remove('selecionado'));
            versiculoAtivo = null;
        }

        function acaoCopiar() {
            if(!versiculoAtivo) return;
            const textoCopia = `"${versiculoAtivo.texto}" (${versiculoAtivo.ref} - ARC)`;
            navigator.clipboard.writeText(textoCopia).then(() => {
                mostrarToast("Versículo copiado!");
                fecharAcaoVersiculo();
            });
        }

        function acaoMarcar() {
            if(!versiculoAtivo) return;
            const chave = `${versiculoAtivo.l}-${versiculoAtivo.c}-${versiculoAtivo.v}`;
            
            if(marcacoes[chave]) {
                delete marcacoes[chave]; // Desmarcar
                mostrarToast("Marcação removida");
            } else {
                marcacoes[chave] = true; // Marcar
                mostrarToast("Versículo marcado!");
            }
            
            localStorage.setItem('arc_marcacoes', JSON.stringify(marcacoes));
            exibirCapitulo(); // Re-renderiza para aplicar a cor
        }

        function acaoExplicar() {
            if(!versiculoAtivo) return;
            const pergunta = `Por favor, explique o versículo de ${versiculoAtivo.ref}: "${versiculoAtivo.texto}"`;
            fecharAcaoVersiculo();
            abrirChat();
            document.getElementById('campoPergunta').value = pergunta;
            // Opcional: já clica no enviar automático
            // document.getElementById('btnEnviarMsg').click(); 
        }

        // --- 3. MECANISMO DE BUSCA (LUPA) ---
        const modalBusca = document.getElementById('modalBusca');
        const inputBusca = document.getElementById('inputBusca');
        const areaResultados = document.getElementById('areaResultadosBusca');

        function abrirModalBusca() { 
            modalBusca.classList.add('aberta'); 
            renderizarHistoricoBusca();
            setTimeout(() => inputBusca.focus(), 100);
        }
        function fecharModalBusca() { modalBusca.classList.remove('aberta'); inputBusca.value = ''; }

        function removerAcentos(str) { return str.normalize("NFD").replace(/[\u0300-\u036f]/g, ""); }

        function renderizarHistoricoBusca() {
            if(buscaHistorico.length === 0) {
                areaResultados.innerHTML = `<p class="text-gray-400 text-center mt-10 text-sm">Nenhuma busca recente.</p>`;
                return;
            }
            let html = `<div class="flex justify-between items-center mb-4"><h3 class="font-bold text-gray-500">Buscas Recentes</h3> <button onclick="limparBusca()" class="text-sm text-red-500">Limpar</button></div>`;
            buscaHistorico.forEach(termo => {
                html += `<div onclick="executarBusca('${termo}')" class="p-3 bg-gray-100 dark:bg-gray-800 rounded-xl mb-2 cursor-pointer font-semibold text-indigo-600 dark:text-indigo-400">🕒 ${termo}</div>`;
            });
            areaResultados.innerHTML = html;
        }

        function limparBusca() {
            buscaHistorico = [];
            localStorage.setItem('arc_busca', JSON.stringify(buscaHistorico));
            renderizarHistoricoBusca();
        }

        function executarBusca(termoForcado) {
            const termo = termoForcado || inputBusca.value.trim();
            if(!termo) return;
            
            if(!buscaHistorico.includes(termo)) {
                buscaHistorico.unshift(termo);
                if(buscaHistorico.length > 5) buscaHistorico.pop(); // Guarda as últimas 5
                localStorage.setItem('arc_busca', JSON.stringify(buscaHistorico));
            }

            inputBusca.value = termo;
            areaResultados.innerHTML = `<p class="text-center text-indigo-500 font-bold mt-10 animate-pulse">Pesquisando em 66 livros...</p>`;

            // Timeout para não travar a tela
            setTimeout(() => {
                const termoLimpo = removerAcentos(termo.toLowerCase());
                let resultados = [];
                let qtd = 0;

                for(let l=0; l<bibliaCompleta.length; l++){
                    for(let c=0; c<bibliaCompleta[l].chapters.length; c++){
                        for(let v=0; v<bibliaCompleta[l].chapters[c].length; v++){
                            const texto = bibliaCompleta[l].chapters[c][v];
                            if(removerAcentos(texto.toLowerCase()).includes(termoLimpo)){
                                resultados.push({l, c, v, texto, ref: `${bibliaCompleta[l].name} ${c+1}:${v+1}`});
                                qtd++;
                                if(qtd > 100) break; // Limite de renderização pra não travar celular ruim
                            }
                        }
                        if(qtd > 100) break;
                    }
                    if(qtd > 100) break;
                }

                if(resultados.length === 0) {
                    areaResultados.innerHTML = `<p class="text-center text-gray-500 mt-10">Nenhum resultado encontrado para "${termo}".</p>`;
                    return;
                }

                let html = `<p class="text-sm font-bold text-gray-500 mb-4">${qtd}${qtd > 100 ? '+' : ''} resultados encontrados</p>`;
                resultados.forEach(res => {
                    // Destacar termo
                    const regex = new RegExp(`(${termo})`, "gi");
                    const textoDestacado = res.texto.replace(regex, "<mark class='bg-yellow-200 text-black px-1 rounded'>$1</mark>");
                    
                    html += `
                    <div onclick="irParaResultado(${res.l}, ${res.c})" class="p-4 bg-white dark:bg-gray-800 rounded-xl mb-3 shadow-sm border border-gray-100 dark:border-gray-700 cursor-pointer active:scale-95 transition-transform">
                        <p class="text-xs font-bold text-indigo-600 mb-1">${res.ref}</p>
                        <p class="text-sm texto-biblia">${textoDestacado}</p>
                    </div>`;
                });
                areaResultados.innerHTML = html;
            }, 100);
        }

        document.getElementById('btnBuscar').addEventListener('click', () => executarBusca());
        inputBusca.addEventListener('keypress', (e) => { if(e.key === 'Enter') executarBusca(); });

        function irParaResultado(l, c) {
            indexLivro = l; indexCapitulo = c;
            fecharModalBusca();
            exibirCapitulo();
        }

        // --- 4. ASSISTENTE IA COM MEMÓRIA ---
        const gavetaChat = document.getElementById('gavetaChat');
        const listaMsg = document.getElementById('listaMensagens');
        const inputMsg = document.getElementById('campoPergunta');

        function abrirChat() { gavetaChat.classList.add('aberta'); rolarChatParaBaixo(); }
        function fecharChat() { gavetaChat.classList.remove('aberta'); }

        function renderizarChat() {
            if(chatMemoria.length === 0) {
                listaMsg.innerHTML = `<div class="flex justify-start mb-4"><div class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 p-4 rounded-2xl rounded-tl-none max-w-[90%] shadow-sm border border-gray-100 dark:border-gray-700">A Paz do Senhor! Sou o seu assistente. Como posso ajudar?</div></div>`;
                return;
            }
            
            let html = '';
            chatMemoria.forEach(msg => {
                if(msg.role === 'user') {
                    html += `<div class="flex justify-end mb-4"><div class="bg-indigo-100 dark:bg-indigo-900 text-indigo-900 dark:text-indigo-50 p-3 rounded-2xl rounded-tr-none max-w-[90%] shadow-sm font-sans text-sm">${msg.text}</div></div>`;
                } else {
                    const txt = msg.text.replace(/\n/g, '<br>');
                    html += `<div class="flex justify-start mb-4"><div class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 p-4 rounded-2xl rounded-tl-none max-w-[95%] shadow-sm border border-gray-100 dark:border-gray-700">${txt}</div></div>`;
                }
            });
            listaMsg.innerHTML = html;
            rolarChatParaBaixo();
        }

        function salvarMensagem(role, text) {
            chatMemoria.push({role, text});
            localStorage.setItem('arc_chat', JSON.stringify(chatMemoria));
            renderizarChat();
        }

        function limparHistoricoChat() {
            if(confirm("Tem certeza que deseja apagar toda a conversa com o assistente?")) {
                chatMemoria = [];
                localStorage.setItem('arc_chat', JSON.stringify([]));
                renderizarChat();
                fecharModalConfig();
                mostrarToast("Histórico apagado.");
            }
        }

        function rolarChatParaBaixo() { setTimeout(() => { listaMsg.scrollTop = listaMsg.scrollHeight; }, 50); }

        document.getElementById('btnEnviarMsg').addEventListener('click', async () => {
            const pergunta = inputMsg.value.trim();
            if (!pergunta) return;

            const chaveApi = localStorage.getItem('chave_secreta_gemini');
            if (!chaveApi) { abrirModalConfig(); return; }

            const instrucaoDeSistema = localStorage.getItem('perfil_ia_gemini') || perfilPadrao;

            // Salva na memória a msg do usuário (já vai renderizar na tela)
            salvarMensagem('user', pergunta);
            inputMsg.value = '';

            const idLoader = 'load-' + Date.now();
            listaMsg.innerHTML += `<div id="${idLoader}" class="flex justify-start mb-4"><div class="bg-gray-100 dark:bg-gray-800 text-gray-500 italic p-3 rounded-2xl rounded-tl-none text-sm animate-pulse">Meditando...</div></div>`;
            rolarChatParaBaixo();

            const urlEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${chaveApi}`;
            
            try {
                // Passa o histórico recente para a IA "lembrar" do contexto da conversa
                let historicoFormatado = chatMemoria.slice(-6).map(m => `${m.role === 'user' ? 'Usuário' : 'Você'}: ${m.text}`).join('\n');
                
                const payload = `Instrução: ${instrucaoDeSistema}\n\nHistórico Recente da Conversa:\n${historicoFormatado}\n\nResponda a última pergunta do Usuário.`;

                const resposta = await fetch(urlEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: payload }] }] })
                });
                
                const dadosJson = await resposta.json();
                document.getElementById(idLoader).remove();

                if (dadosJson.error) {
                    salvarMensagem('ai', `⚠️ Erro: ${dadosJson.error.message}`);
                    return;
                }

                salvarMensagem('ai', dadosJson.candidates[0].content.parts[0].text);

            } catch (erro) {
                document.getElementById(idLoader).remove();
                salvarMensagem('ai', "⚠️ Erro de rede. Verifique sua conexão.");
            }
        });

        document.getElementById('campoPergunta').addEventListener('keypress', function (e) { if (e.key === 'Enter') document.getElementById('btnEnviarMsg').click(); });

        // --- 5. CONFIGURAÇÕES GERAIS ---
        const modalConfig = document.getElementById('modalConfig');
        function abrirModalConfig() { 
            document.getElementById('inputChaveApi').value = localStorage.getItem('chave_secreta_gemini') || '';
            document.getElementById('inputPerfil').value = localStorage.getItem('perfil_ia_gemini') || perfilPadrao;
            modalConfig.classList.add('aberto'); 
        }
        function fecharModalConfig() { modalConfig.classList.remove('aberto'); }

        function salvarConfig() {
            const chave = document.getElementById('inputChaveApi').value.trim();
            if(!chave) return alert("A chave da API é obrigatória.");
            localStorage.setItem('chave_secreta_gemini', chave);
            localStorage.setItem('perfil_ia_gemini', document.getElementById('inputPerfil').value.trim() || perfilPadrao);
            fecharModalConfig();
            mostrarToast("Configurações salvas!");
        }

        document.getElementById('btnTema').addEventListener('click', () => { document.documentElement.classList.toggle('dark'); });
        
        // BOOT
        window.onload = iniciarBiblia;
    </script>
</body>
</html>
