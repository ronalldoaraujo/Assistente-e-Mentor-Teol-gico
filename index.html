<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia ARC & Assistente Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3073/3073403.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .texto-biblia { font-family: 'Lora', serif; line-height: 1.8; }
        .altura-dinamica { height: 100dvh; }
        
        /* Animações e Transições */
        .gaveta { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        .gaveta.aberta { transform: translateY(0); }
        .modal { transition: opacity 0.2s; opacity: 0; pointer-events: none; }
        .modal.aberto { opacity: 1; pointer-events: auto; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Scrollbar */
        .scroll-suave::-webkit-scrollbar { width: 4px; }
        .scroll-suave::-webkit-scrollbar-thumb { background: #818cf8; border-radius: 4px; }
        
        /* Estilos de Marcação e Busca */
        .versiculo-marcado { background-color: rgba(253, 224, 71, 0.4); border-radius: 0.5rem; padding: 0.25rem; transition: background-color 0.2s; }
        .dark .versiculo-marcado { background-color: rgba(161, 98, 7, 0.4); }
        .highlight-busca { font-weight: 700; color: #4f46e5; background-color: rgba(99, 102, 241, 0.2); padding: 0 2px; border-radius: 2px; }
        .dark .highlight-busca { color: #818cf8; background-color: rgba(129, 140, 248, 0.2); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100">

    <header class="fixed top-0 left-0 right-0 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 z-30 p-4 shadow-sm">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-xl font-extrabold text-indigo-700 dark:text-indigo-400 tracking-tight">Bíblia ARC</h1>
                <div class="flex items-center gap-2">
                    <button onclick="abrirBusca()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform">🔍</button>
                    <button onclick="abrirModalConfig()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform">⚙️</button>
                    <button id="btnTema" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform">🌓</button>
                </div>
            </div>
            <div class="flex gap-2">
                <select id="selLivro" class="flex-[2] bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 appearance-none font-semibold"></select>
                <select id="selCapitulo" class="flex-1 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 appearance-none font-semibold text-center"></select>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-24 px-4 max-w-md mx-auto min-h-screen">
        <div id="areaLeitura" class="texto-biblia text-xl">
            <div class="flex flex-col items-center justify-center mt-20 text-indigo-600">
                <svg class="w-12 h-12 mb-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="font-sans font-bold text-lg animate-pulse">Preparando as Escrituras...</p>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-3 z-30 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto grid grid-cols-4 gap-2">
            <button id="btnAnterior" class="bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">←</button>
            <button onclick="abrirChat()" class="col-span-2 bg-indigo-600 text-white shadow-lg p-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <span class="text-xl">✨</span> Assistente IA
            </button>
            <button id="btnProximo" class="bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">→</button>
        </div>
    </nav>

    <div id="modalVersiculo" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex flex-col justify-end modal">
        <div class="bg-white dark:bg-gray-800 rounded-t-3xl p-5 w-full max-w-md mx-auto shadow-2xl transform transition-transform translate-y-full" id="sheetVersiculo">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto mb-4"></div>
            <p id="refVersiculoSelecionado" class="text-sm font-bold text-indigo-600 dark:text-indigo-400 mb-2 uppercase tracking-wide"></p>
            <p id="textoVersiculoSelecionado" class="texto-biblia text-lg text-gray-800 dark:text-gray-200 mb-6 line-clamp-3"></p>
            
            <div class="grid grid-cols-3 gap-3 mb-4">
                <button onclick="acaoCopiarVersiculo()" class="flex flex-col items-center justify-center p-3 bg-gray-100 dark:bg-gray-700 rounded-2xl active:scale-95 transition-transform">
                    <span class="text-2xl mb-1">📋</span><span class="text-xs font-bold">Copiar</span>
                </button>
                <button onclick="acaoMarcarVersiculo()" class="flex flex-col items-center justify-center p-3 bg-gray-100 dark:bg-gray-700 rounded-2xl active:scale-95 transition-transform">
                    <span class="text-2xl mb-1">🖍️</span><span class="text-xs font-bold" id="btnMarcarTexto">Marcar</span>
                </button>
                <button onclick="acaoExplicarVersiculo()" class="flex flex-col items-center justify-center p-3 bg-indigo-100 dark:bg-indigo-900/50 rounded-2xl active:scale-95 transition-transform text-indigo-700 dark:text-indigo-300">
                    <span class="text-2xl mb-1">✨</span><span class="text-xs font-bold">Explicar</span>
                </button>
            </div>
            <button onclick="fecharModalVersiculo()" class="w-full p-3 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-xl font-bold mt-2">Fechar</button>
        </div>
    </div>

    <div id="telaBusca" class="fixed inset-0 bg-white dark:bg-gray-900 z-50 flex flex-col gaveta altura-dinamica">
        <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex items-center gap-3">
            <button onclick="fecharBusca()" class="p-2 text-2xl text-gray-500 hover:text-gray-800 dark:hover:text-white">←</button>
            <input type="text" id="inputBusca" placeholder="Buscar na Bíblia..." class="flex-1 p-3 rounded-xl bg-gray-100 dark:bg-gray-800 border-none outline-none focus:ring-2 focus:ring-indigo-500 text-base font-sans">
            <button onclick="executarBusca()" class="bg-indigo-600 text-white p-3 rounded-xl font-bold shadow-md">Ir</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 scroll-suave" id
