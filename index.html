<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia ARC Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .texto-biblia { font-family: 'Lora', serif; line-height: 1.8; }
        .gaveta { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        .gaveta.aberta { transform: translateY(0); }
        .modal { transition: opacity 0.2s; opacity: 0; pointer-events: none; }
        .modal.aberto { opacity: 1; pointer-events: auto; }
        .sheet { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateY(100%); }
        .sheet.aberto { transform: translateY(0); }
        .scroll-suave::-webkit-scrollbar { width: 4px; }
        .scroll-suave::-webkit-scrollbar-thumb { background: #818cf8; border-radius: 4px; }
        .altura-dinamica { height: 100dvh; }
        .versiculo-animado { transition: background-color 0.2s, transform 0.1s; }
        .versiculo-animado:active { transform: scale(0.98); background-color: rgba(99, 102, 241, 0.1); border-radius: 8px; }
        /* Destaque de marca-texto */
        .marcado { background-color: rgba(253, 224, 71, 0.4) !important; border-radius: 8px; padding: 4px; }
        .dark .marcado { background-color: rgba(161, 98, 7, 0.5) !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100 flex flex-col h-screen overflow-hidden">

    <header class="flex-none bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 z-30 p-4 shadow-sm">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-xl font-extrabold text-indigo-700 dark:text-indigo-400 tracking-tight">Bíblia ARC</h1>
                <div class="flex items-center gap-2">
                    <button onclick="abrirBusca()" class="p-2 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 rounded-full shadow-sm active:scale-95 transition-transform">🔍</button>
                    <button onclick="abrirModalConfig()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full shadow-sm active:scale-95 transition-transform text-sm">⚙️</button>
                    <button id="btnTema" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full shadow-sm active:scale-95 transition-transform">🌓</button>
                </div>
            </div>
            <div class="flex gap-2">
                <select id="selLivro" class="flex-[2] bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 appearance-none font-semibold"></select>
                <select id="selCapitulo" class="flex-1 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 appearance-none font-semibold text-center"></select>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 pb-24 scroll-suave" id="mainLeitura">
        <div id="areaLeitura" class="max-w-md mx-auto texto-biblia text-xl">
            <div class="flex flex-col items-center justify-center mt-32 text-indigo-600">
                <svg class="w-12 h-12 mb-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="font-sans font-bold text-lg animate-pulse">Carregando Bíblia...</p>
            </div>
        </div>
    </main>

    <nav class="flex-none bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-3 z-20 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] relative">
        <div class="max-w-md mx-auto grid grid-cols-4 gap-2">
            <button id="btnAnterior" class="bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">←</button>
            <button onclick="abrirChat()" class="col-span-2 bg-indigo-600 text-white shadow-lg p-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform">
                <span class="text-xl">✨</span> IA <span class="text-xs font-normal opacity-80">(Com Memória)</span>
            </button>
            <button id="btnProximo" class="bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">→</button>
        </div>
    </nav>

    <div id="fundoMenuVersiculo" onclick="fecharMenuVersiculo()" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-40 modal"></div>
    <div id="menuVersiculo" class="fixed bottom-0 left-0 right-0 z-50 bg-white dark:bg-gray-800 rounded-t-3xl shadow-2xl sheet p-5 pb-8 max-w-md mx-auto">
        <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto mb-4"></div>
        <h3 id="tituloMenuVersiculo" class="text-center font-bold text-lg mb-1 text-indigo-700 dark:text-indigo-400">Livro 1:1</h3>
        <p id="textoMenuVersiculo" class="text-center text-sm text-gray-500 dark:text-gray-400 mb-6 line-clamp-2 texto-biblia"></p>
        
        <div class="grid grid-cols-3 gap-3">
            <button onclick="acaoCopiar()" class="flex flex-col items-center p-3 bg-gray-50 dark:bg-gray-700 rounded-2xl active:scale-95 transition-transform">
                <span class="text-2xl mb-1">📋</span><span class="text-xs font-semibold">Copiar</span>
            </button>
            <button onclick="acaoMarcar()" class="flex flex-col items-center p-3 bg-gray-50 dark:bg-gray-700 rounded-2xl active:scale-95 transition-transform">
                <span class="text-2xl mb-1">🖍️</span><span class="text-xs font-semibold">Marcar</span>
            </button>
            <button onclick="acaoExplicar()" class="flex flex-col items-center p-3 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-300 rounded-2xl active:scale-95 transition-transform border border-indigo-100 dark:border-indigo-800">
                <span class="text-2xl mb-1">✨</span><span class="text-xs font-bold">Explicar</span>
            </button>
        </div>
    </div>

    <div id="gavetaBusca" class="fixed top-0 left-0 right-0 bottom-0 z-50 flex flex-col bg-white dark:bg-gray-900 gaveta altura-dinamica">
        <div class="p-4 border-b dark:border-gray-800 flex gap-2 items-center bg-gray-50 dark:bg-gray-900 pt-5">
            <button onclick="fecharBusca()" class="p-2 text-xl font-bold text-gray-500 active:scale-90">←</button>
            <div class="flex-1 relative">
                <input id="inputBusca" type="text" placeholder="Pesquise uma palavra..." class="w-full p-3 pl-10 rounded-xl bg-gray-200 dark:bg-gray-800 outline-none focus:ring-2 focus:ring-indigo-500">
                <span class="absolute left-3 top-3.5 text-gray-400">🔍</span>
            </div>
            <button onclick="realizarBusca()" class="bg-indigo-600 text-white px-4 py-3 rounded-xl font-bold active:scale-95">Buscar</button>
        </div>
        
        <div id="areaResultados" class="flex-1 overflow-y-auto p-4 scroll-suave">
            <div id="historicoBusca" class="mb-6">
                <p class="text-xs font-bold text-gray-500 uppercase mb-3 tracking-wider">Buscas Recentes</p>
                <div id="tagsHistorico" class="flex flex-wrap gap-2"></div>
            </div>
            <div id="listaResultados" class="space-y-4"></div>
        </div>
    </div>

    <div id="gavetaChat" class="fixed top-0 left-0 right-0 bottom-0 z-40 flex flex-col bg-gray-50 dark:bg-gray-900 gaveta altura-dinamica">
        <div class="p-4 bg-indigo-700 text-white flex justify-between items-center shadow-md pt-5">
            <div>
                <h3 class="font-bold text-lg leading-tight">Assistente Teológico</h3>
                <p class="text-[11px] opacity-90 font-medium tracking-wider">Sessão Salva Automaticamente</p>
            </div>
            <div class="flex gap-2">
                <button onclick="limparChat()" class="bg-indigo-800 p-2 rounded-full w-10 h-10 flex items-center justify-center font-bold text-sm" title="Apagar Memória">🗑️</button>
                <button onclick="fecharChat()" class="bg-indigo-800 hover:bg-indigo-900 p-2 rounded-full w-10 h-10 flex items-center justify-center font-bold text-xl">&times;</button>
            </div>
        </div>
        
        <div id="listaMensagens" class="flex-1 overflow-y-auto p-4 space-y-4 texto-biblia text-base scroll-suave"></div>

        <div class="p-3 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex gap-2 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] pb-5">
            <input id="campoPergunta" type="text" placeholder="Digite sua pergunta..." class="flex-1 p-3 rounded-xl bg-gray-100 dark:bg-gray-700 outline-none focus:ring-2 focus:ring-indigo-500 font-sans">
            <button id="btnEnviarMsg" class="bg-indigo-600 text-white px-5 rounded-xl font-bold active:scale-95">Enviar</button>
        </div>
    </div>

    <div id="modalConfig" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 modal">
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 w-full max-w-md shadow-2xl transform transition-all max-h-[90vh] overflow-y-auto scroll-suave">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-xl flex items-center gap-2">⚙️ Configurações</h3>
                <button onclick="fecharModalConfig()" class="text-gray-500 font-bold text-2xl">&times;</button>
            </div>
            <div class="mb-5">
                <label class="block text-sm font-bold mb-2">Chave da API (Gemini)</label>
                <input type="text" id="inputChaveApi" class="w-full p-3 rounded-xl bg-gray-100 dark:bg-gray-700 outline-none focus:ring-2 focus:ring-indigo-500 font-mono text-sm">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold mb-1">Perfil de Instrução (Regra de Fé)</label>
                <p class="text-[10px] text-gray-500 mb-2 leading-tight">Define a doutrina que a IA deve seguir.</p>
                <textarea id="inputPerfil" rows="5" class="w-full p-3 rounded-xl bg-gray-100 dark:bg-gray-700 outline-none focus:ring-2 focus:ring-indigo-500 text-sm resize-none"></textarea>
            </div>
            <button onclick="salvarConfig()" class="w-full p-3 rounded-xl font-bold bg-indigo-600 text-white active:scale-95">Salvar</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. ESTADO GLOBAL E BANCO DE DADOS LOCAL
        // ==========================================
        let bibliaCompleta = [];
        // OPÇÃO 2: Memória de Leitura (Carrega de onde parou)
        let indexLivro = parseInt(localStorage.getItem('arc_livro')) || 0;
        let indexCapitulo = parseInt(localStorage.getItem('arc_capitulo')) || 0;
        
        // Dados Salvos
        let historicoChat = JSON.parse(localStorage.getItem('arc_chat')) || [];
        let historicoBusca = JSON.parse(localStorage.getItem('arc_buscas')) || [];
        let versiculosMarcados = JSON.parse(localStorage.getItem('arc_marcados')) || {};
        
        // Controle de Ação
        let versiculoSelecionado = null;

        const perfilPadrao = "Atue como um exímio teólogo. Sempre que o assunto for Bíblia Sagrada, regra de fé ou prática cristã, adote a ortodoxia Neo Testamentária, a ortodoxia do Protestantismo Histórico e a Ortodoxia Pentecostal Clássica das Assembleias de Deus. Seja claro, profundo e pastoral em suas respostas.";

        // ==========================================
        // 2. INICIALIZAÇÃO DA BÍBLIA
        // ==========================================
        async function iniciarBiblia() {
            try {
                const resposta = await fetch('https://raw.githubusercontent.com/maatheusgois/bible/main/versions/pt-br/arc.json');
                bibliaCompleta = await resposta.json();
                preencherLivros();
                exibirCapitulo();
                renderizarChat(); // Carrega a memória do chat
            } catch (e) {
                document.getElementById('areaLeitura').innerHTML = `<p class="text-center text-red-500 mt-20">Erro ao carregar internet.</p>`;
            }
        }

        function salvarPosicao() {
            localStorage.setItem('arc_livro', indexLivro);
            localStorage.setItem('arc_capitulo', indexCapitulo);
        }

        function preencherLivros() {
            const select = document.getElementById('selLivro');
            select.innerHTML = bibliaCompleta.map((l, i) => `<option value="${i}">${l.name}</option>`).join('');
            preencherCapitulos();
        }

        function preencherCapitulos() {
            const select = document.getElementById('selCapitulo');
            const total = bibliaCompleta[indexLivro].chapters.length;
            select.innerHTML = Array.from({length: total}, (_, i) => `<option value="${i}">Capítulo ${i + 1}</option>`).join('');
            select.value = indexCapitulo;
        }

        function exibirCapitulo() {
            const livro = bibliaCompleta[indexLivro];
            const versiculos = livro.chapters[indexCapitulo];
            
            let html = `<h2 class="text-3xl font-extrabold mb-8 text-indigo-900 dark:text-indigo-300 text-center">${livro.name} ${indexCapitulo + 1}</h2>`;
            
            versiculos.forEach((texto, i) => {
                const idMarcador = `${indexLivro}_${indexCapitulo}_${i}`;
                const classeMarcado = versiculosMarcados[idMarcador] ? 'marcado' : '';
                
                // OPÇÃO 1: Tap-to-Action (onclick no versículo)
                html += `
                <div onclick="abrirOpcoesVersiculo(${indexLivro}, ${indexCapitulo}, ${i}, '${texto.replace(/'/g, "\\'")}')" 
                     class="flex gap-4 mb-4 items-start versiculo-animado p-1 -mx-1 cursor-pointer ${classeMarcado}" id="v_${i}">
                    <span class="text-[11px] font-black bg-indigo-100 dark:bg-indigo-900/60 text-indigo-700 dark:text-indigo-300 px-2 py-1 rounded shadow-sm mt-1.5 min-w-[1.5rem] text-center">${i + 1}</span>
                    <p class="flex-1 text-gray-800 dark:text-gray-200 leading-relaxed">${texto}</p>
                </div>`;
            });
            
            document.getElementById('areaLeitura').innerHTML = html;
            document.getElementById('mainLeitura').scrollTo({ top: 0, behavior: 'smooth' });
            salvarPosicao(); // Salva memória
        }

        // Navegação
        document.getElementById('selLivro').addEventListener('change', (e) => { indexLivro = parseInt(e.target.value); indexCapitulo = 0; preencherCapitulos(); exibirCapitulo(); });
        document.getElementById('selCapitulo').addEventListener('change', (e) => { indexCapitulo = parseInt(e.target.value); exibirCapitulo(); });
        document.getElementById('btnProximo').addEventListener('click', () => {
            if (indexCapitulo < bibliaCompleta[indexLivro].chapters.length - 1) { indexCapitulo++; } else if (indexLivro < bibliaCompleta.length - 1) { indexLivro++; indexCapitulo = 0; }
            document.getElementById('selLivro').value = indexLivro; preencherCapitulos(); exibirCapitulo();
        });
        document.getElementById('btnAnterior').addEventListener('click', () => {
            if (indexCapitulo > 0) { indexCapitulo--; } else if (indexLivro > 0) { indexLivro--; indexCapitulo = bibliaCompleta[indexLivro].chapters.length - 1; }
            document.getElementById('selLivro').value = indexLivro; preencherCapitulos(); exibirCapitulo();
        });

        // ==========================================
        // 3. OPÇÃO 1: INTERAÇÃO DE VERSÍCULO (TAP-TO-ACTION)
        // ==========================================
        function abrirOpcoesVersiculo(livroId, capId, versId, texto) {
            versiculoSelecionado = { livroId, capId, versId, texto, nomeLivro: bibliaCompleta[livroId].name };
            
            document.getElementById('tituloMenuVersiculo').innerText = `${versiculoSelecionado.nomeLivro} ${capId + 1}:${versId + 1}`;
            document.getElementById('textoMenuVersiculo').innerText = `"${texto}"`;
            
            document.getElementById('fundoMenuVersiculo').classList.add('aberto');
            document.getElementById('menuVersiculo').classList.add('aberto');
        }

        function fecharMenuVersiculo() {
            document.getElementById('fundoMenuVersiculo').classList.remove('aberto');
            document.getElementById('menuVersiculo').classList.remove('aberto');
        }

        function acaoCopiar() {
            const texto = `"${versiculoSelecionado.texto}" (${versiculoSelecionado.nomeLivro} ${versiculoSelecionado.capId + 1}:${versiculoSelecionado.versId + 1}) - ARC`;
            navigator.clipboard.writeText(texto);
            fecharMenuVersiculo();
            alert("Versículo copiado!");
        }

        function acaoMarcar() {
            const id = `${versiculoSelecionado.livroId}_${versiculoSelecionado.capId}_${versiculoSelecionado.versId}`;
            if (versiculosMarcados[id]) { delete versiculosMarcados[id]; } else { versiculosMarcados[id] = true; }
            localStorage.setItem('arc_marcados', JSON.stringify(versiculosMarcados));
            exibirCapitulo(); // Re-renderiza para mostrar/tirar a cor
            fecharMenuVersiculo();
        }

        function acaoExplicar() {
            fecharMenuVersiculo();
            abrirChat();
            const pergunta = `Por favor, me explique de forma profunda este versículo: "${versiculoSelecionado.texto}" (${versiculoSelecionado.nomeLivro} ${versiculoSelecionado.capId + 1}:${versiculoSelecionado.versId + 1})`;
            document.getElementById('campoPergunta').value = pergunta;
            document.getElementById('btnEnviarMsg').click(); // Envia automático
        }

        // ==========================================
        // 4. OPÇÃO 3: BUSCA BÍBLICA ENGINE
        // ==========================================
        function abrirBusca() { 
            document.getElementById('gavetaBusca').classList.add('aberta'); 
            renderizarHistoricoBusca();
        }
        function fecharBusca() { document.getElementById('gavetaBusca').classList.remove('aberta'); }

        // Remove acentos para busca exata (fé = fe)
        function removerAcentos(str) { return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase(); }

        function renderizarHistoricoBusca() {
            const container = document.getElementById('tagsHistorico');
            if(historicoBusca.length === 0) {
                document.getElementById('historicoBusca').style.display = 'none';
                return;
            }
            document.getElementById('historicoBusca').style.display = 'block';
            container.innerHTML = historicoBusca.map(termo => 
                `<button onclick="document.getElementById('inputBusca').value='${termo}'; realizarBusca()" class="bg-gray-200 dark:bg-gray-700 px-3 py-1.5 rounded-lg text-sm font-semibold active:scale-95">${termo}</button>`
            ).join('');
        }

        function realizarBusca() {
            const termo = document.getElementById('inputBusca').value.trim();
            if(!termo || termo.length < 2) return alert("Digite pelo menos 2 letras.");

            // Salva histórico (mantendo últimos 10)
            historicoBusca = [termo, ...historicoBusca.filter(t => t !== termo)].slice(0, 10);
            localStorage.setItem('arc_buscas', JSON.stringify(historicoBusca));
            renderizarHistoricoBusca();

            const termoLimpo = removerAcentos(termo);
            const lista = document.getElementById('listaResultados');
            lista.innerHTML = `<p class="text-center text-indigo-500 font-bold mt-10 animate-pulse">Procurando em toda a Bíblia...</p>`;

            // Timeout para deixar a UI respirar e mostrar o "Procurando..."
            setTimeout(() => {
                let resultados = [];
                bibliaCompleta.forEach((livro, lId) => {
                    livro.chapters.forEach((cap, cId) => {
                        cap.forEach((vers, vId) => {
                            if (removerAcentos(vers).includes(termoLimpo)) {
                                resultados.push({ lId, cId, vId, nome: livro.name, texto: vers });
                            }
                        });
                    });
                });

                if(resultados.length === 0) {
                    lista.innerHTML = `<p class="text-center text-gray-500 mt-10">Nenhum resultado encontrado para "${termo}".</p>`;
                    return;
                }

                lista.innerHTML = `<p class="text-sm font-bold text-gray-500 mb-4">${resultados.length} resultados encontrados:</p>` + 
                resultados.map(res => `
                    <div onclick="irParaVersiculo(${res.lId}, ${res.cId}, ${res.vId})" class="bg-gray-100 dark:bg-gray-800 p-4 rounded-2xl active:scale-95 transition-transform cursor-pointer border border-transparent hover:border-indigo-300">
                        <h4 class="font-bold text-indigo-600 dark:text-indigo-400 text-sm mb-1">${res.nome} ${res.cId + 1}:${res.vId + 1}</h4>
                        <p class="text-sm texto-biblia line-clamp-3">${res.texto}</p>
                    </div>
                `).join('');
            }, 50);
        }

        function irParaVersiculo(l, c, v) {
            fecharBusca();
            indexLivro = l; indexCapitulo = c;
            document.getElementById('selLivro').value = l; preencherCapitulos();
            exibirCapitulo();
            
            // Destaca o versículo focado rolando a página até ele
            setTimeout(() => {
                const el = document.getElementById(`v_${v}`);
                if(el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    el.style.backgroundColor = 'rgba(99, 102, 241, 0.2)'; // Pisca
                    setTimeout(() => el.style.backgroundColor = '', 1500);
                }
            }, 300);
        }

        document.getElementById('inputBusca').addEventListener('keypress', (e) => { if (e.key === 'Enter') realizarBusca(); });

        // ==========================================
        // 5. OPÇÃO 2: CHAT COM MEMÓRIA
        // ==========================================
        function abrirChat() { document.getElementById('gavetaChat').classList.add('aberta'); }
        function fecharChat() { document.getElementById('gavetaChat').classList.remove('aberta'); }

        function renderizarChat() {
            const lista = document.getElementById('listaMensagens');
            if(historicoChat.length === 0) {
                lista.innerHTML = `<div class="bg-white dark:bg-gray-800 p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 dark:border-gray-700 max-w-[90%]">A Paz do Senhor! O nosso chat agora tem memória. Tudo o que conversarmos ficará salvo aqui para você não perder seus estudos.</div>`;
                return;
            }
            
            lista.innerHTML = historicoChat.map(msg => {
                if(msg.role === 'user') {
                    return `<div class="flex justify-end mb-4"><div class="bg-indigo-100 dark:bg-indigo-900 text-indigo-900 dark:text-indigo-50 p-3 rounded-2xl rounded-tr-none max-w-[90%] shadow-sm font-sans text-sm">${msg.text}</div></div>`;
                } else {
                    return `<div class="flex justify-start mb-4"><div class="bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200 p-4 rounded-2xl rounded-tl-none max-w-[95%] shadow-sm border border-gray-100 dark:border-gray-700">${msg.text.replace(/\n/g, '<br>')}</div></div>`;
                }
            }).join('');
            rolarChat();
        }

        function salvarMsgChat(role, text) {
            historicoChat.push({ role, text });
            // Mantém apenas as últimas 50 mensagens para o celular não travar
            if(historicoChat.length > 50) historicoChat.shift(); 
            localStorage.setItem('arc_chat', JSON.stringify(historicoChat));
            renderizarChat();
        }

        function limparChat() {
            if(confirm("Tem certeza que deseja apagar todo o histórico de conversas com a IA?")) {
                historicoChat = [];
                localStorage.removeItem('arc_chat');
                renderizarChat();
            }
        }

        function rolarChat() { 
            const lista = document.getElementById('listaMensagens');
            setTimeout(() => { lista.scrollTop = lista.scrollHeight; }, 50); 
        }

        document.getElementById('btnEnviarMsg').addEventListener('click', async () => {
            const pergunta = document.getElementById('campoPergunta').value.trim();
            if (!pergunta) return;

            const chaveApi = localStorage.getItem('chave_secreta_gemini');
            if (!chaveApi) { abrirModalConfig(); return; }

            const instrucaoDeSistema = localStorage.getItem('perfil_ia_gemini') || perfilPadrao;

            salvarMsgChat('user', pergunta);
            document.getElementById('campoPergunta').value = '';

            const idLoader = 'load-' + Date.now();
            document.getElementById('listaMensagens').innerHTML += `<div id="${idLoader}" class="flex justify-start mb-4"><div class="bg-gray-100 dark:bg-gray-800 text-gray-500 italic p-3 rounded-2xl rounded-tl-none text-sm animate-pulse">Processando...</div></div>`;
            rolarChat();

            // Monta o contexto juntando o histórico (para a IA "lembrar" do que estão falando)
            let conversaFormatada = historicoChat.map(m => `${m.role === 'user' ? 'Usuário' : 'Você'}: ${m.text}`).join('\n\n');
            
            const urlEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${chaveApi}`;
            
            try {
                const resposta = await fetch(urlEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Instrução: ${instrucaoDeSistema}\n\nHistórico da Conversa:\n${conversaFormatada}\n\nUsuário enviou agora: ${pergunta}` }] }]
                    })
                });
                
                const dados = await resposta.json();
                document.getElementById(idLoader).remove();

                if (dados.error) { salvarMsgChat('ai', `⚠️ Erro na IA: ${dados.error.message}`); return; }
                salvarMsgChat('ai', dados.candidates[0].content.parts[0].text);

            } catch (erro) {
                document.getElementById(idLoader).remove();
                salvarMsgChat('ai', "⚠️ Erro de rede. Verifique sua conexão.");
            }
        });

        document.getElementById('campoPergunta').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('btnEnviarMsg').click(); });

        // ==========================================
        // 6. CONFIGURAÇÕES & TEMA
        // ==========================================
        function abrirModalConfig() { 
            document.getElementById('inputChaveApi').value = localStorage.getItem('chave_secreta_gemini') || '';
            document.getElementById('inputPerfil').value = localStorage.getItem('perfil_ia_gemini') || perfilPadrao;
            document.getElementById('modalConfig').classList.add('aberto'); 
        }
        function fecharModalConfig() { document.getElementById('modalConfig').classList.remove('aberto'); }
        function salvarConfig() {
            const chave = document.getElementById('inputChaveApi').value.trim();
            if(!chave) return alert("A chave da API é obrigatória.");
            localStorage.setItem('chave_secreta_gemini', chave);
            localStorage.setItem('perfil_ia_gemini', document.getElementById('inputPerfil').value.trim() || perfilPadrao);
            fecharModalConfig();
            alert("Configurações salvas!");
        }
        document.getElementById('btnTema').addEventListener('click', () => { document.documentElement.classList.toggle('dark'); });
        
        // Iniciar
        window.onload = iniciarBiblia;
    </script>
</body>
</html>
