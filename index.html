<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia ARC Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3073/3073403.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        /* BLOQUEIO DE SELEÇÃO GLOBAL: Evita que o usuário selecione a interface sem querer */
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; 
            transition: padding-bottom 0.3s ease;
            user-select: none; 
            -webkit-user-select: none; 
        }
        
        /* PERMITE SELEÇÃO APENAS ONDE IMPORTA (Chat e Input) */
        .texto-selecionavel { user-select: text; -webkit-user-select: text; cursor: text; }
        textarea { user-select: text; -webkit-user-select: text; }

        .texto-biblia { font-family: 'Lora', serif; line-height: 1.8; }
        .altura-dinamica { height: 100dvh; }
        
        .modal { transition: opacity 0.2s; opacity: 0; pointer-events: none; }
        .modal.aberto { opacity: 1; pointer-events: auto; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .scroll-suave::-webkit-scrollbar { width: 4px; }
        .scroll-suave::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        .dark .scroll-suave::-webkit-scrollbar-thumb { background: #475569; }
        
        /* VERSÍCULOS */
        .versiculo-marcado { background-color: rgba(250, 204, 21, 0.4); border-radius: 0.5rem; transition: background-color 0.2s; }
        .dark .versiculo-marcado { background-color: rgba(161, 98, 7, 0.4); }
        .versiculo-selecionado { background-color: rgba(59, 130, 246, 0.1); border-left: 4px solid #2563eb; border-radius: 0 0.5rem 0.5rem 0; }
        .dark .versiculo-selecionado { background-color: rgba(59, 130, 246, 0.2); border-left-color: #60a5fa; }
        .highlight-busca { font-weight: 700; color: #2563eb; background-color: rgba(59, 130, 246, 0.15); padding: 0 2px; border-radius: 2px; }
        .dark .highlight-busca { color: #60a5fa; background-color: rgba(59, 130, 246, 0.25); }

        /* GAVETA INTELIGENTE */
        .bottom-sheet {
            position: fixed; left: 0; right: 0; bottom: 76px; z-index: 50;
            background: white; display: flex; flex-direction: column;
            border-radius: 1.5rem 1.5rem 0 0; box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s cubic-bezier(0.3, 0.9, 0.3, 1), height 0.3s cubic-bezier(0.3, 0.9, 0.3, 1);
        }
        .dark .bottom-sheet { background: #0f172a; box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5); border-top: 1px solid #1e293b; }
        .sheet-hidden { transform: translateY(120%); opacity: 0; pointer-events: none; }
        .sheet-half { transform: translateY(0); height: 50dvh; opacity: 1; pointer-events: auto; }
        .sheet-full { transform: translateY(0); height: calc(100dvh - 76px); opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 dark:bg-gray-900 dark:text-gray-100 pb-safe">

    <header class="fixed top-0 left-0 right-0 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 z-30 p-4 shadow-sm">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-3">
                <h1 class="text-xl font-extrabold text-gray-900 dark:text-gray-100 tracking-tight">Bíblia ARC</h1>
                <div class="flex items-center gap-2">
                    <button onclick="abrirBusca()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform" title="Buscar Palavra">🔍</button>
                    <button onclick="abrirModalConfig()" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform" title="Configurar IA">⚙️</button>
                    <button id="btnTema" class="p-2 bg-gray-100 dark:bg-gray-800 rounded-full text-lg shadow-sm active:scale-95 transition-transform" title="Mudar Tema">🌓</button>
                </div>
            </div>
            <div class="flex gap-2">
                <select id="selLivro" class="flex-[2] bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 appearance-none font-semibold"></select>
                <select id="selCapitulo" class="flex-1 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-2.5 rounded-xl text-sm outline-none focus:ring-2 focus:ring-blue-500 appearance-none font-semibold text-center"></select>
            </div>
        </div>
    </header>

    <main id="mainBiblia" class="pt-32 pb-24 px-4 max-w-md mx-auto min-h-screen">
        <div id="areaLeitura" class="texto-biblia text-xl">
            <div class="flex flex-col items-center justify-center mt-20 text-blue-600 dark:text-blue-400">
                <svg class="w-12 h-12 mb-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <p class="font-sans font-bold text-lg animate-pulse">Preparando as Escrituras...</p>
            </div>
        </div>
    </main>

    <nav id="navInferior" class="fixed bottom-0 left-0 right-0 h-[76px] bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 p-3 z-40 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
        <div class="max-w-md mx-auto flex gap-2">
            <button id="btnAnterior" class="flex-none w-14 bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">←</button>
            <button onclick="toggleChat()" class="flex-1 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 shadow-md p-3 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-transform whitespace-nowrap">
                <span class="text-xl">✨</span> Assistente da Bíblia
            </button>
            <button id="btnProximo" class="flex-none w-14 bg-gray-100 dark:bg-gray-800 p-3 rounded-xl font-bold active:scale-95 transition-transform flex items-center justify-center text-lg">→</button>
        </div>
    </nav>

    <div id="gavetaChat" class="bottom-sheet sheet-hidden">
        <div id="dragHandle" class="w-full pt-3 pb-1 flex justify-center cursor-pointer touch-none" title="Arraste para cima/baixo">
            <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full"></div>
        </div>
        <div class="px-4 pb-3 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-2xl">✨</span>
                <div>
                    <h3 class="font-bold text-lg text-gray-900 dark:text-gray-100 leading-tight">Assistente da Bíblia</h3>
                    <p class="text-[11px] text-gray-500 dark:text-gray-400 font-medium">Ortodoxia & Teologia</p>
                </div>
            </div>
            <div class="flex items-center gap-1">
                <button onclick="limparChat()" class="p-2 text-gray-400 hover:text-red-500 rounded-full font-bold text-lg transition-colors" title="Limpar Conversa">🗑️</button>
                <button onclick="toggleTamanhoChat()" id="btnTamanhoChat" class="p-2 text-gray-400 hover:text-blue-500 rounded-full font-bold text-lg transition-colors" title="Tela Cheia">⛶</button>
                <button onclick="mudarEstadoChat('hidden')" class="p-2 text-gray-500 hover:text-gray-800 dark:hover:text-white rounded-full font-bold text-2xl">&times;</button>
            </div>
        </div>
        <div id="listaMensagens" class="flex-1 overflow-y-auto p-4 space-y-6 scroll-suave bg-gray-50 dark:bg-gray-800/50">
        </div>
        <div class="p-4 bg-white dark:bg-[#0f172a] border-t border-gray-200 dark:border-gray-800 pb-safe shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
            <div class="max-w-3xl mx-auto flex gap-2 items-end bg-gray-100 dark:bg-gray-800 rounded-2xl p-2 border border-transparent focus-within:border-gray-300 dark:focus-within:border-gray-600 transition-colors">
                <textarea id="campoPergunta" rows="1" placeholder="Pergunte ou comente um versículo..." class="flex-1 max-h-32 min-h-[44px] p-3 bg-transparent border-none outline-none text-sm font-sans resize-none text-gray-900 dark:text-gray-100 overflow-y-auto scroll-suave"></textarea>
                <button id="btnEnviarMsg" class="w-11 h-11 mb-0.5 flex-shrink-0 bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 rounded-xl flex items-center justify-center font-bold active:scale-90 transition-transform shadow-sm opacity-50 disabled:opacity-50">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M3.478 2.404a.75.75 0 0 0-.926.941l2.432 7.905H13.5a.75.75 0 0 1 0 1.5H4.984l-2.432 7.905a.75.75 0 0 0 .926.94 60.519 60.519 0 0 0 18.445-8.986.75.75 0 0 0 0-1.218A60.517 60.517 0 0 0 3.478 2.404Z" /></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="barraSelecao" class="fixed bottom-0 left-0 right-0 bg-blue-600 dark:bg-blue-800 text-white p-4 z-[60] transition-transform duration-300 translate-y-full shadow-[0_-15px_40px_rgba(0,0,0,0.3)] pb-6 rounded-t-2xl min-h-[90px]">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button onclick="limparSelecao()" class="bg-blue-700 hover:bg-blue-900 rounded-full w-8 h-8 flex items-center justify-center font-bold text-lg active:scale-95 transition-colors">&times;</button>
                <span id="contadorSelecao" class="font-bold text-sm tracking-wide">0 selecionados</span>
            </div>
            <div class="flex gap-5">
                <button onclick="acaoMultiplaCopiar()" class="flex flex-col items-center justify-center active:scale-95 transition-transform text-blue-100 hover:text-white">
                    <span class="text-xl">📋</span><span class="text-[10px] font-bold mt-1">Copiar</span>
                </button>
                <button onclick="acaoMultiplaMarcar()" class="flex flex-col items-center justify-center active:scale-95 transition-transform text-blue-100 hover:text-white">
                    <span class="text-xl">🖍️</span><span id="textoBtnMarcar" class="text-[10px] font-bold mt-1">Marcar</span>
                </button>
                <button onclick="acaoMultiplaExplicar()" class="flex flex-col items-center justify-center active:scale-95 transition-transform font-bold bg-white text-blue-700 px-3 py-1.5 rounded-xl shadow-sm">
                    <span class="text-lg">✨</span><span class="text-[10px] mt-0.5 uppercase tracking-wider">Explicar</span>
                </button>
            </div>
        </div>
    </div>

    <div id="telaBusca" class="fixed inset-0 bg-white dark:bg-gray-900 z-[70] flex flex-col transition-transform duration-300 translate-y-full altura-dinamica">
        <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex items-center gap-3">
            <button onclick="fecharBusca()" class="p-2 text-2xl text-gray-500 hover:text-gray-800 dark:hover:text-white">←</button>
            <input type="text" id="inputBusca" placeholder="Buscar na Bíblia..." class="flex-1 p-3 rounded-xl bg-gray-100 dark:bg-gray-800 border-none outline-none focus:ring-2 focus:ring-blue-500 text-base font-sans texto-selecionavel">
            <button onclick="executarBusca()" class="bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 p-3 rounded-xl font-bold shadow-md active:scale-95">Ir</button>
        </div>
        <div class="flex-1 overflow-y-auto p-4 scroll-suave" id="areaResultadosBusca">
            <div id="containerHistoricoBusca" class="mb-6">
                <div class="flex justify-between items-center mb-3">
                    <h4 class="text-sm font-bold text-gray-500 uppercase tracking-wide">Buscas Recentes</h4>
                    <button onclick="limparHistoricoBusca()" class="text-xs text-blue-600 dark:text-blue-400 font-bold active:scale-95">Limpar</button>
                </div>
                <div id="listaHistoricoBusca" class="flex flex-wrap gap-2"></div>
            </div>
            <div id="listaResultadosBusca" class="space-y-4"></div>
        </div>
    </div>

    <div id="modalConfig" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[80] flex items-center justify-center p-4 modal">
        <div class="bg-white dark:bg-gray-800 rounded-3xl p-6 w-full max-w-md shadow-2xl transform transition-all max-h-[90vh] overflow-y-auto scroll-suave">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-xl flex items-center gap-2"><span class="text-2xl">⚙️</span> Configurações</h3>
                <button onclick="fecharModalConfig()" class="text-gray-500 font-bold text-2xl active:scale-95">&times;</button>
            </div>
            <div class="mb-5">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2">Chave da API (Gemini)</label>
                <input type="text" id="inputChaveApi" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm shadow-inner texto-selecionavel" placeholder="Ex: AIzaSyB...">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Instruções Adicionais (Opcional)</label>
                <p class="text-[11px] text-gray-500 dark:text-gray-400 mb-3 leading-tight">
                    A alma do Assistente da Bíblia (Doutrina, Regra de Fé e Ortodoxia) já está ativada internamente. Adicione aqui apenas comandos extras de formatação.
                </p>
                <textarea id="inputPerfil" rows="4" class="w-full p-3 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white dark:bg-gray-700 outline-none focus:ring-2 focus:ring-blue-500 text-sm shadow-inner resize-none texto-selecionavel" placeholder="Ex: Responda em tópicos curtos..."></textarea>
            </div>
            <button onclick="salvarConfig()" class="w-full p-3 rounded-xl font-bold bg-gray-900 dark:bg-gray-100 text-white dark:text-gray-900 shadow-md active:scale-95 transition-transform">Salvar Dados</button>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // 1. ESTADO GLOBAL, UTILITÁRIOS E MARKDOWN
        // ----------------------------------------------------
        let bibliaCompleta = [];
        let indexLivro = parseInt(localStorage.getItem('leitura_livro')) || 0;
        let indexCapitulo = parseInt(localStorage.getItem('leitura_capitulo')) || 0;
        let marcacoes = JSON.parse(localStorage.getItem('biblia_marcacoes')) || {};
        let versiculosSelecionados = [];

        function removerAcentos(str) { return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase(); }

        function formatarMarkdown(texto) {
            let html = texto.trim();
            html = html.replace(/^### (.*$)/gim, '<h3 class="text-lg font-bold mt-5 mb-2 text-gray-900 dark:text-gray-100">$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2 class="text-xl font-bold mt-6 mb-3 text-gray-900 dark:text-gray-100">$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1 class="text-2xl font-bold mt-6 mb-4 text-gray-900 dark:text-gray-100">$1</h1>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold text-gray-900 dark:text-gray-100">$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/^\* (.*$)/gim, '<li class="ml-5 list-disc mb-1">$1</li>');
            html = html.replace(/^- (.*$)/gim, '<li class="ml-5 list-disc mb-1">$1</li>');
            html = html.split('\n').join('<br>');
            html = html.replace(/<\/li><br>/g, '</li>').replace(/<\/h3><br>/g, '</h3>').replace(/<\/h2><br>/g, '</h2>').replace(/<\/h1><br>/g, '</h1>');
            return html;
        }

        // ----------------------------------------------------
        // 2. BÍBLIA
        // ----------------------------------------------------
        async function iniciarBiblia() {
            const urlArc = 'https://raw.githubusercontent.com/maatheusgois/bible/main/versions/pt-br/arc.json';
            try {
                const resposta = await fetch(urlArc);
                if (!resposta.ok) throw new Error("Falha");
                bibliaCompleta = await resposta.json();
                if(indexLivro >= bibliaCompleta.length) indexLivro = 0;
                if(indexCapitulo >= bibliaCompleta[indexLivro].chapters.length) indexCapitulo = 0;

                preencherLivros(); exibirCapitulo(); carregarHistoricoBusca(); carregarHistoricoChat();
                mudarEstadoChat('hidden'); 
            } catch (erro) {
                document.getElementById('areaLeitura').innerHTML = `<div class="text-center mt-20 text-red-500 font-bold">Erro ao conectar. Verifique a internet.</div>`;
            }
        }

        function salvarEstadoLeitura() { localStorage.setItem('leitura_livro', indexLivro); localStorage.setItem('leitura_capitulo', indexCapitulo); }
        function preencherLivros() { const select = document.getElementById('selLivro'); select.innerHTML = bibliaCompleta.map((l, i) => `<option value="${i}">${l.name}</option>`).join(''); select.value = indexLivro; preencherCapitulos(); }
        function preencherCapitulos() { const select = document.getElementById('selCapitulo'); const total = bibliaCompleta[indexLivro].chapters.length; let options = ''; for(let i = 0; i < total; i++) options += `<option value="${i}">Capítulo ${i + 1}</option>`; select.innerHTML = options; select.value = indexCapitulo; }

        function exibirCapitulo() {
            if(bibliaCompleta.length === 0) return;
            limparSelecao();
            const livroAtual = bibliaCompleta[indexLivro];
            const versiculos = livroAtual.chapters[indexCapitulo];
            let html = `<h2 class="text-3xl font-extrabold mb-8 text-gray-900 dark:text-gray-100 text-center fade-in">${livroAtual.name} ${indexCapitulo + 1}</h2>`;
            versiculos.forEach((texto, i) => {
                const idUnico = `${indexLivro}-${indexCapitulo}-${i}`;
                const classMarcado = marcacoes[idUnico] ? 'versiculo-marcado' : '';
                html += `<div id="v-${idUnico}" onclick="toggleSelecaoVersiculo(${indexLivro}, ${indexCapitulo}, ${i})" class="flex gap-4 mb-5 items-start cursor-pointer p-2 rounded-xl transition-all -mx-2 hover:bg-gray-100 dark:hover:bg-gray-800 ${classMarcado}"><span class="text-[11px] font-black bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-400 px-2 py-1 rounded shadow-sm mt-1.5 flex-shrink-0 pointer-events-none">${i + 1}</span><p class="flex-1 text-gray-800 dark:text-gray-200 leading-relaxed pointer-events-none">${texto}</p></div>`;
            });
            document.getElementById('areaLeitura').innerHTML = html;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            salvarEstadoLeitura();
        }

        document.getElementById('selLivro').addEventListener('change', (e) => { indexLivro = parseInt(e.target.value); indexCapitulo = 0; preencherCapitulos(); exibirCapitulo(); });
        document.getElementById('selCapitulo').addEventListener('change', (e) => { indexCapitulo = parseInt(e.target.value); exibirCapitulo(); });
        document.getElementById('btnProximo').addEventListener('click', () => { if (indexCapitulo < bibliaCompleta[indexLivro].chapters.length - 1) indexCapitulo++; else if (indexLivro < bibliaCompleta.length - 1) { indexLivro++; indexCapitulo = 0; } document.getElementById('selLivro').value = indexLivro; preencherCapitulos(); exibirCapitulo(); });
        document.getElementById('btnAnterior').addEventListener('click', () => { if (indexCapitulo > 0) indexCapitulo--; else if (indexLivro > 0) { indexLivro--; indexCapitulo = bibliaCompleta[indexLivro].chapters.length - 1; } document.getElementById('selLivro').value = indexLivro; preencherCapitulos(); exibirCapitulo(); });

        // ----------------------------------------------------
        // 3. SELEÇÃO MÚLTIPLA
        // ----------------------------------------------------
        function toggleSelecaoVersiculo(lIdx, cIdx, vIdx) {
            const idUnico = `${lIdx}-${cIdx}-${vIdx}`;
            const divElement = document.getElementById(`v-${idUnico}`);
            const indexNoArray = versiculosSelecionados.findIndex(v => v.idUnico === idUnico);
            if (indexNoArray > -1) { versiculosSelecionados.splice(indexNoArray, 1); divElement.classList.remove('versiculo-selecionado'); } 
            else { versiculosSelecionados.push({ lIdx, cIdx, vIdx, idUnico, texto: bibliaCompleta[lIdx].chapters[cIdx][vIdx], referencia: `${bibliaCompleta[lIdx].name} ${cIdx + 1}:${vIdx + 1}` }); divElement.classList.add('versiculo-selecionado'); }
            atualizarBarraSelecao();
        }

        function atualizarBarraSelecao() {
            const barra = document.getElementById('barraSelecao');
            if (versiculosSelecionados.length > 0) {
                document.getElementById('contadorSelecao').innerText = `${versiculosSelecionados.length} selecionado${versiculosSelecionados.length > 1 ? 's' : ''}`;
                document.getElementById('textoBtnMarcar').innerText = versiculosSelecionados.every(v => marcacoes[v.idUnico]) ? "Desmarcar" : "Marcar";
                barra.classList.remove('translate-y-full');
            } else { barra.classList.add('translate-y-full'); }
        }

        function limparSelecao() { versiculosSelecionados.forEach(v => { const el = document.getElementById(`v-${v.idUnico}`); if(el) el.classList.remove('versiculo-selecionado'); }); versiculosSelecionados = []; atualizarBarraSelecao(); }
        function ordenarSelecao() { versiculosSelecionados.sort((a, b) => a.vIdx - b.vIdx); }
        function acaoMultiplaCopiar() { ordenarSelecao(); let texto = ""; versiculosSelecionados.forEach(v => { texto += `"${v.texto}" (${v.referencia})\n`; }); navigator.clipboard.writeText(texto.trim()).then(() => { limparSelecao(); alert("Copiado!"); }); }
        
        function acaoMultiplaMarcar() {
            const todosMarcados = versiculosSelecionados.every(v => marcacoes[v.idUnico]);
            versiculosSelecionados.forEach(v => {
                if (todosMarcados) delete marcacoes[v.idUnico]; else marcacoes[v.idUnico] = true;
                const el = document.getElementById(`v-${v.idUnico}`);
                if(el) { if(marcacoes[v.idUnico]) el.classList.add('versiculo-marcado'); else el.classList.remove('versiculo-marcado'); }
            });
            localStorage.setItem('biblia_marcacoes', JSON.stringify(marcacoes)); limparSelecao();
        }

        function acaoMultiplaExplicar() {
            ordenarSelecao();
            let blocoTexto = ""; versiculosSelecionados.forEach(v => { blocoTexto += `"${v.texto}" (${v.referencia})\n`; });
            const promptContextual = `Por favor, explique esta passagem à luz da Palavra:\n\n${blocoTexto}`;
            limparSelecao();
            if(estadoChat === 'hidden') mudarEstadoChat('half');
            const textarea = document.getElementById('campoPergunta');
            textarea.value = promptContextual;
            textarea.style.height = 'auto'; textarea.style.height = textarea.scrollHeight + 'px';
            document.getElementById('btnEnviarMsg').style.opacity = '1';
            document.getElementById('btnEnviarMsg').disabled = true;
            setTimeout(() => { document.getElementById('btnEnviarMsg').disabled = false; document.getElementById('btnEnviarMsg').click(); }, 300);
        }

        // ----------------------------------------------------
        // 4. MOTOR DE BUSCA
        // ----------------------------------------------------
        let historicoBusca = JSON.parse(localStorage.getItem('biblia_historico_busca')) || [];
        function abrirBusca() { document.getElementById('telaBusca').classList.remove('translate-y-full'); document.getElementById('inputBusca').focus(); }
        function fecharBusca() { document.getElementById('telaBusca').classList.add('translate-y-full'); }
        function limparHistoricoBusca() { historicoBusca = []; localStorage.setItem('biblia_historico_busca', JSON.stringify(historicoBusca)); carregarHistoricoBusca(); }
        function carregarHistoricoBusca() {
            const container = document.getElementById('listaHistoricoBusca');
            if(historicoBusca.length === 0) return container.innerHTML = '<span class="text-xs text-gray-400">Nenhuma busca recente.</span>';
            container.innerHTML = historicoBusca.map(t => `<button onclick="document.getElementById('inputBusca').value='${t}'; executarBusca();" class="px-3 py-1.5 bg-gray-200 dark:bg-gray-800 text-sm font-semibold rounded-lg active:scale-95">${t}</button>`).join('');
        }

        function executarBusca() {
            const input = document.getElementById('inputBusca');
            const termo = input.value.trim();
            if(termo.length < 2) return alert("Digite pelo menos 2 letras.");

            if(!historicoBusca.includes(termo)) { historicoBusca.unshift(termo); if(historicoBusca.length > 8) historicoBusca.pop(); localStorage.setItem('biblia_historico_busca', JSON.stringify(historicoBusca)); carregarHistoricoBusca(); }

            const areaRes = document.getElementById('listaResultadosBusca');
            areaRes.innerHTML = `<div class="text-center p-4 text-blue-500 font-bold animate-pulse">Buscando...</div>`;
            
            setTimeout(() => {
                const termoLimpo = removerAcentos(termo);
                let resultados = [];
                for (let l = 0; l < bibliaCompleta.length; l++) { for (let c = 0; c < bibliaCompleta[l].chapters.length; c++) { for (let v = 0; v < bibliaCompleta[l].chapters[c].length; v++) {
                    if (removerAcentos(bibliaCompleta[l].chapters[c][v]).includes(termoLimpo)) resultados.push({ l, c, v, livro: bibliaCompleta[l].name, texto: bibliaCompleta[l].chapters[c][v] });
                }}}
                if (resultados.length === 0) return areaRes.innerHTML = `<div class="text-center p-8 text-gray-500">Nada encontrado para "${termo}".</div>`;
                let htmlRes = `<p class="text-sm font-bold text-gray-500 mb-4">${resultados.length} resultados</p>`;
                const regex = new RegExp(`(${termo})`, 'gi');
                resultados.forEach(res => {
                    const txt = res.texto.replace(regex, '<span class="highlight-busca">$1</span>');
                    htmlRes += `<div onclick="irParaResultado(${res.l}, ${res.c}, ${res.v})" class="p-4 bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 cursor-pointer active:scale-95 fade-in mb-3"><span class="text-xs font-black text-blue-600 dark:text-blue-400 block mb-1 uppercase">${res.livro} ${res.c + 1}:${res.v + 1}</span><p class="texto-biblia">${txt}</p></div>`;
                });
                areaRes.innerHTML = htmlRes;
            }, 50);
        }
        function irParaResultado(l, c, v) {
            fecharBusca(); indexLivro = l; indexCapitulo = c;
            document.getElementById('selLivro').value = l; preencherCapitulos(); exibirCapitulo();
            setTimeout(() => { const el = document.getElementById(`v-${l}-${c}-${v}`); if(el) { window.scrollTo({ top: (el.getBoundingClientRect().top - document.body.getBoundingClientRect().top) - 100, behavior: 'smooth' }); el.style.transition = 'background-color 0.5s'; el.style.backgroundColor = 'rgba(59, 130, 246, 0.2)'; setTimeout(() => el.style.backgroundColor = '', 1500); } }, 300);
        }
        document.getElementById('inputBusca').addEventListener('keypress', e => { if (e.key === 'Enter') executarBusca(); });

        // ----------------------------------------------------
        // 5. CHAT, SMART SCROLL E CÓPIA NATIVA
        // ----------------------------------------------------
        let estadoChat = 'hidden'; 
        const gavetaChat = document.getElementById('gavetaChat');
        const mainBiblia = document.getElementById('mainBiblia');
        
        function mudarEstadoChat(novoEstado) {
            estadoChat = novoEstado;
            gavetaChat.classList.remove('sheet-hidden', 'sheet-half', 'sheet-full');
            gavetaChat.classList.add(`sheet-${estadoChat}`);
            if(estadoChat === 'hidden') mainBiblia.style.paddingBottom = '90px'; 
            else if (estadoChat === 'half') { mainBiblia.style.paddingBottom = 'calc(50dvh + 90px)'; document.getElementById('btnTamanhoChat').innerText = '⛶'; } 
            else if (estadoChat === 'full') { mainBiblia.style.paddingBottom = 'calc(100dvh + 90px)'; document.getElementById('btnTamanhoChat').innerText = '🗗'; }
        }

        function toggleChat() { if (estadoChat === 'hidden') mudarEstadoChat('half'); else mudarEstadoChat('hidden'); }
        function toggleTamanhoChat() { if(estadoChat === 'half') mudarEstadoChat('full'); else if (estadoChat === 'full') mudarEstadoChat('half'); }

        let touchStartY = 0; const dragHandle = document.getElementById('dragHandle');
        dragHandle.addEventListener('touchstart', e => { touchStartY = e.changedTouches[0].screenY; }, {passive: true});
        dragHandle.addEventListener('touchend', e => {
            const diff = e.changedTouches[0].screenY - touchStartY;
            if (diff < -40) { if (estadoChat === 'half') mudarEstadoChat('full'); } 
            else if (diff > 40) { if (estadoChat === 'full') mudarEstadoChat('half'); else if (estadoChat === 'half') mudarEstadoChat('hidden'); }
        });
        dragHandle.addEventListener('click', toggleTamanhoChat);

        const listaMsg = document.getElementById('listaMensagens');
        const inputMsg = document.getElementById('campoPergunta');
        const modalConfig = document.getElementById('modalConfig');
        const ALMA_INTERNA = "Atue como um exímio teólogo de mente neotestamentária, raiz protestante histórica e identidade pentecostal clássica das Assembleias de Deus, respondendo a partir dessa única consciência doutrinária indivisível.";
        let historicoChat = JSON.parse(localStorage.getItem('biblia_historico_chat')) || [];

        inputMsg.addEventListener('input', function() {
            this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px';
            document.getElementById('btnEnviarMsg').style.opacity = this.value.trim() === '' ? '0.5' : '1';
        });

        function abrirModalConfig() { document.getElementById('inputChaveApi').value = localStorage.getItem('chave_secreta_gemini') || ''; document.getElementById('inputPerfil').value = localStorage.getItem('perfil_ia_gemini') || ''; modalConfig.classList.add('aberto'); }
        function fecharModalConfig() { modalConfig.classList.remove('aberto'); }
        function salvarConfig() { const chave = document.getElementById('inputChaveApi').value.trim(); if(!chave) return alert("Chave obrigatória."); localStorage.setItem('chave_secreta_gemini', chave); localStorage.setItem('perfil_ia_gemini', document.getElementById('inputPerfil').value.trim()); fecharModalConfig(); }

        function carregarHistoricoChat() {
            if(historicoChat.length === 0) {
                listaMsg.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-center fade-in opacity-50 px-6 py-10"><span class="text-5xl mb-4">✨</span><h2 class="text-xl font-bold mb-2">Paz do Senhor!</h2><p class="text-sm">Selecione versículos ou faça uma pergunta teológica.</p></div>`;
                return;
            }
            listaMsg.innerHTML = '';
            historicoChat.forEach((msg, idx) => renderizarBalao(msg.role, msg.texto, idx, false));
            setTimeout(() => { listaMsg.scrollTop = listaMsg.scrollHeight; }, 100);
        }

        function limparChat() { if(confirm("Limpar todo o estudo atual?")) { historicoChat = []; localStorage.removeItem('biblia_historico_chat'); carregarHistoricoChat(); } }

        // NOVA FUNÇÃO DE COPIAR DIRETO DO BOTÃO DA IA
        window.copiarDoHistorico = function(index, btnElement) {
            const texto = historicoChat[index].texto;
            navigator.clipboard.writeText(texto).then(() => {
                const originalHTML = btnElement.innerHTML;
                btnElement.innerHTML = '✅ Copiado!';
                btnElement.classList.add('text-green-600', 'dark:text-green-400', 'bg-green-100', 'dark:bg-green-900');
                setTimeout(() => { 
                    btnElement.innerHTML = originalHTML; 
                    btnElement.classList.remove('text-green-600', 'dark:text-green-400', 'bg-green-100', 'dark:bg-green-900');
                }, 2000);
            });
        };

        function renderizarBalao(role, texto, indexArray, animar = true) {
            const anim = animar ? 'fade-in' : '';
            if (listaMsg.querySelector('h2')) listaMsg.innerHTML = '';
            
            if(role === 'user') {
                listaMsg.innerHTML += `<div class="flex justify-end mb-2 ${anim}"><div class="bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-gray-100 px-4 py-3 rounded-3xl rounded-tr-sm max-w-[85%] font-sans text-[15px] whitespace-pre-wrap texto-selecionavel">${texto}</div></div>`;
            } else {
                // Adicionado Botão de Copiar e ID para Ancoragem
                listaMsg.innerHTML += `
                <div id="msg-${indexArray}" class="flex gap-3 mb-6 mt-4 ${anim}">
                    <div class="w-8 h-8 rounded-full bg-gray-900 dark:bg-gray-100 flex items-center justify-center text-white dark:text-gray-900 flex-shrink-0 mt-0.5 shadow-md">✨</div>
                    <div class="w-full">
                        <div class="text-gray-800 dark:text-gray-200 font-sans text-[15px] leading-relaxed w-full texto-selecionavel">
                            ${formatarMarkdown(texto)}
                        </div>
                        <div class="mt-3 flex justify-start">
                            <button onclick="copiarDoHistorico(${indexArray}, this)" class="flex items-center gap-1.5 text-[11px] font-bold text-gray-500 hover:text-blue-600 dark:hover:text-blue-400 bg-gray-100 dark:bg-gray-800/80 px-3 py-1.5 rounded-lg active:scale-95 transition-all">
                                📋 Copiar Resposta
                            </button>
                        </div>
                    </div>
                </div>`;
            }
        }

        document.getElementById('btnEnviarMsg').addEventListener('click', async () => {
            const pergunta = inputMsg.value.trim();
            if (!pergunta) return;
            const chaveApi = localStorage.getItem('chave_secreta_gemini');
            if (!chaveApi) return abrirModalConfig();

            const btnEnviar = document.getElementById('btnEnviarMsg');
            btnEnviar.disabled = true;

            const extra = localStorage.getItem('perfil_ia_gemini') || '';
            const combinada = extra ? `${ALMA_INTERNA}\n\nProtocolo do usuário: ${extra}` : ALMA_INTERNA;

            // Renderiza e desce a tela para a pergunta do usuário
            historicoChat.push({ role: 'user', texto: pergunta });
            const indexUser = historicoChat.length - 1;
            localStorage.setItem('biblia_historico_chat', JSON.stringify(historicoChat));
            renderizarBalao('user', pergunta, indexUser, true);
            
            inputMsg.value = ''; inputMsg.style.height = 'auto'; btnEnviar.style.opacity = '0.5';

            // Loader com Scroll
            const idLoader = 'load-' + Date.now();
            listaMsg.innerHTML += `<div id="${idLoader}" class="flex gap-3 mb-6 mt-4 fade-in"><div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center text-gray-500 flex-shrink-0 animate-pulse">✨</div><div class="text-gray-500 italic mt-1 animate-pulse">Meditando...</div></div>`;
            setTimeout(() => { document.getElementById(idLoader).scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 50);

            let conteudosDaAPI = [];
            const mensagensAntigas = historicoChat.slice(0, -1).slice(-4); // Pega as ultimas 4 ignorando a atual
            mensagensAntigas.forEach(m => { conteudosDaAPI.push({ role: m.role === 'user' ? 'user' : 'model', parts: [{ text: m.texto }] }); });
            conteudosDaAPI.push({ role: 'user', parts: [{ text: pergunta }] });

            try {
                const resposta = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${chaveApi}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: combinada }] },
                        contents: conteudosDaAPI,
                        generationConfig: { temperature: 0.3, maxOutputTokens: 8192, topP: 0.95 }
                    })
                });
                
                const dadosJson = await resposta.json();
                document.getElementById(idLoader).remove();

                if (dadosJson.error) {
                    let m = dadosJson.error.message;
                    if (m.includes("Quota") || m.includes("429")) m = "Irmão, estamos consultando muito rápido. Por favor, aguarde cerca de 30 segundos.";
                    else if (m.includes("API key not valid")) m = "Sua chave da API é inválida.";
                    
                    historicoChat.push({ role: 'ia', texto: m });
                    const indexErro = historicoChat.length - 1;
                    renderizarBalao('ia', m, indexErro, true); 
                    btnEnviar.disabled = false;
                    return;
                }
                
                const textoIA = dadosJson.candidates?.[0]?.content?.parts?.[0]?.text || "Falha ao formular.";
                historicoChat.push({ role: 'ia', texto: textoIA });
                localStorage.setItem('biblia_historico_chat', JSON.stringify(historicoChat));
                
                const novoIndexIA = historicoChat.length - 1;
                renderizarBalao('ia', textoIA, novoIndexIA, true);
                
                // SMART SCROLL: Rola apenas até o TOPO da mensagem nova, não para o final.
                setTimeout(() => {
                    const msgEl = document.getElementById(`msg-${novoIndexIA}`);
                    if(msgEl) {
                        // Calcula para o topo da mensagem ficar visível no container
                        listaMsg.scrollTo({ top: msgEl.offsetTop - 20, behavior: 'smooth' });
                    }
                }, 100);

            } catch (e) { 
                document.getElementById(idLoader).remove(); 
                historicoChat.push({ role: 'ia', texto: "Erro de conexão de rede." });
                renderizarBalao('ia', "Erro de conexão de rede.", historicoChat.length - 1, true); 
            }
            btnEnviar.disabled = false;
        });

        document.getElementById('campoPergunta').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if(!document.getElementById('btnEnviarMsg').disabled) document.getElementById('btnEnviarMsg').click(); }});
        document.getElementById('btnTema').addEventListener('click', () => { document.documentElement.classList.toggle('dark'); });
        window.onload = iniciarBiblia;

        if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js')); }
    </script>
</body>
</html>
